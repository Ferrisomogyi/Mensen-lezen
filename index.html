en wat deze persoon nu zegt? Externe perspectief doorbreekt je eigen bias.","s":["dagelijks"]},{"id":414,"c":"leugen","t":"Asymmetrisch detailniveau","b":"Waar ze uitgebreid zijn = gerepeteerd of waar. Waar ze vaag zijn = verborgen. Het contrast tussen secties is de sleutel.","s":["vergadering"]},{"id":415,"c":"leugen","t":"De emotionele sequentie-check","b":"Echte emotie komt voor of gelijk met het verhaal. Nep-emotie wordt toegevoegd nadat ze zien dat je niet overtuigd bent.","s":["dagelijks","vergadering"]},{"id":416,"c":"leugen","t":"De commitment-test","b":"Vraag om het verhaal op schrift te stellen. Leugenaars aarzelen omdat geschreven woorden permanenter voelen.","s":["vergadering"]},{"id":417,"c":"leugen","t":"Grooming van het verhaal","b":"Bij meerdere keren vertellen: wordt het verhaal steeds gladder en consistenter? Waarheid wordt rommeliger door herinneringsvervorming. Leugens worden gepolijst.","s":["vergadering"]},{"id":418,"c":"leugen","t":"De controlevraag-methode","b":"Stel vragen waarop je het antwoord weet tussendoor. IJk hun baseline op bekende waarheden.","s":["vergadering","onderhandeling"]},{"id":419,"c":"leugen","t":"Woordenschat-verschuiving bij leugens","b":"Leugenaars gebruiken minder exclusieve woorden (behalve, maar, zonder) en meer bewegingswerkwoorden.","s":["vergadering"]},{"id":420,"c":"leugen","t":"Het eye-access model kritisch bekeken","b":"Links kijken = herinneren, rechts = construeren is populair maar wetenschappelijk niet bevestigd. Gebruik het alleen als één datapunt in een cluster.","s":["vergadering"]},{"id":421,"c":"leugen","t":"De cognitieve interview-techniek","b":"Politietechniek: context herstellen, alles vertellen, perspectiefwissel, volgorde veranderen. Waarheid overleeft alle vier. Leugens niet.","s":["vergadering"]},{"id":422,"c":"leugen","t":"Nervositeit vs. schuld onderscheiden","b":"Nerveuze onschuldigen tonen dezelfde signalen als schuldige leugenaars. Het verschil: onschuldigen worden kalmer naarmate het gesprek vordert. Schuldigen niet.","s":["vergadering"]},{"id":423,"c":"leugen","t":"De derde-partij-verificatie","b":"Stel dezelfde vraag aan iemand anders die erbij was. Kleine discrepanties zijn normaal. Grote plot-gaten zijn dat niet.","s":["vergadering","dagelijks"]},{"id":424,"c":"leugen","t":"Duping delight","b":"Een snelle glimlach of flits van plezier wanneer ze denken dat de leugen geslaagd is. Micro-expressie van triumph.","s":["vergadering","dagelijks"]},{"id":425,"c":"leugen","t":"Het brokje-waarheid-principe","b":"De meest effectieve leugens bevatten 90% waarheid. De 10% leugen is ingebed in context die klopt. Zoek naar het ontbrekende stuk.","s":["dagelijks","vergadering"]},{"id":426,"c":"leugen","t":"De illustrator-vermindering","b":"Normaal gebruiken mensen handgebaren bij spreken. Bij liegen neemt dit af omdat het brein te druk is met het construeren van het verhaal.","s":["vergadering"]},{"id":427,"c":"leugen","t":"Paralinguale markers","b":"Ehm, uh, slikken, kuchje, stembreuk — onwillekeurige geluiden die het bewuste verhaal doorbreken.","s":["vergadering","dagelijks"]},{"id":428,"c":"macht","t":"De stilte als machtsinstrument","b":"Wie stilte verdraagt zonder te vullen heeft psychologische controle. De stilte dwingt de ander tot spreken — en onthulling.","s":["vergadering","onderhandeling"]},{"id":429,"c":"macht","t":"Controlled vulnerability","b":"Machtige mensen die bewust kwetsbaarheid tonen (fouten toegeven) vergroten hun invloed. Het is het tegenovergestelde van wat zwakke mensen denken.","s":["vergadering","verkoop"]},{"id":430,"c":"macht","t":"De informatie-asymmetrie als macht","b":"Wie meer weet maar minder laat zien heeft de meeste macht. Kennis tonen = status. Kennis verbergen = strategie.","s":["vergadering","onderhandeling"]},{"id":431,"c":"macht","t":"Micro-agressies als statusspel","b":"Subtiele beledigingen die plausibel ontkend kunnen worden. Was maar een grapje. Het patroon is de boodschap.","s":["vergadering","dagelijks"]},{"id":432,"c":"macht","t":"Het veto-effect","b":"De macht om nee te zeggen is vaak groter dan de macht om ja te zeggen. Wie kan blokkeren heeft de echte macht.","s":["vergadering","onderhandeling"]},{"id":433,"c":"macht","t":"Tempo bepalen = macht","b":"Wie het tempo van een gesprek, vergadering of project bepaalt heeft controle. Versnellen of vertragen is een machtstechniek.","s":["vergadering"]},{"id":434,"c":"macht","t":"Patronage en gunsten","b":"Gunsten verlenen creëert afhankelijkheid. De patroon heeft macht over de ontvanger. Let op wie wie gunsten verleent in een groep.","s":["vergadering","dagelijks"]},{"id":435,"c":"macht","t":"De expertise-val","b":"Expertise is macht maar kan ook isoleren. Wie te veel weet wordt de onmisbare specialist maar nooit de leider.","s":["vergadering"]},{"id":436,"c":"macht","t":"Inversie van machtssignalen","b":"De machtigste persoon in de kamer is soms de stilste, kleinste, meest casual geklede. Ware macht hoeft niet te adverteren.","s":["vergadering","dagelijks"]},{"id":437,"c":"macht","t":"De taal van eigenaarschap","b":"Mijn team vs. het team. Mijn project vs. het project. Bezittelijk taalgebruik onthult wie zich eigenaar voelt.","s":["vergadering"]},{"id":438,"c":"gesprek","t":"De doorvraag-ladder","b":"Wat bedoel je daarmee? Waarom vind je dat? Kun je een voorbeeld geven? Drie niveaus dieper = voorbij het script.","s":["vergadering","dagelijks"]},{"id":439,"c":"gesprek","t":"Reframing in real-time","b":"Ik kan dit niet wordt dit is lastig. Het probleem wordt de uitdaging. Herformuleren verandert het denken.","s":["vergadering","conflict"]},{"id":440,"c":"gesprek","t":"De perspectief-shift","b":"Hoe zou X dit zien? Een derde perspectief introduceren doorbreekt vastgelopen tweerichtingsgesprekken.","s":["vergadering","conflict"]},{"id":441,"c":"gesprek","t":"Actief luisteren: de vier niveaus","b":"Horen, begrijpen, evalueren, reageren. De meeste mensen stoppen bij horen en springen naar reageren.","s":["vergadering","dagelijks"]},{"id":442,"c":"gesprek","t":"De intentie-impact kloof","b":"De intentie achter een uitspraak ≠ de impact ervan. Goed bedoeld maar kwetsend = nog steeds kwetsend. Erken impact los van intentie.","s":["conflict","dagelijks"]},{"id":443,"c":"gesprek","t":"Het probleem achter het probleem","b":"Het eerste probleem dat iemand noemt is zelden het echte probleem. Drie keer doorvragen om bij de kern te komen.","s":["vergadering","dagelijks"]},{"id":444,"c":"gesprek","t":"De veiligheid-eerst regel","b":"Crucial Conversations: als de ander zich niet veilig voelt, gaat inhoud verloren. Herstel veiligheid voor je verdergaat.","s":["conflict","vergadering"]},{"id":445,"c":"gesprek","t":"Het contrast-statement","b":"Ik wil niet dat je denkt X, ik wil wel dat je weet Y. Ontkracht het ergste en bevestig het beste in één zin.","s":["conflict","vergadering"]},{"id":446,"c":"gesprek","t":"Geweldloze communicatie (NVC)","b":"Marshall Rosenberg: observatie, gevoel, behoefte, verzoek. Ik zie... Ik voel... Omdat ik behoefte heb aan... Wil je...?","s":["conflict","dagelijks"]},{"id":447,"c":"gesprek","t":"De 5:1 ratio in feedback","b":"Vijf positieve opmerkingen per negatieve. Niet als compliment-sandwich maar als werkelijke verhouding over tijd.","s":["vergadering","dagelijks"]},{"id":448,"c":"gesprek","t":"Het Columbo-effect","b":"Doe alsof je minder weet dan je weet. Nog één dingetje... De ander onderschat je en onthult meer.","s":["vergadering","onderhandeling"]},{"id":449,"c":"gesprek","t":"De bewuste samenvatting-fout","b":"Vat bewust iets verkeerd samen. Ze corrigeren je en geven daarbij meer informatie dan ze van plan waren.","s":["vergadering","onderhandeling"]},{"id":450,"c":"gesprek","t":"Het gedeelde-vijand-principe","b":"Een gemeenschappelijk probleem of vijand benoemen creëert instant verbinding. Wij tegen het probleem.","s":["vergadering","verkoop"]},{"id":451,"c":"gesprek","t":"Tempo-matching","b":"Praat iets langzamer dan de ander en ze kalmeren. Iets sneller en ze worden energieker. Jij bepaalt de toon.","s":["vergadering","verkoop","conflict"]},{"id":452,"c":"eerste","t":"De 3V-regel","b":"Visueel (55%), Vocaal (38%), Verbaal (7%) - Mehrabian. Bij incongruentie domineren non-verbale signalen.","s":["sollicitatie","verkoop"]},{"id":453,"c":"eerste","t":"Primacy effect in interviews","b":"De eerste 30 seconden bepalen de rest van het interview. Alles daarna is confirmatie-bias.","s":["sollicitatie"]},{"id":454,"c":"eerste","t":"De anker-outfit","b":"Je eerste outfit bij iemand wordt het anker waartegen alle volgende worden gemeten. Kies bewust.","s":["date","sollicitatie"]},{"id":455,"c":"eerste","t":"Geur als onbewuste beïnvloeder","b":"Geur omzeilt het rationele brein en gaat direct naar het limbisch systeem. De krachtigste maar meest onderschatte eerste-indruk-factor.","s":["date","dagelijks"]},{"id":456,"c":"eerste","t":"De contextoverdracht","b":"Waar je iemand ontmoet kleurt de perceptie. Restaurant = warm. Kantoor = professioneel. De locatie is onderdeel van je presentatie.","s":["date","verkoop"]},{"id":457,"c":"eerste","t":"Vocal confidence bij introductie","b":"Stem omlaag aan einde van je naam. Stem omhoog = vraag of je eigen naam mag bestaan. Verschil is subtiel maar impactful.","s":["sollicitatie","verkoop"]},{"id":458,"c":"eerste","t":"De openingszin-strategie","b":"Begin niet met wat je doet maar met een vraag of observatie. Nieuwsgierigheid wekken in plaats van informatie dumpen.","s":["date","verkoop"]},{"id":459,"c":"eerste","t":"Consistent vs. inconsistent eerste contact","b":"Hoe consistenter je non-verbale en verbale signalen, hoe betrouwbaarder je overkomt. Incongruentie = onbetrouwbaarheid.","s":["sollicitatie","date"]},{"id":460,"c":"eerste","t":"De recency reset","b":"Na een slechte eerste indruk: creëer een sterk tweede moment. Het recency effect kan het primacy effect deels overschrijven.","s":["vergadering","dagelijks"]},{"id":461,"c":"eerste","t":"Status-matching bij kennismaken","b":"Spiegel de formaliteit van de ander. Te formeel bij casual = stijf. Te casual bij formeel = respectloos.","s":["vergadering","sollicitatie"]},{"id":462,"c":"digitaal","t":"Het profiel-audit","b":"LinkedIn-profiel vs. CV vs. gesprek. Drie versies van hetzelfde verhaal. De discrepanties zijn veelzeggend.","s":["sollicitatie","dagelijks"]},{"id":463,"c":"digitaal","t":"Email-formaat als hiërarchie","b":"Korte mails van boven naar beneden. Lange gedetailleerde mails van beneden naar boven. Lengte = machtsafstand.","s":["vergadering","dagelijks"]},{"id":464,"c":"digitaal","t":"CC-gedrag als politiek instrument","b":"Wie wordt ge-CC'd vertelt alles over de onderliggende machtsdynamiek en vertrouwensniveaus.","s":["vergadering"]},{"id":465,"c":"digitaal","t":"De screenshot-cultuur","b":"In een wereld waar alles gescreenshot kan worden: wat schrijft iemand dat ze niet hardop zouden zeggen?","s":["dagelijks"]},{"id":466,"c":"digitaal","t":"Online conflictescalatie","b":"Digitale communicatie escaleert 3x sneller dan face-to-face. Geen toon, geen gezicht, geen remming.","s":["conflict","dagelijks"]},{"id":467,"c":"digitaal","t":"De timing van social media posts","b":"Wanneer iemand post onthult hun routines, slaapcyclus en emotionele patronen. 3 AM posts = andere staat dan 10 AM posts.","s":["dagelijks"]},{"id":468,"c":"digitaal","t":"Het ghost-spectrum","b":"Niet antwoorden = spectrum van druk tot bewust negeren. Patroon over meerdere berichten = intentie.","s":["date","dagelijks"]},{"id":469,"c":"digitaal","t":"Caps en uitroeptekens als intensiteit","b":"CAPS = schreeuwen of nadruk. Veel uitroeptekens = enthousiasme of compensatie. Plots verschijnen = emotionele shift.","s":["dagelijks"]},{"id":470,"c":"digitaal","t":"De editing-trail","b":"Hoe vaak iemand berichten bewerkt of verwijdert = mate van zelfcensuur en controle-behoefte.","s":["dagelijks"]},{"id":471,"c":"digitaal","t":"Anoniem gedrag als ware aard","b":"Hoe mensen zich gedragen wanneer er geen sociale consequenties zijn = hun meest onbewaakte versie.","s":["dagelijks"]},{"id":472,"c":"digitaal","t":"Reactie-selectiviteit","b":"Welke berichten ze wel en niet beantwoorden. Het patroon van non-respons is informatief als het patroon van respons.","s":["dagelijks","date"]},{"id":473,"c":"groep","t":"Diffusion of responsibility","b":"Hoe meer mensen aanwezig, hoe minder individuele verantwoordelijkheid. Het bystander-effect in vergaderingen.","s":["vergadering"]},{"id":474,"c":"groep","t":"De Ringelmann-effect","b":"Prestatie per persoon daalt naarmate de groep groter wordt. Maximale groepsgrootte voor effectiviteit: 5-7.","s":["vergadering"]},{"id":475,"c":"groep","t":"Sociale facilitatie vs. inhibitie","b":"Anderen erbij = beter bij eenvoudige taken, slechter bij complexe. Ken het verschil voor teamsamenstelling.","s":["vergadering"]},{"id":476,"c":"groep","t":"De informatie-cascade","b":"Mensen negeren hun eigen informatie en volgen de groep. Hoe meer volgers, hoe moeilijker tegen de stroom in.","s":["vergadering"]},{"id":477,"c":"groep","t":"Het vocal minority effect","b":"Een kleine maar luide minderheid kan het beleid van een hele groep bepalen. Stilte van de meerderheid = instemming.","s":["vergadering"]},{"id":478,"c":"groep","t":"Risky shift / Group polarization","b":"Groepen nemen extremere beslissingen dan individuen. Voorzichtige individuen worden voorzichtiger. Gedurfde gedurfder.","s":["vergadering"]},{"id":479,"c":"groep","t":"De process loss in teams","b":"Coördinatiekosten + motivatieverlies = teams presteren bijna altijd onder hun potentieel. Benoemen helpt.","s":["vergadering"]},{"id":480,"c":"groep","t":"Psychological safety meten","b":"Edmondson: durven teamleden risico te nemen? Fouten toe te geven? Vragen te stellen? Dat bepaalt teamprestatie.","s":["vergadering"]},{"id":481,"c":"groep","t":"De scapegoating cyclus","b":"Fase 1: spanning. Fase 2: zondebok aanwijzen. Fase 3: uitsluiting. Fase 4: tijdelijke opluchting. Fase 5: herhaling.","s":["vergadering","dagelijks"]},{"id":482,"c":"groep","t":"Transactive memory","b":"Wie weet wat in het team. Effectieve teams weten niet alles maar weten wie wat weet.","s":["vergadering"]},{"id":483,"c":"geavanceerd","t":"De thin-slicing methode","b":"Gladwell: dunne plakjes informatie zijn vaak accurater dan uitgebreide analyse. Eerste indruk + ervaring = betrouwbaar.","s":["dagelijks"]},{"id":484,"c":"geavanceerd","t":"Het hot-cold empathy gap","b":"In een koude staat (kalm) kun je niet voorspellen hoe je in een hete staat (emotioneel) zult handelen. Geldt ook andersom.","s":["dagelijks"]},{"id":485,"c":"geavanceerd","t":"Embodied cognition","b":"Lichaamsstaat beïnvloedt denken. Warm drankje vasthouden = warmer oordeel over anderen. Zwaar klembord = zwaarwichtiger oordeel.","s":["dagelijks"]},{"id":486,"c":"geavanceerd","t":"De actor-observer bias","b":"We schrijven ons eigen gedrag toe aan situatie maar dat van anderen aan karakter. Het omgekeerde van de Fundamental Attribution Error.","s":["dagelijks"]},{"id":487,"c":"geavanceerd","t":"Naive realism doorbreken","b":"De overtuiging dat jij de werkelijkheid objectief ziet en anderen bevooroordeeld zijn. Iedereen heeft dit. Niemand heeft gelijk.","s":["dagelijks","conflict"]},{"id":488,"c":"geavanceerd","t":"Het contrast-effect in oordelen","b":"Na een extreem wordt alles ernaar vergeleken. Na een agressieve collega lijkt een neutrale collega aardig.","s":["dagelijks","vergadering"]},{"id":489,"c":"geavanceerd","t":"De 10-10-10 methode","b":"Hoe zal ik over deze beslissing denken over 10 minuten, 10 maanden, 10 jaar? Plaatst emotionele reacties in perspectief.","s":["dagelijks"]},{"id":490,"c":"geavanceerd","t":"Temporal landmarks en gedrag","b":"Mensen gedragen zich anders rond mijlpalen (maandag, nieuwjaar, verjaardag). Fresh start effect: motivatie piekt bij nieuwe beginpunten.","s":["dagelijks","vergadering"]},{"id":491,"c":"geavanceerd","t":"Het simulatie-effect","b":"Hoe makkelijker je je een scenario kunt voorstellen, hoe waarschijnlijker het voelt. Levendigheid ≠ waarschijnlijkheid.","s":["dagelijks"]},{"id":492,"c":"geavanceerd","t":"De self-serving bias","b":"Succes = mijn verdienste. Falen = externe factoren. Universeel menselijk maar de mate verschilt per persoon.","s":["dagelijks","vergadering"]},{"id":493,"c":"geavanceerd","t":"Inattentional blindness","b":"Je mist wat je niet verwacht. Het gorilla-experiment. Wat je niet zoekt, zie je niet — zelfs als het voor je neus staat.","s":["dagelijks"]},{"id":494,"c":"geavanceerd","t":"Het mere exposure effect","b":"Herhaalde blootstelling = meer waardering. Je hoeft niets te doen behalve aanwezig zijn. Frequentie bouwt voorkeur.","s":["dagelijks","verkoop"]},{"id":495,"c":"geavanceerd","t":"Change blindness in mensen","b":"Geleidelijke veranderingen in gedrag worden niet opgemerkt. De kikker in het langzaam verwarmende water. Vergelijk met baseline van maanden geleden.","s":["dagelijks"]},{"id":496,"c":"geavanceerd","t":"De prospectie-vaardigheid","b":"Het vermogen om toekomstige emotionele toestanden te voorspellen. De meeste mensen zijn hier slecht in. Wie het wel kan is strategisch in het voordeel.","s":["dagelijks","onderhandeling"]},{"id":497,"c":"lichaamstaal","t":"De kameleon-reactie","b":"Mensen bootsen automatisch emotionele gezichtsuitdrukkingen na van wie ze zien. Wie dit niet doet kan psychopathische trekken vertonen.","s":["dagelijks"]},{"id":498,"c":"lichaamstaal","t":"Armkruisen-varianten","b":"Losjes gekruist = comfort. Strak met handen in vuisten = defensief. Één arm vastpakken = zelfgeruststelling.","s":["vergadering","dagelijks"]},{"id":499,"c":"lichaamstaal","t":"De self-hug","b":"Armen om eigen lichaam slaan = troost zoeken bij zichzelf. Verschilt van armkruisen door de omhelzende beweging.","s":["dagelijks","conflict"]},{"id":500,"c":"lichaamstaal","t":"Objectmanipulatie als ventiel","b":"Pen kapot klikken, horloge draaien, ring schuiven = opgehoopte energie die een uitweg zoekt.","s":["vergadering","dagelijks"]},{"id":501,"c":"lichaamstaal","t":"Het gewichtsverschuivings-patroon","b":"Van been naar been wisselen = ongemak of ongeduld bij staan. Naar voren = engagement. Naar achteren = terugtrekken.","s":["vergadering","verkoop"]},{"id":502,"c":"lichaamstaal","t":"De kin-terugtrek","b":"Kin naar borst trekken = ongeloof, verrassing of bescherming. Dubbelkin-reactie bij schokkend nieuws.","s":["vergadering","dagelijks"]},{"id":503,"c":"lichaamstaal","t":"De asymmetrische handgreep","b":"Eén hand stevig, andere los = innerlijk conflict. Zeggen ja maar voelen nee.","s":["onderhandeling","vergadering"]},{"id":504,"c":"lichaamstaal","t":"Keel schrapen als reset","b":"Frequent keelschrapen zonder medische reden = ongemak met de situatie. Poging om spreekruimte te claimen.","s":["vergadering","sollicitatie"]},{"id":505,"c":"lichaamstaal","t":"De diafragmatische schok","b":"Plotselinge buikbeweging (als bij een minihik) = emotionele impact die wordt onderdrukt.","s":["vergadering","conflict"]},{"id":506,"c":"lichaamstaal","t":"Handen achter rug (parade rest)","b":"Autoriteitspositie: ik heb niets te verbergen en voel me veilig. Veel bij docenten, politie, koninklijken.","s":["vergadering"]},{"id":507,"c":"lichaamstaal","t":"Lippen verbergen","b":"Beide lippen naar binnen trekken en verbergen = sterke emotie inhouden. Ongemak met wat ze zouden willen zeggen.","s":["vergadering","conflict"]},{"id":508,"c":"lichaamstaal","t":"De hoofd-retractie","b":"Hoofd snel naar achteren = afstotingsreactie op iets dat net gezegd of getoond werd. Instinctief en snel.","s":["vergadering","dagelijks"]},{"id":509,"c":"lichaamstaal","t":"De borstkloptest","b":"Na iemands bewering: klopt hun hand op hun borst (oprecht) of wijkt hun hand af (onzeker)?","s":["vergadering"]},{"id":510,"c":"gezicht","t":"Redness response","b":"Blozen bij schaamte of ontdekking. Onmogelijk te onderdrukken. De meest eerlijke emotionele respons die bestaat.","s":["dagelijks","vergadering"]},{"id":511,"c":"gezicht","t":"Het orbiculaire knippatroon","b":"Snelle knippering na leugen of ongemak = cognitieve belasting. Verschilt van droge ogen door de plotseling opkomst.","s":["vergadering","onderhandeling"]},{"id":512,"c":"gezicht","t":"De reverse smile","b":"Mondhoeken omlaag zonder andere beweging = onderdrukt verdriet of teleurstelling die even doorbreekt.","s":["dagelijks","vergadering"]},{"id":513,"c":"gezicht","t":"De neusspier-twitch","b":"Kleine onwillekeurige neusbeweging = irritatie die wordt onderdrukt. Micro maar betrouwbaar.","s":["vergadering","conflict"]},{"id":514,"c":"gezicht","t":"Het masker-effect","b":"Mensen die veel maskers dragen (sociaal of fysiek) compenseren met overdreven oogexpressie. Ogen worden het hele gezicht.","s":["dagelijks"]},{"id":515,"c":"gezicht","t":"De partiele wenkbrauwlift","b":"Eén wenkbrauw heel licht omhoog = microskepsis. Kleiner dan de volledige sceptische lift maar net zo veelzeggend.","s":["vergadering","onderhandeling"]},{"id":516,"c":"spraak","t":"De echo-vraag als deflectie","b":"Terug de vraag stellen die hen gesteld werd. Waarom vraag je dat? = vermijden van antwoord.","s":["vergadering","dagelijks"]},{"id":517,"c":"spraak","t":"Code-switching herkennen","b":"Mensen wisselen van taalregister afhankelijk van met wie ze praten. Hoe groter de switch, hoe meer ze zich aanpassen.","s":["dagelijks","vergadering"]},{"id":518,"c":"spraak","t":"De opsomming als overweldiging","b":"Meer argumenten = niet sterker argument. Kwantiteit over kwaliteit signaleert onzekerheid over elk individueel punt.","s":["vergadering","conflict"]},{"id":519,"c":"spraak","t":"Euphemismen als alarmsignaal","b":"Hoe ernstiger de situatie, hoe zachter de taal. Reorganisatie = ontslagen. We moeten praten = slecht nieuws.","s":["vergadering","dagelijks"]},{"id":520,"c":"spraak","t":"De disclamer-opening","b":"Ik ben geen racist maar... De disclamer voorspelt exact wat ontkend wordt.","s":["dagelijks"]},{"id":521,"c":"spraak","t":"Prosodie als emotiedrager","b":"De melodie van spraak (prosodie) draagt meer emotionele informatie dan de woorden zelf. Luister naar de muziek niet de tekst.","s":["dagelijks","vergadering"]},{"id":522,"c":"spraak","t":"Het rapport-verbrekend woord","b":"Eigenlijk, feitelijk, letterlijk ingezet om de ander te corrigeren. Subtiele statusclaim verpakt als feitelijkheid.","s":["vergadering","dagelijks"]},{"id":523,"c":"spraak","t":"Overexplaining als schuldgevoel","b":"Te veel uitleggen waarom je iets deed = onbewust verdedigen. Wie niks te verbergen heeft, legt minder uit.","s":["dagelijks","vergadering"]},{"id":524,"c":"sociaal","t":"De sandwich-generatie stress","b":"Mensen die zorgen voor kinderen en ouders tegelijk. Hun geduld is dunner, hun prioriteiten verschoven. Herken het.","s":["dagelijks"]},{"id":525,"c":"sociaal","t":"Performative allyship","b":"Openlijk steunen zonder werkelijke actie. Het verschil: doen ze het ook als niemand kijkt?","s":["dagelijks","vergadering"]},{"id":526,"c":"sociaal","t":"Het roddel-netwerk mappen","b":"Wie roddelt met wie onthult vertrouwenslijnen en machtsstructuren beter dan elk organogram.","s":["vergadering","dagelijks"]},{"id":527,"c":"sociaal","t":"De testballon","b":"Een mening presenteren als die van iemand anders om de reactie te peilen. Een vriend van me vindt dat...","s":["vergadering","dagelijks"]},{"id":528,"c":"sociaal","t":"Het paaseiland-effect","b":"Groepen die alleen met zichzelf praten raken los van de werkelijkheid. Hoe hechter de groep, hoe groter het risico.","s":["vergadering"]},{"id":529,"c":"sociaal","t":"Social capital asymmetrie","b":"Wie meer sociale schulden uitstaat heeft meer macht. Track wie wie wat verschuldigd is.","s":["vergadering","dagelijks"]},{"id":530,"c":"sociaal","t":"De proximity-bias","b":"Mensen die fysiek dichter bij je zijn krijgen meer aandacht en kansen. De collega op kantoor vs. de remote werker.","s":["vergadering"]},{"id":531,"c":"sociaal","t":"Het bystander-effect in meetings","b":"Hoe meer mensen in de vergadering, hoe minder iemand verantwoordelijkheid neemt voor actie.","s":["vergadering"]},{"id":532,"c":"psycho","t":"De telescoping-bias","b":"Recente gebeurtenissen lijken langer geleden en oude lijken recenter. Vertekent hoe mensen over tijdslijnen praten.","s":["dagelijks"]},{"id":533,"c":"psycho","t":"Hypervigilantie herkennen","b":"Constant alert, overal gevaar zien, niet kunnen ontspannen. Vaak gerelateerd aan trauma. Niet verwarren met oplettendheid.","s":["dagelijks"]},{"id":534,"c":"psycho","t":"De just-world hypothesis","b":"Mensen geloven dat de wereld rechtvaardig is. Slachtoffers moeten het verdiend hebben. Beschermt het wereldbeeld ten koste van empathie.","s":["dagelijks"]},{"id":535,"c":"psycho","t":"Locus of control bepalen","b":"Intern: ik bepaal mijn lot. Extern: het lot bepaalt mij. Onthult veerkracht en verantwoordelijkheidsgevoel.","s":["dagelijks","sollicitatie"]},{"id":536,"c":"psycho","t":"Delay discounting als persoonlijkheidsmaat","b":"Hoe sterk iemand toekomstige beloningen devalueert. Sterke discounting = impulsiviteit. Zwakke = strategisch denken.","s":["dagelijks"]},{"id":537,"c":"psycho","t":"De verzonken-kosten-trap in identiteit","b":"Ik heb zoveel jaren geïnvesteerd in deze carrière/relatie/overtuiging. De investering wordt onderdeel van de identiteit.","s":["dagelijks"]},{"id":538,"c":"psycho","t":"Motivated reasoning","b":"Eerst de conclusie, dan de argumenten zoeken. Hoe slimmer de persoon, hoe beter ze hierin zijn.","s":["dagelijks","vergadering"]},{"id":539,"c":"psycho","t":"Het contrast-effect bij mensen","b":"Na gesprek met een charismatische persoon lijkt de volgende saai. Niet eerlijk voor de volgende.","s":["dagelijks","sollicitatie"]},{"id":540,"c":"psycho","t":"De zelfhandicapping-strategie","b":"Bewust obstakels creëren zodat falen verklaard is en succes extra indrukwekkend. Ik had niet eens gestudeerd.","s":["dagelijks","sollicitatie"]},{"id":541,"c":"psycho","t":"Regression to the mean begrijpen","b":"Extreme prestaties worden gevolgd door gemiddelde. Na een topdag komt een normale dag. Geen straf, gewoon statistiek.","s":["dagelijks","vergadering"]},{"id":542,"c":"psycho","t":"Het distinction vs. experience dilemma","b":"Bij vergelijken letten we op andere dingen dan bij ervaren. Wat er op papier het best uitziet is niet altijd het best voelt.","s":["dagelijks"]},{"id":543,"c":"manipulatie","t":"De straw man in discussies","b":"Iemands argument vervormen tot iets zwakkers en dat aanvallen. Ze zei X wordt ze bedoelt Y.","s":["conflict","vergadering"]},{"id":544,"c":"manipulatie","t":"Sealioning","b":"Eindeloos om bewijs vragen in schijnbare goede trouw. Het doel is niet begrijpen maar uitputten.","s":["conflict","dagelijks"]},{"id":545,"c":"manipulatie","t":"De valse premisse","b":"Een aanname in de vraag verstoppen. Wanneer ben je gestopt met liegen? De premisse is al vergiftigd.","s":["conflict","vergadering"]},{"id":546,"c":"manipulatie","t":"Whataboutism","b":"Kritiek beantwoorden met maar wat dacht je van... Het onderwerp veranderen zonder het eerste te adresseren.","s":["conflict","vergadering"]},{"id":547,"c":"manipulatie","t":"Tone policing","b":"Focus op hoe iets gezegd wordt om wat gezegd wordt te ontwijken. Je zegt het zo agressief. De boodschap verdwijnt.","s":["conflict"]},{"id":548,"c":"manipulatie","t":"De moving baseline","b":"Geleidelijk normen verschuiven zodat het onacceptabele normaal wordt. Elke stap is klein genoeg om te normaliseren.","s":["dagelijks","vergadering"]},{"id":549,"c":"manipulatie","t":"Financial abuse herkennen","b":"Financiële controle als machtsmiddel. Geen eigen geld, geen eigen beslissingen. Subtiel en vaak onzichtbaar.","s":["dagelijks"]},{"id":550,"c":"manipulatie","t":"De pseudo-democratie","b":"Doen alsof er een keuze is terwijl de beslissing al genomen is. Wat vinden jullie? maar het besluit staat vast.","s":["vergadering"]},{"id":551,"c":"emotie","t":"Emotionele debt","b":"Onverwerkte emoties stapelen op als schuld. De rente wordt hoger. Op een dag komt de afrekening, meestal op een onverwacht moment.","s":["dagelijks"]},{"id":552,"c":"emotie","t":"De empathie-fatigue cyclus","b":"Te lang mee-leven met andermans pijn put je eigen reserves uit. Herken het bij jezelf: afstomping is het eerste signaal.","s":["dagelijks","vergadering"]},{"id":553,"c":"emotie","t":"Emotionele triangulatie in gezinnen","b":"Bowen: twee mensen betrekken een derde om spanning te reguleren. Het kind wordt de regulator van het ouderpaar.","s":["dagelijks"]},{"id":554,"c":"emotie","t":"De paradox van emotionele controle","b":"Hoe harder je een emotie probeert te onderdrukken, hoe sterker die wordt. Acceptance werkt beter dan suppression.","s":["dagelijks","conflict"]},{"id":555,"c":"emotie","t":"Approach vs. avoidance motivatie","b":"Mensen bewegen naar beloning of weg van bedreiging. Ken iemands primaire motivatierichting en je kent hun gedrag.","s":["dagelijks","verkoop"]},{"id":556,"c":"emotie","t":"Emotioneel intellect vs. emotionele manipulatie","b":"EQ gebruiken om te verbinden = gezond. EQ gebruiken om te controleren = gevaarlijk. Het verschil: wiens belang wordt gediend?","s":["dagelijks"]},{"id":557,"c":"emotie","t":"De invloed van slaapgebrek op emotie","b":"Slaapgebrek vermindert prefrontale controle over de amygdala met 60%. Een slecht geslapen persoon is emotioneel een ander mens.","s":["dagelijks","vergadering"]},{"id":558,"c":"leugen","t":"De onverdiende ontspanning","b":"Leugenaars die denken dat ze ermee weggekomen zijn tonen plotselinge ontspanning. De timing is het verraad.","s":["vergadering","dagelijks"]},{"id":559,"c":"leugen","t":"Linguistisch distancing","b":"Leugenaars gebruiken minder eerste-persoons voornaamwoorden en meer derde-persoons. Afstand nemen van de eigen leugen.","s":["vergadering"]},{"id":560,"c":"leugen","t":"De compliant witness","b":"Iemand die te snel en te volledig bevestigt wat je zegt. Echte getuigen corrigeren details. Compliant witnesses zijn het met alles eens.","s":["vergadering"]},{"id":561,"c":"leugen","t":"De overtuigings-poging vs. de waarheid-poging","b":"Eerlijke mensen proberen je te informeren. Leugenaars proberen je te overtuigen. Het verschil zit in de energie.","s":["dagelijks","vergadering"]},{"id":562,"c":"macht","t":"De gunst-economie","b":"Bewust gunsten verlenen creëert een schuld die je later kunt innen. De krachtigste vorm van sociale valuta.","s":["vergadering","dagelijks"]},{"id":563,"c":"macht","t":"Selective incompetence als machtsstrategie","b":"Bewust zeggen dat je iets niet kunt zodat anderen het doen. Verschilt van weaponized incompetence door de strategische intentie.","s":["vergadering"]},{"id":564,"c":"macht","t":"Het Matthew-effect","b":"Wie heeft zal meer krijgen. Status trekt status aan. De rijke worden rijker. Het eerste succes is het moeilijkst.","s":["dagelijks","vergadering"]},{"id":565,"c":"macht","t":"De informele veto","b":"Zonder formele macht toch dingen blokkeren door vertraging, bureaucratie of passieve weerstand.","s":["vergadering"]},{"id":566,"c":"macht","t":"Reverse dominance hierarchy","b":"In jager-verzamelaar groepen: de groep houdt dominante individuen in toom. In moderne teams: wie domineert wordt gestraft door de groep.","s":["vergadering"]},{"id":567,"c":"gesprek","t":"De pre-emptive framing","b":"Het gesprek kaderen voordat het begint. Voordat we beginnen wil ik even zeggen... Je bepaalt de lens waardoor alles wordt gezien.","s":["vergadering","onderhandeling"]},{"id":568,"c":"gesprek","t":"Het Sokratisch stilte-moment","b":"Na een diepe vraag niet doorpraten. Laat de vraag werken. De waardevolste antwoorden komen na de langste stiltes.","s":["vergadering","dagelijks"]},{"id":569,"c":"gesprek","t":"De concessie-taal","b":"Woorden die aangeven dat iemand klaar is om toe te geven: ik neem aan, misschien heb je een punt, in zekere zin.","s":["onderhandeling","vergadering"]},{"id":570,"c":"gesprek","t":"Het anekdote-wapen","b":"Een persoonlijk verhaal inzetten op precies het juiste moment om een abstract argument concreet en emotioneel te maken.","s":["vergadering","verkoop"]},{"id":571,"c":"gesprek","t":"De bewuste naam-vergissing","b":"Een naam bewust verkeerd gebruiken om te testen of iemand durft te corrigeren. Corrigeren = assertief. Niet corrigeren = onderdanig.","s":["vergadering"]},{"id":572,"c":"groep","t":"De gemeenschappelijke vijand als bindmiddel","b":"Teams die een externe vijand delen zijn hechter. Maar de vijand kan ook worden gefabriceerd als bindmiddel.","s":["vergadering"]},{"id":573,"c":"groep","t":"Het free-rider dilemma","b":"Als iedereen ervan uitgaat dat anderen het doen, doet niemand het. Expliciete taakverdeling is de enige oplossing.","s":["vergadering"]},{"id":574,"c":"groep","t":"De devil's advocate-rol","b":"Bewust iemand aanwijzen die tegenspreekt voorkomt groepsdenken. Maar alleen als de rol wordt gerespecteerd.","s":["vergadering"]},{"id":575,"c":"groep","t":"Conformiteitsdruk vs. informatieve invloed","b":"Mensen conformeren omdat ze erbij willen horen (normatief) of omdat ze denken dat de groep het beter weet (informatief). Verschillende motivaties, zelfde gedrag.","s":["vergadering"]},{"id":576,"c":"groep","t":"Het team-toxicity-trio","b":"Eén negatief, cynisch of slecht presterend teamlid verlaagt de prestatie van het hele team met 30-40%. Eén persoon kan een heel team vergiftigen.","s":["vergadering"]},{"id":577,"c":"geavanceerd","t":"De dual process theory in lezen","b":"Systeem 1 (snel, intuïtief) levert eerste indruk. Systeem 2 (langzaam, analytisch) corrigeert. Gebruik beide bewust.","s":["dagelijks"]},{"id":578,"c":"geavanceerd","t":"De wisselwerking lichaam-emotie","b":"Het lichaam stuurt emotie net zo sterk als emotie het lichaam stuurt. Rechtop zitten maakt je daadwerkelijk zelfverzekerder.","s":["dagelijks"]},{"id":579,"c":"geavanceerd","t":"Het valkuilen-trio van mensen lezen","b":"Projectie (je eigen emoties zien), confirmatie-bias (zien wat je verwacht), en anchoring (vasthouden aan eerste indruk). Ken je vijanden.","s":["dagelijks"]},{"id":580,"c":"geavanceerd","t":"Situational awareness levels","b":"Cooper's kleurniveaus: Wit (onbewust), Geel (alert), Oranje (gefocust), Rood (actie). De meeste mensen leven in wit.","s":["dagelijks"]},{"id":581,"c":"geavanceerd","t":"De circulaire causaliteit","b":"A beïnvloedt B beïnvloedt A. Jouw spanning maakt hen gespannen maakt jou gespannener. Doorbreek de cirkel bij jezelf.","s":["dagelijks","conflict"]},{"id":582,"c":"geavanceerd","t":"Het ecological validity principe","b":"Mensen lezen in een laboratorium werkt anders dan in het echte leven. Context, stakes en relatie veranderen alles.","s":["dagelijks"]},{"id":583,"c":"geavanceerd","t":"De error management theory","b":"Bij onzekerheid: beter een vals alarm dan een gemiste bedreiging. Het verklaart waarom we eerder gevaar zien dan veiligheid.","s":["dagelijks"]},{"id":584,"c":"geavanceerd","t":"Probabilistisch denken bij lezen","b":"Geen enkel signaal is 100% betrouwbaar. Denk in waarschijnlijkheden niet zekerheden. 70% kans ≠ 100% kans.","s":["dagelijks","vergadering"]},{"id":585,"c":"geavanceerd","t":"De expertise-paradox bij lezen","b":"Beginners zien te weinig. Experts zien soms te veel en overinterpreteren. Het optimum ligt in geïnformeerde bescheidenheid.","s":["dagelijks"]},{"id":586,"c":"geavanceerd","t":"Het integratiemodel","b":"De beste mensenlezer combineert: baseline-kennis, cluster-observatie, context-analyse, culturele kalibratie en zelfbewustzijn van eigen bias.","s":["dagelijks"]},{"id":587,"c":"digitaal","t":"De follow-unfollow cyclus","b":"Iemand volgen en ontvolgen als aandachtstactiek. Manipulatieve zichtbaarheid.","s":["date","dagelijks"]},{"id":588,"c":"digitaal","t":"Het late-night DM patroon","b":"Berichten na middernacht onthullen een andere versie. Minder filter, meer eerlijkheid of meer impulsiviteit.","s":["date","dagelijks"]},{"id":589,"c":"digitaal","t":"Grammatica als persoonlijkheid","b":"Consistente goede grammatica = detail-georiënteerd of status-bewust. Bewust casual = anti-establishment of authenticiteit zoeken.","s":["dagelijks"]},{"id":590,"c":"digitaal","t":"De soft-block als conflict-vermijding","b":"Blokkeren en deblokkeren zodat iemand zelf ontvolgt. Conflict vermijden in digitale vorm.","s":["dagelijks"]},{"id":591,"c":"digitaal","t":"De story-vs-feed dynamiek","b":"Stories = in het moment. Feed = gecureerd imago. Het verschil onthult hoeveel controle iemand over hun beeld wil.","s":["dagelijks","date"]},{"id":592,"c":"digitaal","t":"Link-sharing als identiteit","b":"Wat iemand deelt onthult wat ze willen dat anderen denken dat ze lezen. Niet altijd wat ze daadwerkelijk lezen.","s":["dagelijks"]},{"id":593,"c":"digitaal","t":"De vague-post","b":"Opzettelijk vaag posten zodat mensen vragen wat er is. Aandacht trekken zonder direct te communiceren.","s":["dagelijks"]},{"id":594,"c":"digitaal","t":"Online-persona vs. DM-persona","b":"Publieke posts vs. private berichten. Het verschil = de mate van sociale wenselijkheid die ze hanteren.","s":["dagelijks","date"]},{"id":595,"c":"digitaal","t":"De subtweet-cultuur","b":"Over iemand posten zonder naam te noemen. Passieve agressie gedigitaliseerd. De doelwit weet het altijd.","s":["dagelijks","conflict"]},{"id":596,"c":"digitaal","t":"Response-format matching","b":"Antwoorden ze met hetzelfde format? Lang op lang, kort op kort = rapport. Mismatch = ongelijkheid.","s":["date","dagelijks"]},{"id":597,"c":"digitaal","t":"De status-indicatorbewaking","b":"Obsessief online-status checken = anxious attachment in digitale vorm.","s":["date"]},{"id":598,"c":"digitaal","t":"Digitale breadcrumbs","b":"Net genoeg interactie om interesse te suggereren zonder commitment. Een like hier, een emoji daar.","s":["date","dagelijks"]},{"id":599,"c":"eerste","t":"Het pratfall-effect","b":"Competente mensen worden aantrekkelijker na een kleine blunder. Incompetente worden onaantrekkelijker. Ken je positie.","s":["dagelijks","vergadering"]},{"id":600,"c":"eerste","t":"De naam-herhaling-truc","b":"Iemands naam 3x in de eerste 2 minuten herhalen = zowel onthouden als rapport bouwen.","s":["verkoop","date"]},{"id":601,"c":"eerste","t":"Eerste-ontmoeting-energie calibreren","b":"Match de energie van de setting. Te enthousiast in een rustige ruimte = wanhopig. Te kalm bij een feest = ongeïnteresseerd.","s":["date","verkoop"]},{"id":602,"c":"eerste","t":"De 4-seconden scan","b":"In 4 seconden scannen mensen: bedreiging of veilig, sekse, status, bekendheid. Evolutionair geprogrammeerd.","s":["dagelijks"]},{"id":603,"c":"eerste","t":"De deurdrempel-impressie","b":"Het moment dat je over de drempel stapt is het meest geladen. Pauzeer, glimlach, dan bewegen. Geeft de ruimte om je te registreren.","s":["vergadering","sollicitatie"]},{"id":604,"c":"eerste","t":"Het babyfat-effect","b":"Ronder gezicht met grote ogen = betrouwbaarder maar minder competent. Hoekiger gezicht = competenter maar minder warm.","s":["dagelijks"]},{"id":605,"c":"eerste","t":"Vocal warmth bij kennismaken","b":"Lager tempo, warmer timbre, dalende intonatie bij begroeting = warme eerste indruk. Hoge snelle stem = nervositeit.","s":["sollicitatie","date","verkoop"]},{"id":606,"c":"eerste","t":"De compliment-timing","b":"Een specifiek compliment in de eerste 90 seconden verankert een positieve associatie. Generiek compliment = nep.","s":["date","verkoop"]},{"id":607,"c":"eerste","t":"De terugkeer-indruk","b":"De tweede ontmoeting bepaalt of de eerste indruk wordt bevestigd of bijgesteld. Consistentie = betrouwbaarheid.","s":["dagelijks","vergadering"]},{"id":608,"c":"eerste","t":"Het similarity-attraction effect","b":"We mogen mensen die op ons lijken. Gedeelde achtergrond, interesses of uiterlijk = snellere verbinding.","s":["date","verkoop"]},{"id":609,"c":"groep","t":"Het Abilene-paradox","b":"Een groep doet iets dat niemand wil omdat iedereen denkt dat de anderen het willen. Collectieve miscommunicatie.","s":["vergadering"]},{"id":610,"c":"groep","t":"Procedurele rechtvaardigheid","b":"Mensen accepteren ongunstige uitkomsten als het proces eerlijk was. Hoe de beslissing werd genomen telt meer dan wat er besloten werd.","s":["vergadering"]},{"id":611,"c":"groep","t":"De coalitie-dynamiek","b":"In elke groep van 5+ ontstaan subgroepen. Wie met wie optrekt voorspelt hoe beslissingen vallen.","s":["vergadering"]},{"id":612,"c":"groep","t":"De observer-positie in groepen","b":"Wie achteroverleuned observeert zonder deel te nemen heeft vaak het meeste inzicht. Of het minste engagement.","s":["vergadering"]},{"id":613,"c":"groep","t":"Team developmental stages","b":"Tuckman: Forming, Storming, Norming, Performing. De meeste teams komen niet verder dan storming.","s":["vergadering"]},{"id":614,"c":"groep","t":"De shared mental model","b":"Effectieve teams hebben een gedeeld beeld van doel, rollen en proces. Hoe explicieter, hoe beter de prestatie.","s":["vergadering"]},{"id":615,"c":"groep","t":"Cross-boundary spanning","b":"De persoon die verbindingen legt tussen subgroepen heeft disproportioneel veel invloed. De brugfiguur.","s":["vergadering"]},{"id":616,"c":"groep","t":"Het social identity-effect","b":"Mensen definiëren zichzelf via groepsbehoren. Bedreiging van de groep = persoonlijke bedreiging.","s":["vergadering","dagelijks"]},{"id":617,"c":"groep","t":"De spiral of silence","b":"Mensen die denken in de minderheid te zijn zwijgen. De schijnbare meerderheid groeit daardoor. Peil actief stille stemmen.","s":["vergadering"]},{"id":618,"c":"groep","t":"De mere-presence-versterking","b":"Alleen al de aanwezigheid van anderen verandert gedrag. Publiek = meer inspanning bij eenvoudige taken, minder bij complexe.","s":["vergadering"]},{"id":619,"c":"overtuiging","t":"De verhaal-transportatie","b":"Wanneer mensen opgaan in een verhaal dalen hun tegenargumenten. Green & Brock: narratieve transportatie verlaagt weerstand.","s":["verkoop","vergadering"]},{"id":620,"c":"overtuiging","t":"Het endowment-effect","b":"Mensen hechten meer waarde aan wat ze al bezitten. Laat ze iets vasthouden/proberen en ze willen het niet meer loslaten.","s":["verkoop"]},{"id":621,"c":"overtuiging","t":"De peak-rule bij presentaties","b":"Het sterkste moment + het einde bepalen de herinnering. Zet je beste materiaal daar, niet in het midden.","s":["vergadering","verkoop"]},{"id":622,"c":"overtuiging","t":"Scarcity + social proof combo","b":"Er zijn er nog maar 3 en 500 mensen bekeken dit vandaag. De krachtigste combinatie in overtuiging.","s":["verkoop"]},{"id":623,"c":"overtuiging","t":"Het self-generation effect","b":"Mensen onthouden informatie beter als ze het zelf genereren. Stel vragen in plaats van antwoorden te geven.","s":["vergadering","verkoop"]},{"id":624,"c":"overtuiging","t":"De planning prompt","b":"Mensen die gevraagd worden wanneer en hoe ze iets gaan doen, doen het vaker dan mensen die alleen gevraagd worden of ze het gaan doen.","s":["verkoop","dagelijks"]},{"id":625,"c":"overtuiging","t":"Implementatie-intenties","b":"Als X dan Y formuleringen verhogen follow-through drastisch. Als ik thuiskom, dan ga ik 20 minuten sporten.","s":["dagelijks","verkoop"]},{"id":626,"c":"overtuiging","t":"De messenger-effect","b":"Dezelfde boodschap wordt anders ontvangen afhankelijk van wie het brengt. Autoriteit + warmte = maximale overtuiging.","s":["verkoop","vergadering"]},{"id":627,"c":"overtuiging","t":"Default-opties als nudge","b":"De standaardoptie wordt in 70-90% van de gevallen gekozen. Wie de default bepaalt, bepaalt de keuze.","s":["verkoop","vergadering"]},{"id":628,"c":"overtuiging","t":"Het curiosity gap","b":"Een informatiekloof creëren die ze willen dichten. Wat er daarna gebeurde veranderde alles. Onweerstaanbaar voor het brein.","s":["verkoop","vergadering"]},{"id":629,"c":"psycho","t":"Het mere ownership effect","b":"Iets bezitten maakt het waardevoller in je eigen ogen. Geldt ook voor ideeën. Mijn idee > hun identiek idee.","s":["dagelijks","vergadering"]},{"id":630,"c":"psycho","t":"De optimisme-bias","b":"Mensen onderschatten systematisch de kans op negatieve uitkomsten voor zichzelf. Het overkomt mij niet. Tot het wel gebeurt.","s":["dagelijks"]},{"id":631,"c":"psycho","t":"Moral credentials effect","b":"Na bewezen moreel gedrag voelen mensen zich gerechtigd om minder moreel te handelen. De balans wordt onbewust bijgehouden.","s":["dagelijks"]},{"id":632,"c":"psycho","t":"Het nocebo-effect","b":"Negatieve verwachtingen creëren negatieve uitkomsten. Het tegenovergestelde van placebo maar even krachtig.","s":["dagelijks"]},{"id":633,"c":"emotie","t":"Emotioneel labor herkennen","b":"Arlie Hochschild: de inspanning om emoties te reguleren als onderdeel van werk. Stewardessen, verplegers, verkopers. Het kost en het slijt.","s":["dagelijks","vergadering"]},{"id":634,"c":"emotie","t":"De hedonic treadmill","b":"Mensen keren terug naar hun emotionele basislijn na positieve of negatieve gebeurtenissen. Permanent geluk door externe factoren is een illusie.","s":["dagelijks"]},{"id":635,"c":"emotie","t":"Microdoses van vreugde","b":"Kleine positieve ervaringen stapelen op tot significante welvaartsverbetering. Eén glimlach, één compliment, één moment van aanwezigheid.","s":["dagelijks"]},{"id":636,"c":"emotie","t":"De affect-labeling paradox","b":"Het benoemen van andermans emotie kalmeert hen maar het benoemen van je eigen emotie kan ze juist versterken bij ruminatie.","s":["dagelijks","conflict"]},{"id":637,"c":"leugen","t":"De handpalm-oriëntatie bij verklaring","b":"Handpalmen naar boven tijdens verklaring = openheid/waarheid. Naar beneden = controle/verbergen. Achter rug = maximaal verbergen.","s":["vergadering"]},{"id":638,"c":"leugen","t":"Het temporeel ankerpunt","b":"Vraag naar specifieke tijden: hoe laat precies? Waar was je om 15:00? Leugenaars hebben moeite met temporele precisie.","s":["vergadering"]},{"id":639,"c":"macht","t":"De informatie-dieet controle","b":"Bepalen welke informatie iemand te zien krijgt = hun wereldbeeld vormgeven. De curator van informatie heeft de ultieme macht.","s":["vergadering","dagelijks"]},{"id":640,"c":"macht","t":"Het sponsorship-effect","b":"Wie jouw naam noemt als je er niet bent. Sponsors hebben meer invloed op je carrière dan mentoren.","s":["vergadering"]},{"id":641,"c":"gesprek","t":"De bewuste onderschatting","b":"Jezelf iets kleiner maken dan je bent zodat de ander zich comfortabel voelt om groter te zijn. Strategische bescheidenheid.","s":["vergadering","verkoop"]},{"id":642,"c":"gesprek","t":"Het voorwaardelijk luisteren","b":"Ik luister alleen als ik het ermee eens ben. Herken wanneer iemand stopt met luisteren — hun gezicht verandert.","s":["vergadering","conflict"]},{"id":643,"c":"gesprek","t":"De verrassingsreactie-test","b":"Iets onverwachts zeggen en de onbewaakte reactie observeren. Eerste halve seconde = echte reactie.","s":["vergadering","dagelijks"]},{"id":644,"c":"geavanceerd","t":"Het base rate neglect","b":"Mensen negeren statistische basispercentages ten gunste van levendige specifieke voorbeelden. Een vals positief bij zeldzame signalen is waarschijnlijker dan een echt positief.","s":["dagelijks"]},{"id":645,"c":"geavanceerd","t":"De dialectische benadering","b":"Twee ogenschijnlijk tegenstrijdige waarheden kunnen tegelijk bestaan. Iemand kan oprecht zijn EN strategisch handelen.","s":["dagelijks","vergadering"]},{"id":646,"c":"onderhandeling","t":"De machtsmeter: wie heeft het meer nodig","b":"Elke onderhandeling wordt bepaald door wie het meer nodig heeft. Die persoon geeft meer op. Ken je eigen nood-niveau.","s":["onderhandeling"]},{"id":647,"c":"onderhandeling","t":"Het nee als begin","b":"Voss: een nee is niet het einde maar het begin. Na nee voelt de ander zich veilig en opent het echte gesprek.","s":["onderhandeling"]},{"id":648,"c":"onderhandeling","t":"De black swan jagen","b":"Onbekende informatie die alles verandert. Zoek naar wat je niet weet dat je niet weet.","s":["onderhandeling"]},{"id":649,"c":"onderhandeling","t":"Het face-saving principe","b":"Mensen zullen alles doen om gezichtsverlies te voorkomen. Geef ze altijd een elegante uitweg.","s":["onderhandeling","conflict"]},{"id":650,"c":"onderhandeling","t":"De constraint-opening","b":"Ik heb maar 10 minuten. Ik heb maar X budget. Een beperking delen dwingt de ander om daarbinnen te werken.","s":["onderhandeling","verkoop"]},{"id":651,"c":"onderhandeling","t":"Principled concessions","b":"Elke concessie moet een reden hebben. Ik kan dit doen omdat... Onbeargumenteerde concessies nodigen uit tot meer vragen.","s":["onderhandeling"]},{"id":652,"c":"onderhandeling","t":"De samenvattende parafrase","b":"De hele deal samenvatten in jouw woorden vlak voor akkoord. Wie samenvat bepaalt de interpretatie.","s":["onderhandeling"]},{"id":653,"c":"onderhandeling","t":"Batna-bluf herkennen","b":"Wanneer iemand hun alternatieven overdrijft: ze noemen ze te snel, te specifiek, of te perfect.","s":["onderhandeling"]},{"id":654,"c":"onderhandeling","t":"De walk-away moment","b":"Het krachtigste moment in elke onderhandeling is wanneer je bereid bent om weg te lopen. En het ook doet.","s":["onderhandeling"]},{"id":655,"c":"onderhandeling","t":"Multi-issue vs single-issue","b":"Eén punt onderhandelen = zero-sum. Meerdere punten = creatieve ruimte. Bundel altijd.","s":["onderhandeling"]},{"id":656,"c":"macht","t":"De proximity-to-power strategie","b":"Fysiek dicht bij de machtigste persoon zijn = geassocieerde macht. De rechterhand-positie.","s":["vergadering"]},{"id":657,"c":"macht","t":"Gatekeeping als macht","b":"Wie bepaalt wie er in de vergadering zit, wie de agenda maakt, wie het verslag schrijft? Dat is waar de echte macht zit.","s":["vergadering"]},{"id":658,"c":"macht","t":"Het normaliseren van eigen privileges","b":"Machtige mensen normaliseren hun voordelen als verdienst. Ik heb er hard voor gewerkt. Privilege is onzichtbaar voor wie het heeft.","s":["dagelijks","vergadering"]},{"id":659,"c":"macht","t":"De asymmetrie van initiatief","b":"Wie het initiatief neemt heeft macht. Wie reageert volgt. Wees de initiator.","s":["vergadering","dagelijks"]},{"id":660,"c":"macht","t":"Expert-macht vs. positie-macht","b":"Een expert zonder titel kan machtiger zijn dan een manager. Maar alleen als de expertise zichtbaar is.","s":["vergadering"]},{"id":661,"c":"macht","t":"De soft power catalogue","b":"Charme, expertise, netwerk, informatie, reputatie. De vijf bronnen van macht die geen titel vereisen.","s":["vergadering","dagelijks"]},{"id":662,"c":"gesprek","t":"De strategische herhaling","b":"Hetzelfde punt drie keer in andere woorden. De eerste keer horen ze het. De tweede keer begrijpen ze het. De derde keer onthouden ze het.","s":["vergadering","verkoop"]},{"id":663,"c":"gesprek","t":"Het emotionele contract checken","b":"Aan het begin van moeilijke gesprekken: wat willen we allebei bereiken hiermee? Het proces alignen voor de inhoud.","s":["conflict","vergadering"]},{"id":664,"c":"gesprek","t":"De bewuste onderbreking","b":"Soms is onderbreken nodig. Doe het met mag ik even? in plaats van maar... Verschil tussen respectvol ingrijpen en domineren.","s":["vergadering","conflict"]},{"id":665,"c":"gesprek","t":"Het validatie-spectrum","b":"Van minimaal (hmm, ja) tot maximaal (dat is volkomen logisch gezien wat je hebt meegemaakt). Kies het juiste niveau.","s":["dagelijks","conflict"]},{"id":666,"c":"gesprek","t":"De terugkoppeling naar kern","b":"Wanneer gesprekken afdwalen: wat was de oorspronkelijke vraag? Terugbrengen naar de kern zonder de ander af te snijden.","s":["vergadering"]},{"id":667,"c":"gesprek","t":"Het reflectieve stilte-moment","b":"Na iets belangrijks: bewust 3 seconden stilte. Geeft de woorden gewicht en de luisteraar verwerkingstijd.","s":["vergadering","dagelijks"]},{"id":668,"c":"leugen","t":"De strategische herhaling-test","b":"Stel dezelfde vraag later anders geformuleerd. Consistente waarheid houdt stand. Scripts tonen scheuren.","s":["vergadering"]},{"id":669,"c":"leugen","t":"Het anchor point verschil","b":"Leugenaars hebben geen emotionele ankers in hun verhaal. Echt geheugen heeft zintuiglijke details: ik rook koffie, de zon scheen.","s":["vergadering","dagelijks"]},{"id":670,"c":"leugen","t":"De fysiologische mismatch","b":"Verhaal over een enge situatie maar volledig ontspannen lichaam = incongruentie. Het lichaam herleeft echte herinneringen.","s":["vergadering"]},{"id":671,"c":"leugen","t":"De spontane correctie","b":"Eerlijke mensen corrigeren zichzelf spontaan: wacht nee het was dinsdag. Leugenaars staan niet toe dat hun script afwijkt.","s":["vergadering","dagelijks"]},{"id":672,"c":"leugen","t":"Het embedded command in leugens","b":"Geloof me, eerlijk waar, ik zweer het. Imperatieve commando's om te geloven = de leugenaar weet dat het verhaal niet sterk genoeg is.","s":["dagelijks","vergadering"]},{"id":673,"c":"psycho","t":"Het Pygmalion-effect","b":"Hogere verwachtingen leiden tot betere prestaties. Rosenthal-experiment: leraren die dachten dat leerlingen slim waren kregen slimmere leerlingen.","s":["vergadering","dagelijks"]},{"id":674,"c":"psycho","t":"Het Golem-effect","b":"Lage verwachtingen leiden tot slechtere prestaties. Het tegenovergestelde van Pygmalion. Je verwachtingen scheppen iemands werkelijkheid.","s":["vergadering","dagelijks"]},{"id":675,"c":"psycho","t":"De schaarste-mentaliteit","b":"Wanneer iets schaars is (geld, tijd, aandacht) vernauwt het denken. Tunnelvisie op het schaarse ten koste van al het andere.","s":["dagelijks"]},{"id":676,"c":"psycho","t":"Het effort-justification effect","b":"Hoe moeilijker je ergens voor hebt gewerkt, hoe meer je het waardeert. Verklaart waarom zware initiaties loyaliteit creëren.","s":["dagelijks","vergadering"]},{"id":677,"c":"psycho","t":"De endowment-effect bij overtuigingen","b":"Mensen hechten meer waarde aan overtuigingen die ze al hebben dan aan nieuwe informatie. Bezit = waarde, ook bij ideeën.","s":["dagelijks","vergadering"]},{"id":678,"c":"psycho","t":"Learned helplessness","b":"Seligman: na herhaalde oncontroleerbare negatieve ervaringen stoppen mensen met proberen, zelfs als ze later controle krijgen.","s":["dagelijks"]},{"id":679,"c":"psycho","t":"De false consensus bias","b":"Mensen overschatten hoeveel anderen het met hen eens zijn. Iedereen denkt toch zo. Nee, dat doen ze niet.","s":["dagelijks","vergadering"]},{"id":680,"c":"psycho","t":"De curse of knowledge","b":"Eenmaal iets wetend kun je je niet meer voorstellen hoe het is om het niet te weten. Experts onderschatten de complexiteit van hun uitleg.","s":["vergadering","verkoop"]},{"id":681,"c":"psycho","t":"Het clustering illusion","b":"Patronen zien in willekeurige data. Het brein zoekt altijd betekenis, ook waar die niet is.","s":["dagelijks"]},{"id":682,"c":"psycho","t":"Zero-sum thinking","b":"Aannemen dat iemands winst jouw verlies is. Vaak onwaar maar diep geworteld. Herken het bij jezelf en de ander.","s":["dagelijks","onderhandeling"]},{"id":683,"c":"emotie","t":"De doorgeschoten empathie","b":"Te veel empathie leidt tot emotionele uitputting en slechte beslissingen. Compassie (actiegericht) is duurzamer dan empathie (meeleven).","s":["dagelijks"]},{"id":684,"c":"emotie","t":"Het ruminatie-alarm","b":"Hetzelfde probleem keer op keer doordenken zonder oplossing = ruminatie. Het voelt productief maar is destructief.","s":["dagelijks"]},{"id":685,"c":"emotie","t":"De rebound-emotie","b":"Onderdrukte emoties komen versterkt terug. Het strand-bal-effect: hoe harder je duwt, hoe hoger hij springt.","s":["dagelijks","conflict"]},{"id":686,"c":"emotie","t":"Emotioneel geheugen vertekening","b":"Hoe je je nu voelt kleurt hoe je het verleden herinnert. Boos nu = het was altijd al slecht. Dat is niet waar.","s":["dagelijks","conflict"]},{"id":687,"c":"emotie","t":"De veilige haven vs. secure base","b":"Bowlby: een gehechtheidsfiguur is zowel veilige haven (bij stress) als secure base (bij exploratie). Beide nodig.","s":["date","dagelijks"]},{"id":688,"c":"sociaal","t":"De Matthew-effect in gesprekken","b":"Wie al veel aandacht krijgt, krijgt meer. Wie stil is, wordt stiller. Bewust ruimte maken voor stille stemmen.","s":["vergadering"]},{"id":689,"c":"sociaal","t":"Het chameleon-effect in groepen","b":"Mensen passen onbewust hun gedrag aan de groep aan. Accent, woordkeus, zelfs morele standaarden verschuiven.","s":["dagelijks","vergadering"]},{"id":690,"c":"sociaal","t":"De parasociale relatie","b":"Eenrichtings-relatie met publieke figuren. Ze voelen bekend maar kennen jou niet. Herken het bij jezelf en anderen.","s":["dagelijks"]},{"id":691,"c":"sociaal","t":"Social exchange theory","b":"Elke relatie is een kosten-baten analyse. Wanneer de kosten structureel hoger zijn dan de baten, vertrekt iemand.","s":["dagelijks","date"]},{"id":692,"c":"sociaal","t":"Het zero-acquaintance oordeel","b":"Oordelen op basis van uiterlijk zonder interactie. Verrassend accuraat voor extraversie en dominantie. Slecht voor andere traits.","s":["dagelijks"]},{"id":693,"c":"geavanceerd","t":"Het kalibratie-logboek","b":"Houd bij wanneer je lezingen klopten en wanneer niet. Meta-analyse van je eigen accuraatheid maakt je beter.","s":["dagelijks"]},{"id":694,"c":"geavanceerd","t":"De pre-mortem analyse","b":"Voordat je een lezing vastlegt: stel dat ik fout zit. Waarom? Dwingt tegendenken en voorkomt tunnelvisie.","s":["dagelijks","vergadering"]},{"id":695,"c":"geavanceerd","t":"Het signaal-ruisverhouding verbeteren","b":"Meer data ≠ betere lezing. Leer welke signalen ruis zijn en welke echt. Kwaliteit boven kwantiteit.","s":["dagelijks"]},{"id":696,"c":"geavanceerd","t":"De contextual reset","b":"Na een verkeerde lezing: reset je beeld volledig. Begin opnieuw zonder de oude interpretatie. Cognitief moeilijk maar noodzakelijk.","s":["dagelijks"]},{"id":697,"c":"geavanceerd","t":"Het intentie-gedrag gat","b":"Mensen menen wat ze zeggen op het moment dat ze het zeggen. Maar intentie voorspelt gedrag slechts matig. Beoordeel op patronen van actie.","s":["dagelijks"]},{"id":698,"c":"geavanceerd","t":"De basale empathie-respons","b":"Voor je analyseert: voel. Je eigen emotionele reactie op iemand is een valide datapunt. Niet het enige, maar een belangrijk eerste signaal.","s":["dagelijks"]},{"id":699,"c":"geavanceerd","t":"Het zoek-de-tegenstelling principe","b":"Als alles naar X wijst, zoek bewust naar Y. De meest waardevolle informatie zit in wat er niet past.","s":["dagelijks","vergadering"]},{"id":700,"c":"acteur","t":"Emotioneel Geheugen (Stanislavski)","b":"Gebruik persoonlijke herinneringen om authentieke emoties op te roepen. Graaf in je eigen verleden om de emotie van een personage te voelen. Krachtig voor herkenning van echte vs gespeelde emoties bij anderen.","s":["dagelijks","sollicitatie"]},{"id":701,"c":"acteur","t":"De Magische 'Als' (Stanislavski)","b":"Stel je voor: 'Wat zou ik doen áls ik in deze situatie was?' Dit activeert empathie en verbeelding. Gebruik het om andermans perspectief te begrijpen zonder te oordelen.","s":["vergadering","conflict"]},{"id":702,"c":"acteur","t":"Given Circumstances","b":"Analyseer alle omstandigheden die gedrag beïnvloeden: wie, wat, waar, wanneer, waarom. Elk detail telt. Pas dit toe om iemands context te begrijpen vóór je oordeelt.","s":["vergadering","onderhandeling"]},{"id":703,"c":"acteur","t":"Super-Objective","b":"Het overkoepelende doel dat al iemands acties stuurt. Vraag: wat wil deze persoon écht bereiken in het leven? Alles wat ze doen is een tactiek richting dat doel.","s":["onderhandeling","verkoop"]},{"id":704,"c":"acteur","t":"Through-line of Action","b":"De rode draad van intenties die elk moment met het volgende verbindt. Kijk naar de consistentie in iemands keuzes — het onthult hun ware motivatie.","s":["vergadering","dagelijks"]},{"id":705,"c":"acteur","t":"Communion (Verbinding)","b":"Echte uitwisseling van energie tussen mensen. Let op wanneer er werkelijke verbinding is versus wanneer iemand 'speelt'. Authentieke communion is voelbaar.","s":["date","dagelijks"]},{"id":706,"c":"acteur","t":"Tempo-Ritme","b":"Elk mens heeft een innerlijk tempo-ritme dat verschuift met emotie. Stress versnelt, depressie vertraagt. Lees iemands innerlijke staat door hun ritme te observeren.","s":["dagelijks","vergadering"]},{"id":707,"c":"acteur","t":"Methode van Fysieke Acties","b":"Begin bij het lichaam, niet bij de emotie. Fysieke handelingen onthullen innerlijke toestanden. Iemand die steeds zijn handen wast, probeert onbewust iets 'schoon' te maken.","s":["dagelijks","sollicitatie"]},{"id":708,"c":"acteur","t":"Units & Objectives (Eenheden)","b":"Verdeel elk gesprek in eenheden met elk een eigen doel. Per eenheid verschuift de tactiek. Herken wanneer iemand van strategie wisselt mid-gesprek.","s":["onderhandeling","vergadering"]},{"id":709,"c":"acteur","t":"De Vierde Wand Doorbreken","b":"Het bewust betrekken van het publiek/de ander. Let op wanneer iemand je bewust 'binnentrekt' in hun verhaal — het is een machtige overtuigingstechniek.","s":["verkoop","dagelijks"]},{"id":710,"c":"acteur","t":"Repetition Exercise (Meisner)","b":"Herhaal wat je observeert bij de ander: 'Je glimlacht.' 'Ja, ik glimlach.' Dit dwingt je om echt te kijken en te luisteren. De basis van alle menselijke observatie.","s":["dagelijks","date"]},{"id":711,"c":"acteur","t":"Emotional Preparation (Meisner)","b":"Bereid je emotioneel voor vóór een interactie. Ga een onderhandeling niet in vanuit een lege staat. Kies bewust de emotionele frequentie die je wilt uitstralen.","s":["onderhandeling","sollicitatie"]},{"id":712,"c":"acteur","t":"Moment-to-Moment Leven","b":"Reageer op wat er nú gebeurt, niet op je plan. De meeste mensen missen signalen omdat ze in hun hoofd zitten. Wees aanwezig bij elk micro-moment.","s":["date","conflict"]},{"id":713,"c":"acteur","t":"Doing vs Being","b":"Het verschil tussen 'doen alsof' en 'zijn'. Herken wanneer iemand een rol speelt versus wanneer ze authentiek zijn. Doen is zichtbaar geforceerd, zijn stroomt.","s":["sollicitatie","dagelijks"]},{"id":714,"c":"acteur","t":"Living Truthfully (Meisner)","b":"Waarachtig leven in denkbeeldige omstandigheden. De kern: authenticiteit is niet wat je zegt, maar hoe congruent je bent. Incongruentie verraadt onwaarheid.","s":["dagelijks","vergadering"]},{"id":715,"c":"acteur","t":"Het Werkwoord als Actie","b":"Elke zin die iemand uitspreekt heeft een werkwoord-intentie: overtuigen, smeken, dreigen, verleiden. Luister voorbij de woorden naar het onderliggende werkwoord.","s":["onderhandeling","conflict"]},{"id":716,"c":"acteur","t":"Pinch & Ouch (Meisner)","b":"De 'pinch' is de stimulus, de 'ouch' de reactie. Observeer: welke stimuli roepen welke reacties op bij iemand? Dit onthult hun gevoelige punten.","s":["conflict","dagelijks"]},{"id":717,"c":"acteur","t":"Independent Activity","b":"Geef iemand een taak terwijl je ze observeert. Onder druk van een activiteit vallen maskers af. Let op hoe iemand omgaat met frustratie bij een taak.","s":["sollicitatie","vergadering"]},{"id":718,"c":"acteur","t":"Psychological Gesture (Chekhov)","b":"Eén fysiek gebaar dat de hele psychologie van een persoon samenvat. Observeer: wat is het kenmerkende gebaar van iemand? Het onthult hun kernhouding tot de wereld.","s":["dagelijks","vergadering"]},{"id":719,"c":"acteur","t":"Atmospheres (Chekhov)","b":"Elke ruimte en groep heeft een atmosfeer die gedrag beïnvloedt. Leer de 'sfeer lezen' wanneer je een kamer binnenkomt. Het vertelt je alles vóór er een woord is gezegd.","s":["vergadering","dagelijks"]},{"id":720,"c":"acteur","t":"Imaginary Body (Chekhov)","b":"Stel je voor dat je het lichaam van de ander aanneemt. Hoe voelt het om zo te staan, te bewegen? Dit geeft intuïtief inzicht in hun emotionele staat.","s":["dagelijks","sollicitatie"]},{"id":721,"c":"acteur","t":"Qualities of Movement (Chekhov)","b":"Elke beweging heeft een kwaliteit: vloeiend, staccato, zwaar, licht. De kwaliteit van iemands bewegingen onthult hun innerlijke dynamiek meer dan woorden.","s":["dagelijks","date"]},{"id":722,"c":"acteur","t":"Radiating & Receiving","b":"Sommige mensen stralen energie uit, anderen absorberen. Let op wie de energie in een ruimte uitzendt en wie ontvangt. Dit bepaalt de onzichtbare machtsdynamiek.","s":["vergadering","dagelijks"]},{"id":723,"c":"acteur","t":"Archetypen Herkennen (Chekhov)","b":"Mensen vallen vaak in archetypische patronen: de held, de mentor, de trickster, het slachtoffer. Herken het archetype en je voorspelt het gedrag.","s":["dagelijks","vergadering"]},{"id":724,"c":"acteur","t":"Staccato-Legato Analyse","b":"Is iemands communicatie staccato (kort, afgekapt, gespannen) of legato (vloeiend, verbonden, ontspannen)? De wisseling onthult stress en comfort.","s":["vergadering","onderhandeling"]},{"id":725,"c":"acteur","t":"Het Creatieve Niets","b":"De pauze vóór actie waarin alle mogelijkheden bestaan. Observeer wat iemand doet in het moment van stilte — het onthult hun defaultreactie.","s":["onderhandeling","sollicitatie"]},{"id":726,"c":"acteur","t":"Substitution (Uta Hagen)","b":"Vervang een onbekende situatie door een bekende uit je eigen leven. Gebruik dit om empathie op te bouwen: 'Waar lijkt dit op in mijn ervaring?'","s":["conflict","dagelijks"]},{"id":727,"c":"acteur","t":"Endowment (Hagen)","b":"Ken extra betekenis toe aan objecten of personen. Let op hoe iemand hun telefoon, ring of tas behandelt — het onthult emotionele lading en gehechtheid.","s":["date","dagelijks"]},{"id":728,"c":"acteur","t":"Sense Memory (Zintuiggeheugen)","b":"Herinneringen opgeslagen in de zintuigen. Let op wanneer iemand reageert op een geur, geluid of aanraking — het activeert diepere emotionele lagen.","s":["dagelijks","date"]},{"id":729,"c":"acteur","t":"Inner Monologue Lezen","b":"Iedereen heeft een doorlopende innerlijke dialoog. De micro-expressies, zuchtjes en blikveranderingen verraden wat iemand écht denkt terwijl ze luisteren.","s":["vergadering","onderhandeling"]},{"id":730,"c":"acteur","t":"Working Off the Partner","b":"Alles wat je doet is een reactie op de ander. Stop met plannen en reageer echt. De kwaliteit van een gesprek hangt af van hoe goed je de ander leest en erop inspeelt.","s":["date","onderhandeling"]},{"id":731,"c":"acteur","t":"Respect for Object (Hagen)","b":"Hoe iemand met objecten omgaat onthult hun karakter. Slordig met andermans spullen? Onverschillig voor grenzen. Voorzichtig? Respectvol maar mogelijk angstig.","s":["dagelijks","sollicitatie"]},{"id":732,"c":"acteur","t":"Destination (Hagen)","b":"Waar kom je vandaan en waar ga je naartoe — fysiek én emotioneel? Observeer iemands 'trajectory': het verhaal dat hun lichaamstaal vertelt over wat ze net hebben meegemaakt.","s":["dagelijks","vergadering"]},{"id":733,"c":"acteur","t":"Verbeelding boven Emotie (Adler)","b":"Gebruik verbeelding, niet je eigen pijn, om anderen te begrijpen. Stel je hun wereld voor in plaats van te projecteren. Dit voorkomt emotionele uitputting.","s":["dagelijks","conflict"]},{"id":734,"c":"acteur","t":"Size of Action (Adler)","b":"De grootte van iemands acties onthult de grootte van hun emotie. Overdreven kleine acties = onderdrukte gevoelens. Overdreven grote = compensatie.","s":["vergadering","dagelijks"]},{"id":735,"c":"acteur","t":"Script Interpretation voor het Echte Leven","b":"Lees situaties als scenes: wat is het conflict, wie wil wat, wat staat er op het spel? Deze analytische blik onthult de structuur achter chaos.","s":["conflict","vergadering"]},{"id":736,"c":"acteur","t":"Sociale Context als Sleutel (Adler)","b":"Gedrag is onbegrijpelijk zonder sociale context. Dezelfde persoon gedraagt zich anders op werk, thuis, bij vrienden. Lees altijd de context mee.","s":["dagelijks","vergadering"]},{"id":737,"c":"acteur","t":"De Noblesse van het Personage","b":"Zoek het beste in mensen, niet het slechtste. Adler geloofde dat elk personage — en elk mens — een vorm van nobelheid heeft. Dit opent observatie.","s":["dagelijks","date"]},{"id":738,"c":"acteur","t":"Affective Memory (Strasberg)","b":"Het bewust oproepen van emoties uit het verleden om huidig gedrag te voeden. Let op wanneer iemands reactie disproportioneel is — er speelt een oudere emotie mee.","s":["conflict","dagelijks"]},{"id":739,"c":"acteur","t":"Private Moment Technique","b":"Observeer wat mensen doen als ze denken dat niemand kijkt. De 'private momenten' — hoe ze wachten, hun telefoon checken, naar zichzelf kijken — onthullen de echte persoon.","s":["dagelijks","sollicitatie"]},{"id":740,"c":"acteur","t":"Animal Exercise (Strasberg)","b":"Welk dier belichaamt iemands energie? Een havik (alert, roofzuchtig), een beer (rustig maar gevaarlijk), een hert (schrikachtig, vluchtgeneigd)? Het geeft intuïtief inzicht.","s":["dagelijks","vergadering"]},{"id":741,"c":"acteur","t":"Song & Dance Exercise","b":"Onder druk van ritme en beweging vallen maskers af. Let op hoe iemand reageert op muziek of spontaan bewegen — het onthult hun relatie met controle en loslaten.","s":["dagelijks","date"]},{"id":742,"c":"acteur","t":"Cold Reading voor Acteurs","b":"Binnen seconden een onbekende tekst of persoon 'lezen'. Train jezelf om eerste indrukken snel en accuraat te formuleren. De eerste 7 seconden bevatten 80% van de informatie.","s":["sollicitatie","dagelijks"]},{"id":743,"c":"acteur","t":"Auditie-Observatie","b":"In een auditiesetting toont iedereen hun beste versie. Kijk voorbij de presentatie naar de wachtkamer: dáár zie je wie iemand echt is onder druk.","s":["sollicitatie","verkoop"]},{"id":744,"c":"acteur","t":"Emotionele Omschakeling","b":"De snelheid waarmee iemand van emotie wisselt onthult emotionele flexibiliteit óf instabiliteit. Razendsnelle switches kunnen wijzen op acteergedrag.","s":["dagelijks","conflict"]},{"id":745,"c":"acteur","t":"Camera vs Podium Lezen","b":"Sommige mensen zijn 'camera-mensen' (subtiel, intiem, klein) en anderen 'podium-mensen' (groot, expressief, luid). Het medium bepaalt hun comfort en authenticiteit.","s":["vergadering","dagelijks"]},{"id":746,"c":"acteur","t":"Tegenspel-Analyse","b":"Wie speelt mee en wie speelt tegen? In elk gesprek zijn er mensen die jouw 'scene' ondersteunen en mensen die een andere scene willen spelen. Herken het tegenspel.","s":["vergadering","conflict"]},{"id":747,"c":"acteur","t":"Blocking als Psychologie","b":"De fysieke positionering in een ruimte is niet toevallig. Wie gaat waar staan of zitten? De 'blocking' onthult hiërarchie, allianties en vermijding.","s":["vergadering","dagelijks"]},{"id":748,"c":"acteur","t":"Subtekst Decoderen","b":"Wat wordt er gezegd vs wat wordt er bedoeld? De subtekst is de echte boodschap. Train jezelf om de laag onder de woorden te horen.","s":["onderhandeling","dagelijks"]},{"id":749,"c":"acteur","t":"Status-Instrumenten op Toneel","b":"Hoge status: langzaam bewegen, stiltes vullen, oogcontact houden. Lage status: snel bewegen, stiltes vullen met woorden, blik afwenden. Herken de statusspellen.","s":["vergadering","onderhandeling"]},{"id":750,"c":"acteur","t":"De Emotie-Bibliotheek","b":"Bouw een persoonlijk archief van emotionele ervaringen. Hoe breder je eigen emotionele range, hoe beter je emoties bij anderen herkent en plaatst.","s":["dagelijks","date"]},{"id":751,"c":"acteur","t":"Micro-expressies Reproduceren","b":"Door zelf micro-expressies na te doen, leer je ze herkennen. Oefen voor de spiegel: angst, walging, verrassing, minachting. Herkenning volgt uit ervaring.","s":["dagelijks","sollicitatie"]},{"id":752,"c":"acteur","t":"Stemtechnieken voor Authentiek Lezen","b":"Resonantie, toonhoogte, ademsteun — de stem liegt zelden. Een hoge stem bij een 'zelfverzekerd' persoon? De stem onthult de waarheid achter de woorden.","s":["dagelijks","onderhandeling"]},{"id":753,"c":"acteur","t":"Monoloog-Opbouw Analyse","b":"Hoe bouwt iemand een verhaal op? Begin-midden-einde? Of chaotisch? De structuur van iemands monoloog onthult hun denkpatroon en emotionele staat.","s":["vergadering","dagelijks"]},{"id":754,"c":"acteur","t":"De Regisseursblik","b":"Bekijk elke sociale situatie alsof je een scene regisseert. Wie is de protagonist? Wat is het conflict? Waar ligt de climax? Deze meta-blik geeft overzicht.","s":["vergadering","dagelijks"]},{"id":755,"c":"groep","t":"Groepspolarisatie","b":"Groepen nemen extremere standpunten in dan individuen. Na discussie verschuift de groepsmening naar het extreme van de initiële neiging.","s":["vergadering","dagelijks"]},{"id":756,"c":"groep","t":"Free Rider Effect","b":"In groepen verminderen sommigen hun inspanning omdat anderen het werk doen. Herken wie meeliftt en wie draagt.","s":["vergadering","dagelijks"]},{"id":757,"c":"groep","t":"Informatie-Cascade","b":"Mensen volgen de keuze van voorgangers, ongeacht eigen informatie. De eerste twee beslissers bepalen vaak de richting van de hele groep.","s":["vergadering","verkoop"]},{"id":758,"c":"groep","t":"Ringelmann-Effect","b":"Hoe groter de groep, hoe minder individuele inspanning. Bij touwtrekken trekt niemand harder dan solo. Meet individuele bijdragen.","s":["vergadering","dagelijks"]},{"id":759,"c":"groep","t":"Cross-Cutting Cleavages","b":"Groepen met overlappende lidmaatschappen (sport + werk + kerk) hebben minder intern conflict. Enkelvoudige identiteitsgroepen polariseren sneller.","s":["dagelijks","vergadering"]},{"id":760,"c":"groep","t":"Tokenism Herkennen","b":"Eén persoon uit een minderheidsgroep wordt opgenomen om diversiteit te suggereren. Let op of de token echte invloed heeft of slechts decoratie is.","s":["vergadering","dagelijks"]},{"id":761,"c":"groep","t":"Norm Entrepreneurship","b":"Eén persoon kan een nieuwe groepsnorm vestigen door die zichtbaar en consistent voor te leven. De 'norm-ondernemer' verandert cultuur.","s":["vergadering","dagelijks"]},{"id":762,"c":"groep","t":"Intergroup Contact Effect","b":"Positief contact tussen groepen vermindert vooroordelen, mits er gelijke status, gemeenschappelijke doelen en institutionele steun is.","s":["dagelijks","vergadering"]},{"id":763,"c":"groep","t":"Social Loafing Doorbreken","b":"Maak individuele bijdragen zichtbaar, verhoog betrokkenheid en maak de taak betekenisvol. Drie tegengiften voor groepsluiheid.","s":["vergadering","dagelijks"]},{"id":764,"c":"groep","t":"De Zwakste Schakel Dynamiek","b":"Groepsprestatie wordt bepaald door het zwakste lid bij taken die coördinatie vereisen. Identificeer de bottleneck-persoon.","s":["vergadering","dagelijks"]},{"id":765,"c":"groep","t":"Coalition Formation","b":"In groepen van 3+ vormen zich automatisch coalities. Twee tegen één is de meest stabiele coalitie. Let op wie wie uitsluit.","s":["vergadering","conflict"]},{"id":766,"c":"groep","t":"Collective Effervescence","b":"Het gevoel van eenheid en opwinding in een groep bij gezamenlijke rituelen. Van voetbalstadions tot boardrooms — het is krachtig maar manipuleerbaar.","s":["dagelijks","vergadering"]},{"id":767,"c":"groep","t":"Deïndividuatie","b":"In groepen verliezen mensen hun individuele identiteit en remming. Uniformen, maskers en anonimiteit versterken dit effect.","s":["dagelijks","vergadering"]},{"id":768,"c":"groep","t":"Groupshift","b":"Na groepsdiscussie verschuift de gemiddelde mening. Voorzichtige groepen worden voorzichtiger, riskante groepen riskanter.","s":["vergadering","onderhandeling"]},{"id":769,"c":"groep","t":"Sociometrische Sterren","b":"In elke groep zijn er populaire knooppunten (sterren) en geïsoleerde leden. Map het onzichtbare netwerk door te kijken wie naar wie kijkt.","s":["vergadering","dagelijks"]},{"id":770,"c":"macht","t":"Statuslift en -daling","b":"Let op wie anderen subtiel verhoogt of verlaagt in status. Een compliment geven is een statuslift; iemand interrumperen is een statusdaling.","s":["vergadering","dagelijks"]},{"id":771,"c":"macht","t":"De Pauze als Machtsmiddel","b":"Machtige mensen pauzeren vóór ze antwoorden. De lengte van de pauze correleert met waargenomen autoriteit. Onmiddellijk antwoorden = lagere status.","s":["onderhandeling","vergadering"]},{"id":772,"c":"macht","t":"Territorial Marking","b":"Mensen markeren hun territorium: tas op stoel, jas over leuning, papieren uitspreiden. Meer ruimte claimen = hogere status signaleren.","s":["vergadering","dagelijks"]},{"id":773,"c":"macht","t":"Expert Power vs Referent Power","b":"Expertmacht komt van kennis, referentmacht van bewondering. Let op welke basis iemands invloed heeft — kennis is kwetsbaarder dan charisma.","s":["vergadering","dagelijks"]},{"id":774,"c":"macht","t":"Status Incongruentie","b":"Wanneer iemands formele status niet overeenkomt met hun gedragsstatus. Een CEO die onderdanig gedrag toont = incongruentie die spanning creëert.","s":["vergadering","dagelijks"]},{"id":775,"c":"macht","t":"De Eerste Spreker Regel","b":"Wie als eerste spreekt in een vergadering zet het kader. Maar wie als laatste spreekt heeft het laatste woord. Beide zijn machtsposities.","s":["vergadering","onderhandeling"]},{"id":776,"c":"macht","t":"Gatekeeping Gedrag","b":"De poortwachter bepaalt wie toegang krijgt tot informatie, mensen of middelen. Secretaresses, receptionisten en managers zijn vaak de echte machthebbers.","s":["vergadering","dagelijks"]},{"id":777,"c":"macht","t":"Impression Management Doorprikken","b":"Iedereen doet aan impression management. Let op discrepanties tussen de 'frontstage' (publiek) en 'backstage' (privé) persona.","s":["dagelijks","sollicitatie"]},{"id":778,"c":"macht","t":"Machtafstand Lezen","b":"Hoe groot is de kloof tussen de machtigste en minst machtige persoon? Hoge machtafstand = formeel, hiërarchisch. Lage = informeel, gelijkwaardig.","s":["vergadering","dagelijks"]},{"id":779,"c":"macht","t":"De Koninklijke Wij","b":"Wanneer iemand 'wij' zegt terwijl ze 'ik' bedoelen. 'Wij vinden dat...' is vaak een machtsgreep die individuele verantwoordelijkheid maskeert.","s":["vergadering","dagelijks"]},{"id":780,"c":"macht","t":"Counterstatus Moves","b":"Bewuste acties om iemands statusclaim te ondermijnen: casual taalgebruik tegen een formeel persoon, humor inzetten tegen ernst.","s":["vergadering","conflict"]},{"id":781,"c":"macht","t":"Charisma Deconstructie","b":"Charisma bestaat uit warmte + competentie + presentie. Ontleed het en je ziet het mechanisme. Wie mist welk element?","s":["dagelijks","vergadering"]},{"id":782,"c":"eerste","t":"De 3V-Regel","b":"Bij eerste indruk telt: Visueel (55%), Vocaal (38%), Verbaal (7%). Je woorden zijn het minst belangrijk. Focus op houding en stemklank.","s":["sollicitatie","verkoop"]},{"id":783,"c":"eerste","t":"Primacy vs Recency bij Ontmoetingen","b":"De eerste en laatste momenten van een ontmoeting worden het sterkst onthouden. Maak je entrance én je exit memorabel.","s":["sollicitatie","verkoop"]},{"id":784,"c":"eerste","t":"Similarity Attraction Effect","b":"We vertrouwen mensen die op ons lijken. Spiegeling van kleding, taal en houding versnelt vertrouwen bij eerste contact.","s":["date","verkoop"]},{"id":785,"c":"eerste","t":"Halo in Omgekeerde","b":"Het Horn-effect: één negatief kenmerk kleurt alles. Een slechte handdruk kan een heel gesprek saboteren, ongeacht competentie.","s":["sollicitatie","dagelijks"]},{"id":786,"c":"eerste","t":"De Naam-Herhaal Techniek","b":"Gebruik iemands naam drie keer in de eerste vijf minuten. Het activeert het eigen-naam-effect en verhoogt sympathie.","s":["verkoop","date"]},{"id":787,"c":"eerste","t":"Approach Anxiety Lezen","b":"Herken naderingsangst bij anderen: onbewust naar je toe leunen maar verbaal afstand houden. Ze willen contact maar durven niet.","s":["date","dagelijks"]},{"id":788,"c":"eerste","t":"De Status Entree","b":"Hoe iemand een ruimte binnenkomt vertelt alles. Snel en klein = onzeker. Langzaam en open = zelfverzekerd. Let op de eerste drie seconden.","s":["vergadering","sollicitatie"]},{"id":789,"c":"eerste","t":"Outfit als Communicatie","b":"Kleding is een bewuste boodschap. Let op incongruenties: duur horloge met versleten schoenen vertelt een verhaal over prioriteiten.","s":["dagelijks","sollicitatie"]},{"id":790,"c":"eerste","t":"De Openingsvraag Analyse","b":"De eerste vraag die
