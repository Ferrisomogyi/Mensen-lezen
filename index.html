14px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--bd);background:var(--cd);color:var(--td);cursor:pointer;font-family:inherit;white-space:nowrap}.sp.on{background:rgba(200,164,90,.08);border-color:var(--ac);color:var(--ac)}.cg{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 16px}.ct2{background:var(--cd);border:1px solid var(--bd);border-radius:14px;padding:16px 14px;cursor:pointer;text-align:left;position:relative;overflow:hidden}.ct2:active{transform:scale(.97)}.ct2 .ci{font-size:28px;margin-bottom:6px;display:block}.ct2 .cn{font-weight:700;font-size:12px;line-height:1.3}.ct2 .cc{font-size:11px;color:var(--td);margin-top:2px}.tc{margin:0 16px 6px;background:var(--cd);border:1px solid var(--bd);border-radius:12px;padding:13px 15px;cursor:pointer;position:relative;border-left:3px solid var(--ac)}.tc:active{background:var(--ch)}.tc .tt{display:flex;align-items:flex-start;gap:8px}.tc .tn{font-family:'Playfair Display',serif;font-weight:900;font-size:11px;opacity:.25;min-width:24px;padding-top:2px}.tc .tl{flex:1;font-weight:700;font-size:13.5px;line-height:1.35;padding-right:28px}.tc .tb{font-size:12.5px;color:var(--tm);line-height:1.55;margin-top:8px;padding-left:32px;animation:fi .2s}.tc .tg{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px;padding-left:32px}.tc .tp{font-size:9px;padding:2px 7px;border-radius:8px;font-weight:600;background:rgba(200,164,90,.08);color:var(--ac)}.tc .fv{position:absolute;top:10px;right:10px;background:none;border:none;font-size:18px;cursor:pointer;padding:4px;color:var(--tt)}.tc .fv.on{color:var(--ac)}.tc .fv:active{transform:scale(1.3)}@keyframes fi{from{opacity:0;transform:translateY(-3px)}to{opacity:1}}.br{padding:10px 16px 2px;display:flex;align-items:center;gap:8px;position:sticky;top:0;background:var(--bg);z-index:10}.bb{background:none;border:none;color:var(--ac);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}.dy{margin:12px 16px;background:linear-gradient(135deg,#2a2318,#1a1410);border:1px solid rgba(200,164,90,.2);border-radius:14px;padding:16px 18px;position:relative;cursor:pointer}.dy .dl{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--ac);font-weight:700;margin-bottom:6px}.dy .dt{font-family:'Playfair Display',serif;font-weight:700;font-size:16px;margin-bottom:6px;padding-right:30px}.dy .db{font-size:12.5px;color:var(--tm);line-height:1.55}.dy .dc{font-size:10px;color:var(--td);margin-top:8px}.st{display:flex;gap:8px;padding:12px 16px}.s2{flex:1;background:var(--cd);border:1px solid var(--bd);border-radius:10px;padding:10px 12px;text-align:center}.sn{font-family:'Playfair Display',serif;font-weight:900;font-size:22px;color:var(--ac)}.sl{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--td);margin-top:2px}.rb{display:flex;align-items:center;justify-content:center;gap:8px;margin:8px 16px 4px;padding:11px;background:var(--cd);border:1px solid var(--bd);border-radius:12px;color:var(--ac);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}.rb:active{transform:scale(.97)}.bk{margin:0 16px 6px;background:var(--cd);border:1px solid var(--bd);border-radius:12px;padding:13px 15px;border-left:3px solid #a88a3e}.em{text-align:center;padding:40px 24px;color:var(--td)}.em .bg{font-size:36px;margin-bottom:8px}.qq{padding:16px}.qn{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;line-height:1.35;margin-bottom:16px;text-align:center}.qo{display:block;width:100%;padding:13px 16px;margin-bottom:8px;background:var(--cd);border:1px solid var(--bd);border-radius:12px;color:var(--tx);font-size:13px;cursor:pointer;text-align:left;font-family:inherit;line-height:1.4}.qo.ok{background:rgba(74,140,122,.15);border-color:var(--tl);color:var(--tl)}.qo.no{background:rgba(196,92,74,.1);border-color:var(--rd);color:var(--rd)}.qo.rv{background:rgba(74,140,122,.05)}.qs{text-align:center;padding:24px}.qs .bg{font-family:'Playfair Display',serif;font-size:48px;color:var(--ac);fon <script>
const C=[{"id":"lichaamstaal","l":"Lichaamstaal","i":"👁","c":"#c8a45a"},{"id":"psycho","l":"Psychologische Patronen","i":"🧠","c":"#7a5c8a"},{"id":"manipulatie","l":"Manipulatie Herkennen","i":"🎭","c":"#c45c4a"},{"id":"geavanceerd","l":"Geavanceerde Observatie","i":"🔬","c":"#5a7a8a"},{"id":"spraak","l":"Spraak & Stem","i":"🗣","c":"#b07d3a"},{"id":"sociaal","l":"Sociale Dynamiek","i":"👥","c":"#8a6d3e"},{"id":"overtuiging","l":"Overtuiging & Invloed","i":"🎯","c":"#4a8c7a"},{"id":"acteur","l":"Acteurstechnieken","i":"🎬","c":"#9a5c8a"},{"id":"emotie","l":"Emotionele Intelligentie","i":"💎","c":"#8a5a6a"},{"id":"gesprek","l":"Gesprekstactieken","i":"⚡","c":"#4a8c7a"},{"id":"onderhandeling","l":"Onderhandeling","i":"🤝","c":"#5a8a5c"},{"id":"gezicht","l":"Gezicht & Micro-expressies","i":"😶","c":"#b07d3a"},{"id":"leugen","l":"Leugendetectie","i":"🔍","c":"#5a7a8a"},{"id":"macht","l":"Macht & Status","i":"👑","c":"#a88a3e"},{"id":"digitaal","l":"Digitale Signalen","i":"📱","c":"#5a7a8a"},{"id":"eerste","l":"Eerste Indruk","i":"✨","c":"#b07d3a"},{"id":"groep","l":"Groepsdynamiek","i":"🏛","c":"#8a6d3e"}];
const T=[{"id":1,"c":"lichaamstaal","t":"De voeten liegen nooit","b":"Voeten wijzen waar iemand naartoe wil. Bovenlichaam naar jou maar voeten naar de deur? Ze willen weg. Het eerlijkste lichaamsdeel.","s":["vergadering","date","dagelijks"]},{"id":2,"c":"lichaamstaal","t":"Handen op borst vs. weg","b":"Handen naar borst = geloven wat ze zeggen. Handen weg van lichaam = opvoeren.","s":["vergadering","sollicitatie"]},{"id":3,"c":"lichaamstaal","t":"Het pupileffect","b":"Pupillen verwijden bij interesse, vernauwen bij afkeer. Niet te faken.","s":["onderhandeling","date","verkoop"]},{"id":4,"c":"lichaamstaal","t":"De suprasternale inkeping","b":"Keelholte aanraken of bedekken = bedreigd, onzeker of ongemakkelijk.","s":["vergadering","sollicitatie","conflict"]},{"id":5,"c":"lichaamstaal","t":"Steepling: vingertoppen samen","b":"Universeel gebaar van zelfvertrouwen. Handen zakken = vertrouwen zakt.","s":["vergadering","onderhandeling"]},{"id":6,"c":"lichaamstaal","t":"Vier-signalen wantrouwen","b":"Handen+gezicht aanraken, achterover leunen, armen kruisen. Samen = rode vlag.","s":["vergadering","onderhandeling"]},{"id":7,"c":"lichaamstaal","t":"Beenvrijving","b":"Handpalmen over bovenbenen wrijven = zelfgeruststelling bij hoge stress.","s":["vergadering","sollicitatie"]},{"id":8,"c":"lichaamstaal","t":"De buikblokkade","b":"Tas, laptop, map voor buik = onbewust schild. Meer objecten = onveiliger.","s":["date","dagelijks"]},{"id":9,"c":"lichaamstaal","t":"Wenkbrauwflits-effect","b":"Snelle wenkbrauwbeweging bij begroeting = oprecht blij. Geen flash = plicht.","s":["dagelijks","date"]},{"id":10,"c":"lichaamstaal","t":"Tongpersen","b":"Tong tegen wangbinnenkant bij stress. Subtiel maar betrouwbaar.","s":["vergadering","onderhandeling"]},{"id":11,"c":"lichaamstaal","t":"Ademhaling vertelt alles","b":"Snel/oppervlakkig = angst. Diepe zucht = opluchting of frustratie.","s":["vergadering","date","conflict"]},{"id":12,"c":"lichaamstaal","t":"Het ventileren","b":"Kraag trekken, nek wrijven = stoom afblazen. Moeilijk te onderdrukken.","s":["vergadering","conflict"]},{"id":13,"c":"lichaamstaal","t":"Houdingsecho","b":"Jouw houding kopiëren = rapport. Verander bewust van houding: volgen ze?","s":["vergadering","date","verkoop"]},{"id":14,"c":"lichaamstaal","t":"De torso-wending","b":"Torso richting = waar interesse echt is. Hoofd ja maar torso weg = niet geïnteresseerd.","s":["vergadering","date"]},{"id":15,"c":"lichaamstaal","t":"Enkelklem","b":"Enkels klemmen rond stoelpoten = informatie of emoties inhouden.","s":["vergadering","sollicitatie"]},{"id":16,"c":"lichaamstaal","t":"Territoriaal gedrag","b":"Spullen uitspreiden over tafel = territorium claimen = dominantie.","s":["vergadering","onderhandeling"]},{"id":17,"c":"lichaamstaal","t":"De handdruk","b":"Palm onder = dominantie. Omhoog = onderdanig. Verticaal = gelijkwaardig.","s":["vergadering","sollicitatie","verkoop"]},{"id":18,"c":"lichaamstaal","t":"Comfort/discomfort model","b":"Vergeet specifieke signalen. Kijk alleen: comfort of discomfort? Dat is genoeg.","s":["dagelijks","vergadering"]},{"id":19,"c":"lichaamstaal","t":"Pacifying behaviors","b":"Nek aanraken, haar spelen, pen klikken = zelfgeruststelling. Meer = meer stress.","s":["vergadering","sollicitatie","conflict"]},{"id":20,"c":"lichaamstaal","t":"Schoudertrek bij bewering","b":"Eén schouder = onzekerheid over eigen woorden. Twee = weet niet.","s":["vergadering","dagelijks"]},{"id":21,"c":"lichaamstaal","t":"Duimen bij gevouwen handen","b":"Handen ineenvouwen maar duimen omhoog = zelfverzekerd. Duimen weg = onzeker.","s":["vergadering","onderhandeling"]},{"id":22,"c":"lichaamstaal","t":"Freeze-flight-fight","b":"Eerst bevriezen, dan vluchten, dan vechten. Het lichaam volgt altijd deze volgorde.","s":["conflict","dagelijks"]},{"id":23,"c":"lichaamstaal","t":"Gravity-defying bewegingen","b":"Opveren, op tenen staan = opwinding en positief gevoel.","s":["date","dagelijks","verkoop"]},{"id":24,"c":"lichaamstaal","t":"De hoofdkanteling","b":"Schuin = interesse en kwetsbaarheid. Rechtop = evalueren. Voorover = agressie.","s":["date","vergadering"]},{"id":25,"c":"lichaamstaal","t":"Proxemics: afstandszones","b":"0-45cm intiem, 45-120cm persoonlijk, 120-360cm sociaal. Dichter = interesse of dominantie.","s":["date","dagelijks"]},{"id":26,"c":"lichaamstaal","t":"Ruimte innemen","b":"Meer ruimte = zekerder/dominanter. Kleiner maken = onzeker/onderdanig.","s":["vergadering","sollicitatie"]},{"id":27,"c":"lichaamstaal","t":"Blokkade-signalen","b":"Gekruiste armen, been over been, hand voor mond, tas op schoot. Clusters tellen.","s":["vergadering","date","verkoop"]},{"id":28,"c":"lichaamstaal","t":"De kaakspanning","b":"Kaken op elkaar = woede inhouden. Vaak zichtbaar bij kaakspieren.","s":["conflict","vergadering"]},{"id":29,"c":"lichaamstaal","t":"Lip-compressie","b":"Lippen samengeperst = informatie achterhouden of oneens. Dunner = stelliger.","s":["onderhandeling","vergadering"]},{"id":30,"c":"lichaamstaal","t":"Open handpalmen = openheid","b":"Handpalmen tonen = evolutionair ongewapend. Verborgen = ongemak of verbergen.","s":["verkoop","vergadering","date"]},{"id":31,"c":"gezicht","t":"Zeven universele emoties","b":"Vreugde, verdriet, woede, angst, verrassing, walging, minachting. In elke cultuur hetzelfde.","s":["dagelijks","vergadering"]},{"id":32,"c":"gezicht","t":"Micro-expressies: 1/25e seconde","b":"Echte emoties flitsen over het gezicht voor het masker opgaat. Niet te faken.","s":["vergadering","onderhandeling","conflict"]},{"id":33,"c":"gezicht","t":"Echte vs. neppe glimlach","b":"Duchenne: oogspieren mee, kraaienpootjes. Nep: alleen mond.","s":["dagelijks","date","verkoop"]},{"id":34,"c":"gezicht","t":"Minachting herkennen","b":"Eén mondhoek omhoog. Enige unilaterale emotie. Voorspelt relatiemislukking (Gottman).","s":["vergadering","date","conflict"]},{"id":35,"c":"gezicht","t":"Walging vs. woede","b":"Walging: bovenlip omhoog, neus rimpel. Woede: smalle ogen, kin vooruit. Walging is moeilijker te repareren.","s":["conflict","vergadering"]},{"id":36,"c":"gezicht","t":"Angst-micro-expressie","b":"Opgetrokken wenkbrauwen samen, wijd open ogen, horizontale mond.","s":["vergadering","conflict"]},{"id":37,"c":"gezicht","t":"Verrassing vs. angst","b":"Verrassing: ronde mond. Angst: horizontale mond. Verrassing duurt max 1 seconde.","s":["dagelijks","vergadering"]},{"id":38,"c":"gezicht","t":"Lip-likken vs. lip-bijten","b":"Likken = droogheid door stress. Bijten = onzekerheid of ingehouden emotie.","s":["vergadering","date"]},{"id":39,"c":"gezicht","t":"De asymmetrische glimlach","b":"Eén kant hoger = minachting of sarcasme. Krachtig signaal.","s":["vergadering","dagelijks"]},{"id":40,"c":"gezicht","t":"Oogblokkade","b":"Ogen sluiten, wegkijken, hand voor ogen = brein wil niet zien. Onbewuste afwijzing.","s":["vergadering","conflict"]},{"id":41,"c":"gezicht","t":"Contempt als relatievoorspeller","b":"Gottman: minachting voorspelt scheiding met 93% nauwkeurigheid.","s":["date","dagelijks"]},{"id":42,"c":"gezicht","t":"Valse verrassing herkennen","b":"Echte verrassing duurt max 1 seconde. Langer = gespeeld.","s":["dagelijks","vergadering"]},{"id":43,"c":"gezicht","t":"Pupilverwijding bij aantrekking","b":"Pupillen verwijden onbewust bij aantrekkelijke persoon. Werkt twee richtingen.","s":["date"]},{"id":44,"c":"gezicht","t":"Blik-duur als intentie","b":"Te kort = desinteresse. Te lang = intimidatie. 3-5 seconden = comfort.","s":["date","vergadering","verkoop"]},{"id":45,"c":"gezicht","t":"Knipperen als stressbarometer","b":"Normaal 15-20x/min. Stress verhoogt naar 40-50. Let op veranderingen.","s":["onderhandeling","vergadering"]},{"id":46,"c":"gezicht","t":"Micro-expressie verdriet","b":"Binnenste wenkbrauwen omhoog, mondhoeken omlaag. Moeilijk te faken.","s":["dagelijks","vergadering"]},{"id":47,"c":"gezicht","t":"Emotie-timing","b":"Echte emotie verschijnt tegelijk met of voor woorden. Nep verschijnt erna.","s":["dagelijks","vergadering"]},{"id":48,"c":"gezicht","t":"De verdwijnende glimlach","b":"Nep verdwijnt abrupt. Echt vervaagt geleidelijk. Het einde onthult echtheid.","s":["dagelijks","date"]},{"id":49,"c":"gezicht","t":"Gezichtssymmetrie","b":"Echte emoties zijn relatief symmetrisch. Asymmetrisch = geforceerd. Linkerhelft lekt meer.","s":["dagelijks"]},{"id":50,"c":"gezicht","t":"Hoofd-kantelen-en-knikken","b":"Kantelen + langzaam knikken = actief luisteren. Snel knikken = wil dat je stopt.","s":["vergadering","dagelijks"]},{"id":51,"c":"spraak","t":"Waar ze vertragen","b":"Racen door gerepeteerde stukken. Vertragen bij emotioneel gewicht. Daar leeft het verhaal.","s":["vergadering","dagelijks"]},{"id":52,"c":"spraak","t":"Stemhoogte bij liegen","b":"Stembanden spannen door stress. Subtiele stijging. Je oren detecteren het vaak onbewust.","s":["vergadering","onderhandeling"]},{"id":53,"c":"spraak","t":"Overmatig detail als rookgordijn","b":"Leugenaars voegen onnodige details toe die je niet vroeg.","s":["vergadering","dagelijks"]},{"id":54,"c":"spraak","t":"Verdwijnen samentrekkingen","b":"Plots formeler praten = afstand creëren. Signaal van ongemak.","s":["vergadering","conflict"]},{"id":55,"c":"spraak","t":"Vraag herhalen voor antwoord","b":"Herhalen = tijd kopen. Eerlijke antwoorden komen direct.","s":["vergadering","onderhandeling"]},{"id":56,"c":"spraak","t":"Kwalificerende taal","b":"Eerlijk gezegd... Om heel eerlijk te zijn... Meer nadruk op waarheid = grotere kans op onwaarheid.","s":["vergadering","dagelijks"]},{"id":57,"c":"spraak","t":"Chronologische vs. emotionele vertelling","b":"Achterstevoren vertellen: waarheid = geen probleem. Leugen = in de war.","s":["vergadering","sollicitatie"]},{"id":58,"c":"spraak","t":"Spreektempo als emotie","b":"Versnellen = opwinding/angst. Vertragen = voorzichtigheid. Plotselinge verandering = signaal.","s":["vergadering","date","verkoop"]},{"id":59,"c":"spraak","t":"De power of de pauze","b":"Bewust pauzeren = zelfvertrouwen. Stilte vullen met eh/uhm = onzeker.","s":["onderhandeling","verkoop"]},{"id":60,"c":"spraak","t":"Woordkeuze onthult denkstijl","b":"Visueel: ik zie. Auditief: klinkt goed. Kinesthetisch: voelt goed. Match hun stijl.","s":["verkoop","date"]},{"id":61,"c":"spraak","t":"Afstandstaal","b":"Die persoon ipv naam. Het kantoor ipv ons kantoor. Afstand in taal = emotionele afstand.","s":["vergadering","conflict"]},{"id":62,"c":"spraak","t":"De pronomen-verschuiving","b":"Van ik naar men/je bij gevoelige onderwerpen = emotionele afstand nemen.","s":["vergadering","dagelijks"]},{"id":63,"c":"spraak","t":"Stemvolume als machtssignaal","b":"Zachter praten dwingt luisteren. Harder = compenseren. Machtigste mensen praten zachtst.","s":["vergadering","onderhandeling","conflict"]},{"id":64,"c":"spraak","t":"Zinnen niet afmaken","b":"Halverwege stoppen = zichzelf censureren. Vraag: wat wilde je zeggen?","s":["vergadering","dagelijks","date"]},{"id":65,"c":"spraak","t":"De lach-analyse","b":"Geforceerd = nasaal en kort. Echt = vol en ongecontroleerd. Timing onthult of ze meegaan.","s":["dagelijks","date"]},{"id":66,"c":"spraak","t":"Het maar-principe","b":"Alles voor maar is decoratie. De echte boodschap komt erna.","s":["vergadering","dagelijks","conflict"]},{"id":67,"c":"spraak","t":"Metaforen onthullen wereldbeeld","b":"Oorlogsmetaforen = strijd. Sport = competitie. Natuur = harmonie.","s":["vergadering","dagelijks"]},{"id":68,"c":"spraak","t":"Strategische stilte","b":"Na een vraag: wacht. Laat stilte werken. Ze vullen met ongecensureerde waarheid.","s":["onderhandeling","vergadering","conflict"]},{"id":69,"c":"spraak","t":"Tussenwerpsels als lekkage","b":"Oh, hmm, ah op onverwachte momenten = onbewuste reactie. Let op wanneer.","s":["vergadering","dagelijks"]},{"id":70,"c":"spraak","t":"Vocal fry en autoriteit","b":"Lage krakende stem soms autoriteit, soms onzekerheid. Context-afhankelijk.","s":["vergadering","verkoop"]},{"id":71,"c":"sociaal","t":"Na een grap: naar wie kijken?","b":"Kijken naar degene wiens goedkeuring telt. De complete machtskaart.","s":["vergadering","dagelijks"]},{"id":72,"c":"sociaal","t":"Wie draait lichaam naar wie?","b":"Torso richting = belang. Meeste torsos naar één persoon = meeste macht.","s":["vergadering","dagelijks"]},{"id":73,"c":"sociaal","t":"Behandeling onbelangrijke mensen","b":"De ober, schoonmaker = onbewaakte versie. Alles ander = geregisseerd.","s":["date","dagelijks"]},{"id":74,"c":"sociaal","t":"Spiegeleffect (mirroring)","b":"Mogen = spiegelen. Stop = verbinding breekt.","s":["vergadering","date","verkoop"]},{"id":75,"c":"sociaal","t":"Interruptiepatronen = hiërarchie","b":"Ongestoord uitpraten = macht. Onderbroken zonder protest = lagere positie.","s":["vergadering"]},{"id":76,"c":"sociaal","t":"Reactie op andermans succes","b":"Warmte, afleiding, of redirect naar zichzelf = drie verschillende mensen.","s":["dagelijks","vergadering"]},{"id":77,"c":"sociaal","t":"Wij vs. ik patroon","b":"Wij bij succes + zij bij falen = zwak. Ik bij prestaties + wij bij fouten = credit stelen.","s":["vergadering"]},{"id":78,"c":"sociaal","t":"De telefoontest","b":"Negeren = belangrijk. Scherm checken = optie. Opnemen = achtergrondlawaai.","s":["date","dagelijks"]},{"id":79,"c":"sociaal","t":"Stoelpositie bij vergaderingen","b":"Tegenover leider = oppositie. Naast = bondgenoot. Hoek = observeren.","s":["vergadering"]},{"id":80,"c":"sociaal","t":"Alpha-scan bij binnenkomst","b":"Dominante scannen de ruimte, kiezen de beste positie. Waar ze zitten = zelfbeeld.","s":["vergadering","dagelijks"]},{"id":81,"c":"sociaal","t":"Sociale reciprociteit","b":"Iemand doet iets → verwacht iets terug. Bewust toegepast = manipulatie.","s":["dagelijks","verkoop"]},{"id":82,"c":"sociaal","t":"Groepsconformiteit (Asch)","b":"Mensen volgen de groep tegen beter weten. Wie eerst afwijkt = meeste karakter.","s":["vergadering"]},{"id":83,"c":"sociaal","t":"Status-signalen in kleding","b":"Onderdressing = onwetendheid of extreme status (CEO in sneakers). Context bepaalt.","s":["vergadering","dagelijks"]},{"id":84,"c":"sociaal","t":"Het initiatie-patroon","b":"Wie begint gesprekken, stelt vragen, bepaalt onderwerp? Initiatiefnemer = controle.","s":["vergadering","dagelijks"]},{"id":85,"c":"sociaal","t":"Laughter asymmetrie","b":"Anderen laten lachen = sociale macht. Hardst lachen = macht weggeven.","s":["dagelijks","vergadering"]},{"id":86,"c":"sociaal","t":"De informele leider","b":"Niet de titel maar naar wie iedereen kijkt bij onzekerheid. Vaak machtiger dan formeel.","s":["vergadering"]},{"id":87,"c":"sociaal","t":"Subgroepen in vergaderingen","b":"Wie fluistert met wie? Wie rolt ogen naar wie? Onzichtbare machtsblokken.","s":["vergadering"]},{"id":88,"c":"sociaal","t":"Energieverschuiving in groep","b":"Na wiens opmerking wordt het stil? Wie brengt energie? Wie zuigt het weg?","s":["vergadering","dagelijks"]},{"id":89,"c":"sociaal","t":"De stille coalitie","b":"Oogcontact uitwisselen voor standpunt innemen = vooraf afgestemd.","s":["vergadering"]},{"id":90,"c":"sociaal","t":"Bandwagon-effect","b":"Eerste uitgesproken standpunt trekt volgers. Niet omdat het het beste is.","s":["vergadering"]},{"id":91,"c":"psycho","t":"Kindervraag = wie ze nu zijn","b":"Beschrijven heden als verleden. Onthullen wie ze nog steeds zijn.","s":["date","dagelijks"]},{"id":92,"c":"psycho","t":"Vijanden beschrijven = zichzelf","b":"Kritiek is altijd autobiografisch. Wat ze haten = vrezen of bewonderen.","s":["dagelijks"]},{"id":93,"c":"psycho","t":"Eerste en laatste zin","b":"Eerste = hart. Laatste (druk eraf) = de echte reden.","s":["vergadering","dagelijks"]},{"id":94,"c":"psycho","t":"Humor als waardenvenster","b":"Waarom iemand lacht = moreel kompas. Leedvermaak vs. absurdisme = andere waarden.","s":["dagelijks","date"]},{"id":95,"c":"psycho","t":"Hoe ze over exen praten","b":"Elke ex gek = het patroon is niet de ex. Nuance = emotionele volwassenheid.","s":["date"]},{"id":96,"c":"psycho","t":"De ja-maar persoon","b":"Wil geen hulp maar bevestiging van machteloosheid.","s":["dagelijks","vergadering"]},{"id":97,"c":"psycho","t":"Reactie op een grens","b":"Zeg nee. Respect = vertrouwen. Doorduwen = relatie is iets om te winnen.","s":["date","dagelijks","vergadering"]},{"id":98,"c":"psycho","t":"Vergelijkende complimenten","b":"Je bent veel leuker dan... = isoleren. Loyaliteit via exclusiviteit.","s":["date","dagelijks"]},{"id":99,"c":"psycho","t":"Driehoekscommunicatie","b":"Over afwezigen praten ipv direct. Ze doen hetzelfde als jij weg bent.","s":["dagelijks","vergadering"]},{"id":100,"c":"psycho","t":"Foutafhandeling = integriteitstest","b":"Toegeven+excuus+verandering = integriteit. Bagatelliseren = manipulatie.","s":["dagelijks","vergadering"]},{"id":101,"c":"psycho","t":"Projection herkennen","b":"Wat ze jou beschuldigen doen ze zelf. Klassiek verdedigingsmechanisme.","s":["conflict","dagelijks"]},{"id":102,"c":"psycho","t":"Herhaling-compulsie","b":"Patronen uit jeugd herhalen. Niet domheid maar vertrouwdheid.","s":["dagelijks"]},{"id":103,"c":"psycho","t":"Attachment styles","b":"Secure, Anxious, Avoidant, Disorganized. Bepaalt 80% van relatiegedrag.","s":["date","dagelijks"]},{"id":104,"c":"psycho","t":"Cognitive dissonance","b":"Gedrag botst met overtuiging → overtuiging wordt aangepast. Daarom verdedigen mensen slechte keuzes.","s":["vergadering","dagelijks"]},{"id":105,"c":"psycho","t":"Dunning-Kruger radar","b":"Incompetent = overschatten. Competent = onderschatten. Zelfvertrouwen correleert omgekeerd bij lage competentie.","s":["vergadering","sollicitatie"]},{"id":106,"c":"psycho","t":"Splitting (zwart-wit)","b":"Perfect of verschrikkelijk. Geen nuance. Vandaag held, morgen vijand.","s":["dagelijks","date"]},{"id":107,"c":"psycho","t":"Fundamental Attribution Error","b":"Andermans fouten = karakter. Eigen fouten = omstandigheden. Bewustzijn maakt je eerlijker.","s":["dagelijks","vergadering"]},{"id":108,"c":"psycho","t":"Halo-effect","b":"Aantrekkelijk = automatisch slimmer en betrouwbaarder. Bewustzijn maakt lezing accurater.","s":["date","sollicitatie"]},{"id":109,"c":"psycho","t":"Sunk cost in relaties","b":"Ik heb al zoveel geïnvesteerd houdt in slechte situaties. Investering tot nu is irrelevant.","s":["dagelijks","onderhandeling"]},{"id":110,"c":"psycho","t":"Het zwarte-schaap-dynamiek","b":"Eén persoon krijgt alle schuld. Beschermt systeem tegen echt probleem.","s":["dagelijks"]},{"id":111,"c":"manipulatie","t":"Love bombing","b":"Overweldigende aandacht = investeringsstrategie. Emotionele schuld opbouwen.","s":["date"]},{"id":112,"c":"manipulatie","t":"Gaslighting","b":"Systematisch je waarneming in twijfel trekken. Afhankelijk maken van hun werkelijkheid.","s":["conflict","date"]},{"id":113,"c":"manipulatie","t":"Negging","b":"Compliment dat zelfvertrouwen ondermijnt.","s":["date","dagelijks"]},{"id":114,"c":"manipulatie","t":"Foot-in-the-door","b":"Klein verzoek, dan steeds groter. Beoordeel elk verzoek apart.","s":["verkoop","dagelijks"]},{"id":115,"c":"manipulatie","t":"Kunstmatige schaarste","b":"Nu of nooit = manipulatie. Echte kansen overleven een nachtje slapen.","s":["verkoop","onderhandeling"]},{"id":116,"c":"manipulatie","t":"Schuldvraag als wapen","b":"Na alles wat ik deed... Geen scorebord = gezond. Herinneren aan gunsten = rente.","s":["dagelijks","date"]},{"id":117,"c":"manipulatie","t":"Strategische kwetsbaarheid","b":"Snel kwetsbaar = mogelijk controleren. Echt voelt ongemakkelijk. Strategisch voelt gepolijst.","s":["date","dagelijks"]},{"id":118,"c":"manipulatie","t":"Het bewegende doelpunt","b":"Eis verschuift na voldoen. Nooit goed genoeg = controlespel.","s":["dagelijks","vergadering"]},{"id":119,"c":"manipulatie","t":"DARVO","b":"Deny, Attack, Reverse Victim and Offender. Klassiek bij misbruik.","s":["conflict","dagelijks"]},{"id":120,"c":"manipulatie","t":"Silent treatment als wapen","b":"Stilte als straf ≠ ruimte nemen. Straf = controle. Ruimte = gecommuniceerd.","s":["conflict","date"]},{"id":121,"c":"manipulatie","t":"Triangulatie","b":"Derde persoon voor jaloezie of onzekerheid. Mijn ex deed altijd... = rode vlag.","s":["date","dagelijks"]},{"id":122,"c":"manipulatie","t":"Future faking","b":"Grote beloftes die nooit worden waargemaakt. Doel: binden in het heden.","s":["date","verkoop"]},{"id":123,"c":"manipulatie","t":"Intermittent reinforcement","b":"Wisselend belonen en straffen = sterkste hechting. Casino-principe.","s":["date","dagelijks"]},{"id":124,"c":"manipulatie","t":"Covert contracts","b":"Onuitgesproken afspraken. Ik doe X dus jij moet Y. Ander wist niet eens van contract.","s":["dagelijks","vergadering"]},{"id":125,"c":"manipulatie","t":"Dubbelblinde boodschap","b":"Twee tegenstrijdige signalen. Doe wat je wilt met toon die tegenovergestelde zegt.","s":["dagelijks","conflict"]},{"id":126,"c":"manipulatie","t":"Emotionele chantage (FOG)","b":"Fear, Obligation, Guilt. De drie wapens. Susan Forward.","s":["dagelijks","date"]},{"id":127,"c":"manipulatie","t":"Het iedereen-vindt argument","b":"Iedereen vindt dat je... zonder namen. Sociale druk fabriceren.","s":["conflict","vergadering"]},{"id":128,"c":"manipulatie","t":"Weaponized incompetence","b":"Expres slecht doen zodat je het niet meer vraagt.","s":["dagelijks"]},{"id":129,"c":"manipulatie","t":"De non-apology","b":"Het spijt me als je je gekwetst voelt. Geen erkenning van eigen gedrag.","s":["conflict","dagelijks"]},{"id":130,"c":"manipulatie","t":"Word salad bij confrontatie","b":"Stortvloed woorden die nergens naartoe gaan. Doel: verwarren.","s":["conflict"]},{"id":131,"c":"manipulatie","t":"Flying monkey","b":"Anderen inschakelen voor druk. Zelfs naam vindt dat je...","s":["conflict","dagelijks"]},{"id":132,"c":"manipulatie","t":"Hoovering","b":"Na breuk plotseling lief. Zodra terug: oud gedrag. Cyclus herhaalt.","s":["date"]},{"id":133,"c":"manipulatie","t":"Selective memory","b":"Alleen herinneren wat uitkomt. Systematisch = manipulatie.","s":["conflict","dagelijks"]},{"id":134,"c":"manipulatie","t":"Guilt by association","b":"Jij bent net als negatief persoon. Identiteit ondermijnen.","s":["conflict","dagelijks"]},{"id":135,"c":"manipulatie","t":"Strovrede (false equivalence)","b":"Kleine fout gelijkstellen aan grote als verdediging.","s":["conflict","dagelijks"]},{"id":136,"c":"overtuiging","t":"Knik voordat je spreekt","b":"Langzame knik voor je praat = instemmings-modus activeren.","s":["vergadering","verkoop","onderhandeling"]},{"id":137,"c":"overtuiging","t":"Wie eerst uitlegt bepaalt verhaal","b":"Rustig beschrijven na spanning. Mensen onthouden jouw versie.","s":["vergadering","conflict"]},{"id":138,"c":"overtuiging","t":"Cialdini's zes principes","b":"Reciprociteit, consistentie, sociale bewijskracht, autoriteit, schaarste, sympathie.","s":["verkoop","onderhandeling"]},{"id":139,"c":"overtuiging","t":"Het contrast-principe","b":"Eerst het extreme, dan het redelijke. Het anker eerst zetten.","s":["verkoop","onderhandeling"]},{"id":140,"c":"overtuiging","t":"Social proof inzetten","b":"9 van de 10 mensen kiezen... Specifiek bewijs = krachtiger.","s":["verkoop"]},{"id":141,"c":"overtuiging","t":"Benjamin Franklin-effect","b":"Iemand die jou een gunst verleent gaat je meer mogen.","s":["vergadering","dagelijks"]},{"id":142,"c":"overtuiging","t":"Maar-je-bent-vrij techniek","b":"Eindigen met je bent vrij om te beslissen verhoogt compliance 50%.","s":["verkoop","onderhandeling"]},{"id":143,"c":"overtuiging","t":"Labeling als tool","b":"Jij bent duidelijk iemand die kwaliteit waardeert. Ze maken het label waar.","s":["verkoop","vergadering"]},{"id":144,"c":"overtuiging","t":"Primacy en recency effect","b":"Begin en eindig met je sterkste punt. Die worden onthouden.","s":["verkoop","vergadering","sollicitatie"]},{"id":145,"c":"overtuiging","t":"Pacing-and-leading","b":"Eerst meegaan, dan leiden. Nooit direct tegenspreken.","s":["vergadering","onderhandeling","conflict"]},{"id":146,"c":"overtuiging","t":"Loss aversion gebruiken","b":"Mensen zijn 2x gemotiveerder door verlies dan winst. Frame als verlies.","s":["verkoop","onderhandeling"]},{"id":147,"c":"overtuiging","t":"Zeigarnik-effect","b":"Onafgemaakte taken blijven in geheugen. Cliffhanger-effect.","s":["verkoop","vergadering"]},{"id":148,"c":"overtuiging","t":"Specifieke nummers overtuigen","b":"93% overtuigt meer dan bijna iedereen. Specifiek = gemeten.","s":["verkoop","vergadering"]},{"id":149,"c":"overtuiging","t":"Commitment-consistentie","b":"Eerst klein standpunt, de rest volgt. Mensen willen consistent zijn.","s":["verkoop","onderhandeling"]},{"id":150,"c":"overtuiging","t":"De drieslag (rule of three)","b":"Drie argumenten overtuigen meer dan twee of vier. Brein vindt drietallen bevredigend.","s":["verkoop","vergadering"]},{"id":151,"c":"overtuiging","t":"Framing: hetzelfde verschil","b":"95% overleving vs 5% sterfte. Zelfde feit, totaal andere reactie.","s":["verkoop","vergadering","onderhandeling"]},{"id":152,"c":"overtuiging","t":"Het decoy-effect","b":"Derde optie maakt één optie aantrekkelijker. Menu's gebruiken dit constant.","s":["verkoop"]},{"id":153,"c":"overtuiging","t":"Storytelling verslaat statistiek","b":"Eén sterk verhaal overtuigt meer dan tien grafieken. Brein onthoudt narratieven.","s":["verkoop","vergadering"]},{"id":154,"c":"overtuiging","t":"De ja-ladder","b":"Begin met ja-vragen. Na drie keer ja is de vierde veel waarschijnlijker.","s":["verkoop","onderhandeling"]},{"id":155,"c":"overtuiging","t":"Anchoring","b":"Eerste getal beïnvloedt alles daarna. Noem altijd als eerste.","s":["onderhandeling","verkoop"]},{"id":156,"c":"onderhandeling","t":"Voss: spiegelen","b":"Herhaal laatste 2-3 woorden als vraag. Ze praten door. Simpelste maar krachtigste techniek.","s":["onderhandeling","vergadering"]},{"id":157,"c":"onderhandeling","t":"Voss: labeling","b":"Het lijkt erop dat... Benoem emotie. Valideert zonder toe te geven.","s":["onderhandeling","conflict"]},{"id":158,"c":"onderhandeling","t":"Voss: kalibrerende vragen","b":"Hoe kan ik dat doen? Geeft illusie van controle terwijl jij stuurt.","s":["onderhandeling","vergadering"]},{"id":159,"c":"onderhandeling","t":"BATNA kennen","b":"Best Alternative. Hoe beter je alternatieven, hoe sterker je positie.","s":["onderhandeling","verkoop"]},{"id":160,"c":"onderhandeling","t":"Eerste concessie is duurste","b":"Wie eerst toegeeft zet de toon. Nooit gratis. Elke concessie moet opleveren.","s":["onderhandeling"]},{"id":161,"c":"onderhandeling","t":"Het Ackerman-model","b":"Bied 65%, 85%, 95%, 100% met niet-rond getal. Elke stap kleiner.","s":["onderhandeling"]},{"id":162,"c":"onderhandeling","t":"Deadline-druk herkennen","b":"Vraag: wat als we deadline missen? Antwoord onthult of druk echt is.","s":["onderhandeling","verkoop"]},{"id":163,"c":"onderhandeling","t":"Good cop/bad cop herkennen","b":"Theater. Beoordeel deal op inhoud, niet op dynamiek.","s":["onderhandeling"]},{"id":164,"c":"onderhandeling","t":"Stilte na je bod","b":"Bod doen en zwijgen. Wie eerst praat verliest.","s":["onderhandeling","verkoop"]},{"id":165,"c":"onderhandeling","t":"Belangen vs. posities","b":"Fisher & Ury: onderhandel over waarom niet wat. Achter elke positie zit een belang.","s":["onderhandeling","vergadering"]},{"id":166,"c":"onderhandeling","t":"Het flinch-effect","b":"Zichtbaar schrikken bij bod. Maakt ander onzeker, zelfs bij redelijk bod.","s":["onderhandeling"]},{"id":167,"c":"onderhandeling","t":"Nibbling","b":"Na akkoord nog kleine extra vragen. Werkt omdat ander deal niet wil verliezen.","s":["onderhandeling","verkoop"]},{"id":168,"c":"onderhandeling","t":"Informatie = macht","b":"Wie meer weet wint. Stel vragen. Luister. Onthul zo min mogelijk.","s":["onderhandeling","verkoop"]},{"id":169,"c":"onderhandeling","t":"Het bogey-principe","b":"Doe alsof iets onbelangrijks belangrijk is. Geef het later op in ruil voor wat je echt wilt.","s":["onderhandeling"]},{"id":170,"c":"onderhandeling","t":"Splitsen klinkt fair maar is het niet","b":"Als jij 100 vraagt en zij 0 bieden is 50 geen eerlijk midden.","s":["onderhandeling"]},{"id":171,"c":"emotie","t":"Emotionele granulariteit","b":"Specifieker benoemen = beter reguleren. Gefrustreerd werkt beter dan slecht voelen.","s":["dagelijks"]},{"id":172,"c":"emotie","t":"De 90-seconden regel","b":"Emotie duurt fysiologisch 90 seconden. Daarna is het een keuze om te voeden.","s":["conflict","dagelijks"]},{"id":173,"c":"emotie","t":"Affect labeling kalmeert","b":"Emotie benoemen activeert prefrontale cortex, kalmeert amygdala. Woorden temmen gevoelens.","s":["conflict","dagelijks"]},{"id":174,"c":"emotie","t":"Empathie vs. sympathie","b":"Empathie = ik begrijp. Sympathie = wat erg. Empathie verbindt. Sympathie creëert afstand.","s":["dagelijks","vergadering"]},{"id":175,"c":"emotie","t":"Emotional flooding","b":"Hartslag boven 100 = limbisch overneemt. Pauzeer: geen oplossingen mogelijk.","s":["conflict","dagelijks"]},{"id":176,"c":"emotie","t":"Bid for connection (Gottman)","b":"Voortdurend bids voor verbinding. Erop reageren of negeren bepaalt relatiesterkte.","s":["date","dagelijks"]},{"id":177,"c":"emotie","t":"Repair attempts herkennen","b":"Elke poging spanning te breken: grap, aanraking. Beste relaties herkennen deze.","s":["date","conflict"]},{"id":178,"c":"emotie","t":"Vier ruiters van de apocalyps","b":"Kritiek, minachting, defensiviteit, stonewalling. Minachting is dodelijkst (Gottman).","s":["date","conflict"]},{"id":179,"c":"emotie","t":"Emotionele besmetting","b":"Emoties zijn besmettelijk. Meest expressieve persoon bepaalt stemming. Gebruik bewust.","s":["vergadering","dagelijks"]},{"id":180,"c":"emotie","t":"Validatie voor correctie","b":"Eerst valideren dan corrigeren. Zonder validatie gaat muur omhoog.","s":["conflict","vergadering"]},{"id":181,"c":"emotie","t":"Secundaire emoties","b":"Woede is bijna altijd secundair. Eronder: angst, pijn, schaamte. Reageer op primaire.","s":["conflict","dagelijks"]},{"id":182,"c":"emotie","t":"Emotionele bankrekening","b":"5 positieve nodig per negatieve (Gottman). Elke interactie is storting of opname.","s":["date","dagelijks","vergadering"]},{"id":183,"c":"emotie","t":"Window of tolerance","b":"Boven = hyperactivatie (paniek). Onder = hypoactivatie (shutdown). Ken je venster.","s":["dagelijks","conflict"]},{"id":184,"c":"emotie","t":"Co-regulatie","b":"Je zenuwstelsel reguleert via de ander. Kalm = kalmeren. Stress = versterken.","s":["conflict","dagelijks","vergadering"]},{"id":185,"c":"leugen","t":"Baseline-afwijking is alles","b":"Alleen leugens detecteren als je normaal kent. Afwijkingen zijn het signaal.","s":["vergadering","dagelijks"]},{"id":186,"c":"leugen","t":"Specifieke vragen breken scripts","b":"Niet waarom maar wanneer precies? Geprepareerde antwoorden breken.","s":["vergadering","onderhandeling"]},{"id":187,"c":"leugen","t":"Vraag hoe iets is gebeurd","b":"Leugenaars geven geen stap-voor-stap. Hoe precies? en verhaal stort in.","s":["vergadering","onderhandeling"]},{"id":188,"c":"leugen","t":"Omgekeerde chronologie","b":"Verhaal achterstevoren: waarheid = organisch. Leugen = script breekt.","s":["vergadering"]},{"id":189,"c":"leugen","t":"Cognitive load verhogen","b":"Onverwachte vragen, laten tekenen, oogcontact. Meer belasting = moeilijker liegen.","s":["vergadering"]},{"id":190,"c":"leugen","t":"Incongruentie hoofd-woorden","b":"Ja zeggen + hoofd schudden = geloof lichaam. Altijd.","s":["vergadering","dagelijks"]},{"id":191,"c":"leugen","t":"Stabiel oogcontact bij leugens","b":"Kalme blik maakt leugenaars nerveus. Ze verbreken of overdrijven oogcontact.","s":["vergadering","onderhandeling"]},{"id":192,"c":"leugen","t":"Statement analysis","b":"Leugenaars vermijden ik, gebruiken vage taal, laten stukken weg.","s":["vergadering"]},{"id":193,"c":"leugen","t":"Polyvagale reactie","b":"Liegen activeert sympatisch: droge mond, slikken, stemverandering, rode vlekken nek.","s":["vergadering","dagelijks"]},{"id":194,"c":"leugen","t":"Durations-analyse","b":"Echte emoties 0.5-4 sec. Langer = gespeeld. Korter = micro-expressie (echt maar onderdrukt).","s":["dagelijks","vergadering"]},{"id":195,"c":"macht","t":"Stoelpositie als macht","b":"Hogere stoel, centraler, rug naar muur = dominantie.","s":["vergadering"]},{"id":196,"c":"macht","t":"Timing als machtsvertoon","b":"Te laat = macht OF gebrek aan respect. Altijd eerst = dienend.","s":["vergadering","dagelijks"]},{"id":197,"c":"macht","t":"Naamgebruik-strategie","b":"Naam gebruiken = verbinding. Te vaak = manipulatief. 2-3 keer per gesprek.","s":["vergadering","verkoop","date"]},{"id":198,"c":"macht","t":"Verlaag je stem bij agressie","b":"Zachtere toon dwingt aanpassen. Woede raakt je niet = hun zelfvertrouwen verdwijnt.","s":["conflict","vergadering"]},{"id":199,"c":"macht","t":"Beëindig gesprek als eerste","b":"Ik spreek je later op juiste moment = stille kracht.","s":["vergadering","dagelijks"]},{"id":200,"c":"macht","t":"Niet reageren op beledigingen","b":"Stilte = ongemak voor hen. Ze verwachtten reactie en kregen niets.","s":["conflict","dagelijks"]},{"id":201,"c":"macht","t":"Wachten met antwoorden","b":"Direct = reactief. Even wachten + kalm = overwogen en krachtig.","s":["vergadering","onderhandeling"]},{"id":202,"c":"macht","t":"Territorium met stem","b":"Resonantie, volume, snelheid bepalen hoeveel ruimte je inneemt.","s":["vergadering","verkoop"]},{"id":203,"c":"macht","t":"Kracht van de open vraag","b":"Gesloten = hun controle (ja/nee). Open = jouw controle: zij moeten onthullen.","s":["vergadering","onderhandeling"]},{"id":204,"c":"macht","t":"Wat zou jij doen als je mij was","b":"Kaatst druk terug. Onthullen ware intenties bij positieverplaatsing.","s":["onderhandeling","conflict","vergadering"]},{"id":205,"c":"gesprek","t":"Twee seconden stilte","b":"Mensen haasten stilte te vullen. Stil blijven = meer onthullen dan gepland.","s":["vergadering","onderhandeling","dagelijks"]},{"id":206,"c":"gesprek","t":"Herhaal laatste drie woorden","b":"Begrepen voelen = meer openheid. Diepere informatie bij gehoord voelen.","s":["vergadering","dagelijks","date"]},{"id":207,"c":"gesprek","t":"Korte antwoorden bij dominantie","b":"Ik begrijp het / Oké stopt machtsvertoon. Lang = defensief.","s":["conflict","vergadering"]},{"id":208,"c":"gesprek","t":"Wat wil je dat ik begrijp","b":"Bij opzettelijke verwarring: toneelspel laten vallen.","s":["conflict","vergadering"]},{"id":209,"c":"gesprek","t":"Kalme toon bij serieuze topics","b":"Kalme stem verlaagt weerstand. Meer luisteren, minder agressie.","s":["conflict","vergadering"]},{"id":210,"c":"gesprek","t":"Wat deed je dit kiezen","b":"Bij vage verhalen: dwingt werkelijke reden. Nepverhalen overleven dit niet.","s":["vergadering","dagelijks"]},{"id":211,"c":"gesprek","t":"Langzaam ademen = autoriteit","b":"Mensen kopiëren de ontspanste persoon. Langzaam ademen = respect.","s":["vergadering","conflict"]},{"id":212,"c":"gesprek","t":"Antwoordsnelheid lezen","b":"Snel = emotie. Langzaam = nadenken. Vertelt meer dan woorden.","s":["vergadering","onderhandeling"]},{"id":213,"c":"gesprek","t":"Vertel me meer","b":"Drie woorden die diepere info opleveren dan specifieke vragen.","s":["vergadering","dagelijks","date"]},{"id":214,"c":"gesprek","t":"Samenvatten als controle","b":"Dus als ik het goed begrijp... Wie samenvat controleert narratief.","s":["vergadering","onderhandeling"]},{"id":215,"c":"gesprek","t":"De stilte-sandwich","b":"Punt → stilte → punt herhalen. Stilte geeft gewicht.","s":["vergadering","verkoop"]},{"id":216,"c":"gesprek","t":"Metacommunicatie","b":"Praten over hoe jullie praten. Tilt gesprek hoger.","s":["conflict","vergadering"]},{"id":217,"c":"gesprek","t":"Help me begrijpen frame","b":"Niet-bedreigend maar dwingt antwoord. Beter dan waarom.","s":["vergadering","conflict"]},{"id":218,"c":"gesprek","t":"De en-techniek vs. maar","b":"Ik waardeer je input EN ik zie het anders. Maar wist alles ervoor.","s":["vergadering","dagelijks"]},{"id":219,"c":"gesprek","t":"Emotional labeling real-time","b":"Je lijkt gefrustreerd hierover. Valideert en opent dieper gesprek.","s":["vergadering","conflict"]},{"id":220,"c":"eerste","t":"De eerste 7 seconden","b":"Eerste indruk in 7 sec. Houding, gezicht, kleding domineren. Stem volgt.","s":["sollicitatie","date","verkoop"]},{"id":221,"c":"eerste","t":"Warmte-competentie matrix","b":"Eerst warmte (betrouwbaar?) dan competentie (capabel?). Warmte eerst is cruciaal.","s":["sollicitatie","date","verkoop"]},{"id":222,"c":"eerste","t":"Halo-effect bij ontmoetingen","b":"Eén positieve eigenschap kleurt alles. Goed gekleed = ook slim.","s":["sollicitatie","verkoop"]},{"id":223,"c":"eerste","t":"Power posing","b":"2 min open houding: subjectief meer zelfvertrouwen. Omstreden maar effectief.","s":["sollicitatie","vergadering"]},{"id":224,"c":"eerste","t":"De handdruk-analyse","b":"Stevig niet verplettend. Oogcontact. 2-3 pompen. Eerste fysieke contact.","s":["sollicitatie","vergadering"]},{"id":225,"c":"eerste","t":"Naam herhalen bij introductie","b":"Leuk je te ontmoeten naam. Toont aandacht, slaat naam op.","s":["dagelijks","vergadering","date"]},{"id":226,"c":"eerste","t":"Duchenne-glimlach bij begroeting","b":"Echte glimlach bij eerste ontmoeting zet toon voor hele gesprek.","s":["dagelijks","verkoop","date"]},{"id":227,"c":"eerste","t":"Kleding als communicatie","b":"Outfit communiceert status en intentie voor je mond opengaat.","s":["sollicitatie","vergadering","date"]},{"id":228,"c":"eerste","t":"Binnenkomst-energie","b":"Energie bij binnenkomst wordt onmiddellijk gelezen. Pauze, scan, loop met intentie.","s":["vergadering","sollicitatie"]},{"id":229,"c":"eerste","t":"Peak-end rule","b":"Mensen onthouden piekmoment en einde. Sterk einde overschrijft veel ervoor.","s":["vergadering","date","verkoop"]},{"id":230,"c":"digitaal","t":"Reactietijd op berichten","b":"Onmiddellijk = hoge prioriteit. Uren wachten = power move of drukte. Patroon telt.","s":["date","dagelijks"]},{"id":231,"c":"digitaal","t":"Emoji-gebruik als emotie-proxy","b":"Veel = warmte of compensatie. Plots stoppen = stemmingverschuiving.","s":["dagelijks","date"]},{"id":232,"c":"digitaal","t":"Lengte van antwoorden","b":"Korter wordend = afnemende interesse. Langer = toenemend engagement.","s":["date","dagelijks"]},{"id":233,"c":"digitaal","t":"Vraag-stellen als interesse","b":"Nooit vragen terugstellen = niet geïnteresseerd in jou. Ze willen publiek geen gesprek.","s":["date","dagelijks"]},{"id":234,"c":"digitaal","t":"Social media als spiegel","b":"Wat ze posten = hoe ze gezien willen worden. Wat ze liken = echte interesse.","s":["dagelijks","date"]},{"id":235,"c":"digitaal","t":"Voice notes vs. tekst","b":"Voice = meer moeite, persoonlijker, toon vertelt meer. Tekst = controle.","s":["date","dagelijks"]},{"id":236,"c":"digitaal","t":"Online-offline verschil","b":"Groot verschil = onzeker. Consistentie = authenticiteit.","s":["dagelijks","date"]},{"id":237,"c":"digitaal","t":"Leesbewijzen als machtsspel","b":"Gelezen maar niet reageren = bewust negeren. Uit = vermijding.","s":["date","dagelijks"]},{"id":238,"c":"groep","t":"Groepsdenken herkennen","b":"Unanimiteit zonder discussie = gevaarlijk. Afwezigheid van tegenspraak = alarm.","s":["vergadering"]},{"id":239,"c":"groep","t":"De zondebokdynamiek","b":"Groepen onder stress zoeken zondebok. Onthult meer over groep dan over persoon.","s":["vergadering","dagelijks"]},{"id":240,"c":"groep","t":"Social loafing","b":"In groepen minder inspanning. Groter = meer freeriders. Persoonlijke verantwoordelijkheid helpt.","s":["vergadering"]},{"id":241,"c":"groep","t":"Rollen in groepen (Belbin)","b":"Plant, Monitor, Coordinator, Implementer, Completer. Iedereen neemt een rol.","s":["vergadering"]},{"id":242,"c":"groep","t":"Statusnivellering","b":"Leider koosnaampje geven of bewust casual in formele setting = status nivelleren.","s":["vergadering"]},{"id":243,"c":"geavanceerd","t":"Baseline: leer normaal kennen","b":"Alleen afwijkingen detecteren als je normaal kent.","s":["dagelijks","vergadering"]},{"id":244,"c":"geavanceerd","t":"Clusters geen losse signalen","b":"Eén gebaar = niets. Drie+ over meerdere kanalen = betrouwbaar.","s":["dagelijks","vergadering"]},{"id":245,"c":"geavanceerd","t":"De incongruentie-check","b":"Woorden ≠ lichaamstaal? Vertrouw het lichaam.","s":["dagelijks","vergadering"]},{"id":246,"c":"geavanceerd","t":"Context boven alles","b":"Onvriendelijk na 14-uursvlucht ≠ onvriendelijk persoon.","s":["dagelijks"]},{"id":247,"c":"geavanceerd","t":"Observeer zonder te staren","b":"Zodra iemand merkt dat je leest verandert gedrag. Perifere blik.","s":["dagelijks","vergadering"]},{"id":248,"c":"geavanceerd","t":"De 3-seconderegel","b":"Tel tot drie na observatie. Voorkomt overhaaste conclusies.","s":["dagelijks"]},{"id":249,"c":"geavanceerd","t":"Kalibratie per cultuur","b":"Oogcontact, aanraking, ruimte variëren per cultuur. Ken de cultuur-baseline.","s":["dagelijks","vergadering"]},{"id":250,"c":"geavanceerd","t":"Multi-channel check","b":"Woorden+toon+gezicht+lichaam+context. Alle vijf hetzelfde = betrouwbaar.","s":["dagelijks","vergadering"]},{"id":251,"c":"geavanceerd","t":"Patroonherkenning over tijd","b":"Eén observatie = anekdote. Tien = patroon. Beoordeel op patronen.","s":["dagelijks"]},{"id":252,"c":"geavanceerd","t":"Lezen vs. oordelen","b":"Lezen = waarnemen. Oordelen = interpreteren. Houd ze gescheiden.","s":["dagelijks"]},{"id":253,"c":"geavanceerd","t":"Confirmation bias bestrijden","b":"Je ziet wat je verwacht. Zoek actief het tegenovergestelde.","s":["dagelijks","vergadering"]},{"id":254,"c":"geavanceerd","t":"Timing-analyse","b":"WANNEER is veelzeggender dan WAT. Zucht na voorstel ≠ zucht voor voorstel.","s":["vergadering","onderhandeling"]},{"id":255,"c":"geavanceerd","t":"De terugblik-methode","b":"Na gesprek: wat viel op? Wat voelde off? Onbewuste registreert meer. Vertrouw en analyseer.","s":["dagelijks","vergadering"]},{"id":256,"c":"geavanceerd","t":"Stress-response patronen","b":"Iedereen heeft default: praten, zwijgen, lachen, boos. Ken het patroon = ken de staat.","s":["dagelijks","vergadering","conflict"]},{"id":257,"c":"geavanceerd","t":"Observer-effect compenseren","b":"Jouw aanwezigheid verandert gedrag. Onzichtbaarder = authentieker.","s":["dagelijks","vergadering"]},{"id":258,"c":"lichaamstaal","t":"Ademfrequentie tellen","b":"Tel ademhalingen per minuut. Normaal 12-20. Boven 20 bij gesprek = verborgen stress. Onder 10 = bewust kalmeren.","s":["vergadering","onderhandeling"]},{"id":259,"c":"lichaamstaal","t":"De coverende hand","b":"Hand over mond bij spreken = woorden tegenhouden of schaamte. Bij luisteren = ongeloof of evaluatie.","s":["vergadering","dagelijks"]},{"id":260,"c":"lichaamstaal","t":"Vingerwijzen als agressie","b":"Wijsvinger richting iemand = onbewuste aanval. Vervanging: open hand gebruiken bij aanwijzen.","s":["conflict","vergadering"]},{"id":261,"c":"lichaamstaal","t":"Microaanraking bij flirten","b":"Lichte arm- of schouderaanraking = interesse testen. Reactie (toelaten/terugtrekken) onthult alles.","s":["date"]},{"id":262,"c":"lichaamstaal","t":"Het schaamte-gebaar","b":"Hoofd omlaag, ogen weg, hand naar nek/gezicht = schaamte-cluster. Verschilt van verlegenheid door de duurzaamheid.","s":["dagelijks","vergadering"]},{"id":263,"c":"lichaamstaal","t":"Posturale expansie bij winnen","b":"Na goed nieuws: schouders breder, kin omhoog, borst vooruit. Universeel, ook bij blinden die nooit andere winnaars zagen.","s":["dagelijks","vergadering"]},{"id":264,"c":"lichaamstaal","t":"De verankeringshouding","b":"Handen in de zij (akimbo) = ruimte claimen en paraatheid signaleren. Neemt 20% meer ruimte in. Machtsgebaar.","s":["vergadering","conflict"]},{"id":265,"c":"lichaamstaal","t":"Terugtrekken bij benadering","b":"Achteruit leunen wanneer iemand naar voren komt = ongemak met nabijheid of boodschap. Subtiel maar meetbaar.","s":["vergadering","date"]},{"id":266,"c":"lichaamstaal","t":"Benen-richting bij zitten","b":"Gekruiste benen: bovenste been wijst naar persoon die ze het leukst vinden. Weg wijzen = afweer.","s":["date","vergadering"]},{"id":267,"c":"lichaamstaal","t":"De adamsappelbeweging","b":"Zichtbaar slikken = stress of emotie inslikken. Onmogelijk te onderdrukken. Sterk signaal bij confrontatie.","s":["onderhandeling","conflict"]},{"id":268,"c":"lichaamstaal","t":"De polsflash bij vrouwen","b":"Polsbinnenkant tonen tijdens gesprek = onbewust aantrekkingssignaal. Kwetsbare huid blootstellen = vertrouwen.","s":["date"]},{"id":269,"c":"lichaamstaal","t":"Oorbel/sieraad frunniken","b":"Sieraden aanraken = zelftroostend gedrag. Vergelijkbaar met haarspelen maar subtieler.","s":["vergadering","sollicitatie"]},{"id":270,"c":"lichaamstaal","t":"De diafragma-adem","b":"Diepe buikademhaling voor spreken = bewust kalmeren. Oppervlakkige borstademhaling = onbewuste stress.","s":["vergadering","verkoop"]},{"id":271,"c":"lichaamstaal","t":"Hoofd schudden bij ja zeggen","b":"Subtiel nee-schudden terwijl ze instemmen. Het lichaam weigert wat de mond accepteert.","s":["vergadering","onderhandeling"]},{"id":272,"c":"lichaamstaal","t":"De asymmetrische schouderophaal","b":"Eén schouder bij een statement = twijfel aan eigen woorden. Subtiel maar betrouwbaarste indicator van onzekerheid.","s":["vergadering","sollicitatie"]},{"id":273,"c":"lichaamstaal","t":"Handpalm-naar-beneden gebaar","b":"Neerwaartse handpalm bij spreken = autoriteit en eindigheid. Opwaarts = openheid voor discussie.","s":["vergadering","onderhandeling"]},{"id":274,"c":"lichaamstaal","t":"De neusvleugel-verwijding","b":"Neusvleugels verwijden = meer zuurstof nodig = opwinding, woede of fysieke voorbereiding. Primitief fight-response signaal.","s":["conflict","vergadering"]},{"id":275,"c":"lichaamstaal","t":"Trommelende vingers","b":"Vingers trommelen = ongeduld of opgehoopte energie. Ritme versnelt met toenemende irritatie.","s":["vergadering","dagelijks"]},{"id":276,"c":"lichaamstaal","t":"De catapult-positie","b":"Handen achter hoofd, achterover leunend = extreme dominantie en territoriaal comfort. Alleen in eigen domein.","s":["vergadering"]},{"id":277,"c":"lichaamstaal","t":"Voet-wippen als interesse","b":"Voet op-en-neer bewegen = opwinding of ongeduld. Richting iemand = positieve opwinding. Weg = wil vertrekken.","s":["date","vergadering"]},{"id":278,"c":"lichaamstaal","t":"Het lip-pressing verschil","b":"Bovenlip over onderlip = woede inhouden. Onderlip over bovenlip = verdriet inhouden. Subtiel maar specifiek.","s":["conflict","vergadering"]},{"id":279,"c":"lichaamstaal","t":"Kin-aanraking als evaluatie","b":"Kin vasthouden of strelen = actief evalueren en beslissing nemen. Onderbreek dit niet — ze zijn aan het beslissen.","s":["verkoop","onderhandeling"]},{"id":280,"c":"lichaamstaal","t":"De schoen-wiebel","b":"Schoen half uittrekken en wiebelen = comfort en ontspanning in je aanwezigheid. Schoen stevig aan = paraat om te vertrekken.","s":["date","dagelijks"]},{"id":281,"c":"lichaamstaal","t":"Microexpressie in de nek","b":"Nekspieren verstrakken = onmiddellijke threat-response. Zichtbaar als twee koorden. Sneller dan gezichtsexpressie.","s":["conflict","vergadering"]},{"id":282,"c":"lichaamstaal","t":"De synchrone pas","b":"Gelijk oplopen qua tempo en pas = rapport. Uit sync raken = verbinding wankelt. Test het bewust.","s":["date","dagelijks"]},{"id":283,"c":"gezicht","t":"De Duchenne-marker in ogen","b":"Bij echte glimlach: onderste ooglid omhoog, pupil iets kleiner door wangdruk. Niet te faken zonder hele gezicht.","s":["dagelijks","date"]},{"id":284,"c":"gezicht","t":"Wenkbrauw-asymmetrie","b":"Eén wenkbrauw omhoog = scepticisme of interesse. Beide omhoog = verrassing. Eén omlaag + één omhoog = evaluatie.","s":["vergadering","dagelijks"]},{"id":285,"c":"gezicht","t":"De nose-crinkle bij walging","b":"Neusrimpel bovenaan = morele walging. Onderkant neus = fysieke walging. Subtiel verschil, grote betekenis.","s":["dagelijks","vergadering"]},{"id":286,"c":"gezicht","t":"Mond-stretching bij angst","b":"Horizontaal uitrekken van mond zonder mond openen = onderdrukte angst. Kort maar kenmerkend.","s":["vergadering","conflict"]},{"id":287,"c":"gezicht","t":"Dimple-tracking","b":"Sommige mensen krijgen alleen kuiltjes bij echte glimlach. Ken iemands kuiltjes-baseline voor authenticiteitcheck.","s":["date","dagelijks"]},{"id":288,"c":"gezicht","t":"De blik-driehoek","b":"Zakelijk: oog-oog-voorhoofd. Sociaal: oog-oog-mond. Intiem: oog-oog-lichaam. Waar ze kijken onthult de relatie-intentie.","s":["date","vergadering","verkoop"]},{"id":289,"c":"gezicht","t":"Kaakklemindicator","b":"Masseter-spier zichtbaar aanspannen = woede of frustratie ophopen. Vaak zichtbaar als bewegend stukje bij kaakhoek.","s":["conflict","vergadering"]},{"id":290,"c":"gezicht","t":"De laterale blik","b":"Zijwaarts kijken zonder hoofd te draaien = wantrouwen of berekening. In combinatie met samengeknepen ogen = vijandige evaluatie.","s":["vergadering","onderhandeling"]},{"id":291,"c":"gezicht","t":"Het liplijncomplex","b":"Bovenlip introllen = informatie inhouden. Onderlip introllen = emotie verwerken. Beide = maximale zelfbeheersing.","s":["vergadering","conflict"]},{"id":292,"c":"gezicht","t":"Pupilgrootte en cognitieve belasting","b":"Pupillen worden ook groter bij nadenken. Moeilijke vraag = wijdere pupillen = niet per se liegen maar hard werken.","s":["vergadering"]},{"id":293,"c":"gezicht","t":"De wenkbrauwsamenknijp","b":"Wenkbrauwen naar elkaar = concentratie, pijn of verwarring. Met kaakspanning = woede. Met open mond = ongeloof.","s":["dagelijks","vergadering"]},{"id":294,"c":"gezicht","t":"Eenzijdige neusoptrekking","b":"Eén kant van neus optrekken = asymmetrische walging = specifiek gericht op iets of iemand in de kamer.","s":["vergadering","dagelijks"]},{"id":295,"c":"gezicht","t":"De frozen face","b":"Gezicht dat niet beweegt = maximale emotionele controle of dissociatie. Hoe stiller het gezicht, hoe intenser de interne storm.","s":["conflict","vergadering"]},{"id":296,"c":"gezicht","t":"Orbicularis oculi-squeeze","b":"Ogen samenknijpen alsof je in de zon kijkt maar dat doe je niet = onderdrukte emotie proberen te verbergen achter een glimlach.","s":["vergadering","dagelijks"]},{"id":297,"c":"gezicht","t":"De afkeurende tuit","b":"Lippen tuiten + lichte hoofdschudding = non-verbaal nee voordat ze verbaal reageren. Hun antwoord is al gegeven.","s":["vergadering","onderhandeling"]},{"id":298,"c":"spraak","t":"Het derde-persoons-effect","b":"Over zichzelf praten in derde persoon geeft emotionele afstand. Soms gezond coping, soms narcistisch.","s":["dagelijks"]},{"id":299,"c":"spraak","t":"Hedging-taal herkennen","b":"Ik denk, misschien, een beetje, wellicht. Hoe meer hedges, hoe minder commitment aan de uitspraak.","s":["vergadering","onderhandeling"]},{"id":300,"c":"spraak","t":"Het minimaliseren-patroon","b":"Het was maar, het stelde niets voor, het was niet zo erg. Consequent minimaliseren = verbergen van de ernst.","s":["conflict","dagelijks"]},{"id":301,"c":"spraak","t":"Absolutismen als valkuil","b":"Altijd, nooit, iedereen, niemand. Absoluten zijn zelden waar en signaleren emotioneel redeneren in plaats van logisch.","s":["conflict","dagelijks"]},{"id":302,"c":"spraak","t":"Het non-antwoord","b":"Vraag beantwoorden met een vraag, onderwerp veranderen, of antwoord geven op een vraag die niet gesteld werd.","s":["vergadering","onderhandeling"]},{"id":303,"c":"spraak","t":"Passive voice bij verantwoordelijkheid","b":"Fouten werden gemaakt vs. ik maakte fouten. Passieve constructie = verantwoordelijkheid ontwijken.","s":["vergadering","conflict"]},{"id":304,"c":"spraak","t":"Het inclusief wij","b":"Wij gebruiken als ze jou erbij betrekken zonder toestemming. Wij moeten het erover hebben = zij willen het erover hebben.","s":["vergadering","dagelijks"]},{"id":305,"c":"spraak","t":"Stembuiging aan einde","b":"Declaratief einde (stem omlaag) = zeker. Vraagachtig einde (stem omhoog) = onzeker of goedkeuring zoekend.","s":["vergadering","sollicitatie"]},{"id":306,"c":"spraak","t":"Het aanvullen van zinnen","b":"Iemands zinnen afmaken = ongeduld of dominantie. Laat ze uitpraten en observeer de rest.","s":["vergadering","dagelijks"]},{"id":307,"c":"spraak","t":"Contrastwoorden als lekker","b":"Woorden die tegenstelling markeren — echter, toch, desalniettemin — signaleren het echte standpunt erna.","s":["vergadering","onderhandeling"]},{"id":308,"c":"spraak","t":"De incomplete zin als manipulatie","b":"Zinnen niet afmaken zodat de luisteraar de meest ongunstige versie invult. Insinuatie zonder bewering.","s":["vergadering","dagelijks"]},{"id":309,"c":"spraak","t":"Temporale shifts in verhalen","b":"Wisselen tussen verleden en heden in hetzelfde verhaal. Naar heden = emotioneel herbeleven. Naar verleden = afstand.","s":["dagelijks","vergadering"]},{"id":310,"c":"spraak","t":"Het voorwaardelijk alibi","b":"Als ik dat zou hebben gedaan... Hypothetisch formuleren in plaats van ontkennen = verdacht.","s":["vergadering","conflict"]},{"id":311,"c":"spraak","t":"Ademsteun en overtuigingskracht","b":"Spreken met volle ademsteun (uit het middenrif) klinkt autoritatiever dan spreken vanuit de keel.","s":["verkoop","vergadering"]},{"id":312,"c":"spraak","t":"De strategische herhaling","b":"Eigen boodschap drie keer herhalen in verschillende woorden = onbewust verankeren. Politici en adverteerders gebruiken dit standaard.","s":["verkoop","vergadering"]},{"id":313,"c":"spraak","t":"Understatement als machtstechniek","b":"Het tegenovergestelde van opscheppen. Het was niets bijzonders over iets groots = inverse status.","s":["vergadering","dagelijks"]},{"id":314,"c":"spraak","t":"Laughter als disclamer","b":"Lachen na een serieuze uitspraak = ernst afzwakken. Ik haat mijn baan haha. De lach is de disclaimer, niet de waarheid.","s":["dagelijks","vergadering"]},{"id":315,"c":"spraak","t":"Het hypothetisch scenario","b":"Stel je voor dat... Mensen antwoorden eerlijker op hypothetische vragen dan op directe. Hun waarden worden zichtbaar.","s":["date","dagelijks"]},{"id":316,"c":"spraak","t":"Vocal mirroring","b":"Onbewust spreektempo, volume en toon overnemen = rapport. Bewust mismatch = afstand. Let op wie wie spiegelt.","s":["vergadering","verkoop"]},{"id":317,"c":"spraak","t":"De dramatische pauze","b":"Stilte voor de punchline of kernboodschap = verwachting opbouwen. Stilte na = ruimte voor impact.","s":["verkoop","vergadering"]},{"id":318,"c":"sociaal","t":"De drankjes-test","b":"Wie biedt aan iets te halen? Wie betaalt? De sociale hiërarchie wordt zichtbaar bij de koffieautomaat.","s":["vergadering","dagelijks"]},{"id":319,"c":"sociaal","t":"Proxy-agressie","b":"Agressie richten op een veilig doelwit in plaats van de werkelijke bron. De assistent krijgt de klap die voor de baas bedoeld was.","s":["vergadering","dagelijks"]},{"id":320,"c":"sociaal","t":"Het toegangsbewaker-fenomeen","b":"Wie bepaalt wie toegang krijgt tot wie? Secretaresses, assistenten en partners als poortwachters onthullen de echte machtsstructuur.","s":["vergadering"]},{"id":321,"c":"sociaal","t":"Sociale munteenheid","b":"In elke groep bestaat een onzichtbare munteenheid: humor, kennis, connecties of status. Wie er het meest van heeft, heeft de meeste invloed.","s":["vergadering","dagelijks"]},{"id":322,"c":"sociaal","t":"In-group/out-group dynamiek","b":"Jargon, inside jokes en gedeelde referenties als onzichtbare muur. Wie lacht mee = erbij. Wie niet snapt = erbuiten.","s":["vergadering","dagelijks"]},{"id":323,"c":"sociaal","t":"De alliantie-check bij conflicten","b":"Bij groepsconflict: kijk wie naar wie kijkt voor steun. De blikrichting onthult de onzichtbare coalities.","s":["vergadering","conflict"]},{"id":324,"c":"sociaal","t":"Schaarste-principe bij sociale status","b":"Minder beschikbaar zijn = hogere status. De drukste persoon in de groep wordt automatisch als belangrijker gezien.","s":["dagelijks","vergadering"]},{"id":325,"c":"sociaal","t":"Virtue signaling herkennen","b":"Publiekelijk deugdzaamheid tonen dat niet wordt ondersteund door privégedrag. Het verschil onthult de werkelijke waarden.","s":["dagelijks"]},{"id":326,"c":"sociaal","t":"De eerste-spreker-bias","b":"In vergaderingen: het eerste uitgesproken standpunt kleurt alle volgende. Wie eerst spreekt, framet het gesprek.","s":["vergadering"]},{"id":327,"c":"sociaal","t":"Tokenisme herkennen","b":"Eén persoon van een groep includeren om diversiteit te suggereren zonder echte verandering. De token voelt het altijd.","s":["vergadering","dagelijks"]},{"id":328,"c":"sociaal","t":"Het overnamegesprek","b":"Eén persoon neemt systematisch elk gesprek over door het naar zichzelf te redirecten. Jouw vakantie wordt hun vakantie.","s":["dagelijks"]},{"id":329,"c":"sociaal","t":"De exit-strategie","b":"Hoe iemand een gesprek beëindigt onthult hun ware gevoelens. Abrupt = ongemak. Langzaam = respect. Excuus = vlucht.","s":["dagelijks","vergadering"]},{"id":330,"c":"sociaal","t":"Competitieve empathie","b":"Jouw probleem overnemen met hun grotere probleem. Jij bent moe? Ik heb twee dagen niet geslapen. Invalidatie als sport.","s":["dagelijks"]},{"id":331,"c":"sociaal","t":"De stilte-vullers identificeren","b":"Wie kan stilte verdragen en wie niet? Stilte-vullers zijn meestal angstiger voor sociale oordelen.","s":["vergadering","dagelijks"]},{"id":332,"c":"sociaal","t":"Gatekeeping informatie","b":"Selectief informatie delen om macht te behouden. Wie wat weet = wie de macht heeft.","s":["vergadering"]},{"id":333,"c":"psycho","t":"Defensiemechanismen herkennen","b":"Ontkenning, rationalisatie, sublimatie, verdringing, intellectualisatie. Elk mechanisme beschermt een specifieke kwetsbaarheid.","s":["dagelijks"]},{"id":334,"c":"psycho","t":"Imposter syndrome signalen","b":"Succes toeschrijven aan geluk, niet aan competentie. Angst om ontmaskerd te worden. Overcompenseren met perfectionisme.","s":["vergadering","sollicitatie"]},{"id":335,"c":"psycho","t":"De narcistische verwonding","b":"Buitenproportionele reactie op kleine kritiek = narcistische kwetsbaarheid. De kras op het zelfbeeld voelt als een mes.","s":["conflict","dagelijks"]},{"id":336,"c":"psycho","t":"Reactance-theorie","b":"Verbied iets en mensen willen het meer. Adviseer iets te sterk en ze verzetten zich. Autonomiebedreiging activeert verzet.","s":["verkoop","dagelijks"]},{"id":337,"c":"psycho","t":"Cognitieve misers","b":"Mensen zijn denkluiaards. We nemen shortcuts (heuristieken) in plaats van diep na te denken. Herken wanneer iemand op autopilot oordeelt.","s":["dagelijks","vergadering"]},{"id":338,"c":"psycho","t":"Peak-end bias in herinnering","b":"Mensen herinneren alleen het piekmoment en het einde van een ervaring. De rest vervalt. Creëer sterke eindes.","s":["verkoop","date"]},{"id":339,"c":"psycho","t":"Choice overload","b":"Te veel opties = geen keuze maken. Beperk tot 3-5 opties voor betere beslissingen bij de ander.","s":["verkoop"]},{"id":340,"c":"psycho","t":"Affect heuristic","b":"Positief gevoel over iets = lagere risicoperceptie. Negatief gevoel = hogere risicoperceptie. Gevoel stuurt logica, niet andersom.","s":["verkoop","dagelijks"]},{"id":341,"c":"psycho","t":"De planning fallacy","b":"Mensen onderschatten altijd hoeveel tijd iets kost. Systeem 1 denkt optimistisch. Systeem 2 corrigeert zelden op tijd.","s":["vergadering","dagelijks"]},{"id":342,"c":"psycho","t":"Moral licensing","b":"Na iets goeds doen voelen mensen zich gerechtigd tot iets slechts. Een donatie aan het goede doel rechtvaardigt een zonde.","s":["dagelijks"]},{"id":343,"c":"psycho","t":"Status quo bias","b":"Mensen verkiezen de huidige situatie boven verandering, zelfs als verandering objectief beter is. Verliesaversie vermomd als voorzichtigheid.","s":["onderhandeling","vergadering"]},{"id":344,"c":"psycho","t":"De anchoring bias","b":"Het eerste getal dat je hoort beïnvloedt alle volgende schattingen, zelfs als het irrelevant is. Willekeurig anker = onbewuste invloed.","s":["onderhandeling","verkoop"]},{"id":345,"c":"psycho","t":"Identiteitsprotectief redeneren","b":"Mensen verwerpen feiten die hun identiteit bedreigen. Hoe slimmer de persoon, hoe beter ze in het rationaliseren van hun bias.","s":["dagelijks","vergadering"]},{"id":346,"c":"psycho","t":"De availability bias","b":"Wat je recent hebt gezien lijkt waarschijnlijker. Vliegtuigcrash in het nieuws = vliegangst. Statistiek verliest van levendigheid.","s":["dagelijks"]},{"id":347,"c":"psycho","t":"Negativiteitsbias in communicatie","b":"Negatieve informatie weegt 2-5x zwaarder dan positieve. Eén kritiekpunt wist vijf complimenten.","s":["vergadering","dagelijks"]},{"id":348,"c":"psycho","t":"Het spotlight-effect","b":"Mensen denken dat anderen meer op hen letten dan werkelijk het geval is. Vooral bij fouten. Iedereen is te druk met zichzelf.","s":["dagelijks","sollicitatie"]},{"id":349,"c":"psycho","t":"De IKEA-effect","b":"Mensen overschatten de waarde van dingen die ze zelf hebben gemaakt. Een plan waar ze aan bijdroegen verdedigen ze feller.","s":["vergadering"]},{"id":350,"c":"psycho","t":"Belief perseverance","b":"Eenmaal gevormde overtuigingen blijven bestaan zelfs na weerlegging. De eerste indruk is bijna onverwoestbaar.","s":["dagelijks"]},{"id":351,"c":"psycho","t":"Emotionele regressie onder stress","b":"Onder extreme stress keren mensen terug naar eerdere coping-strategieën, vaak uit de kindertijd. De volwassene verdwijnt tijdelijk.","s":["conflict","dagelijks"]},{"id":352,"c":"manipulatie","t":"De vals dilemma","b":"Twee opties presenteren alsof er geen derde is. Kies je voor mij of tegen mij? De werkelijkheid heeft altijd meer opties.","s":["conflict","dagelijks"]},{"id":353,"c":"manipulatie","t":"Concern trolling","b":"Bezorgdheid veinzen als aanvalsstrategie. Ik maak me alleen zorgen om je. Echte zorg voelt anders dan dit.","s":["dagelijks"]},{"id":354,"c":"manipulatie","t":"Catastrophizing als drukmiddel","b":"Worst-case scenario presenteren om actie te forceren. Als je dit niet doet zal... Angst als sturingsinstrument.","s":["dagelijks","verkoop"]},{"id":355,"c":"manipulatie","t":"Negatieve framing van alternatieven","b":"Jouw opties zo negatief presenteren dat alleen hun optie overblijft. Perspectief vernauwen als controle.","s":["onderhandeling","dagelijks"]},{"id":356,"c":"manipulatie","t":"De informatie-asymmetrie","b":"Bewust informatie achterhouden die de ander nodig heeft voor een eerlijke beslissing. Ethisch het meest onderschatte manipulatievorm.","s":["onderhandeling","verkoop"]},{"id":357,"c":"manipulatie","t":"Plausible deniability","b":"Zo formuleren dat je technisch niets verkeerds hebt gezegd. Ik zei toch niet dat... De vluchtroute is ingebouwd.","s":["dagelijks","vergadering"]},{"id":358,"c":"manipulatie","t":"De vals compliment","b":"Compliment dat eigenlijk een aanval is. Wat moedig dat je dat zo aandurfde. De toon onthult de intentie.","s":["dagelijks"]},{"id":359,"c":"manipulatie","t":"Grooming-patronen herkennen","b":"Grenzen geleidelijk verleggen. Elke stap is klein genoeg om te normaliseren. Het totaal is pas achteraf zichtbaar.","s":["dagelijks"]},{"id":360,"c":"manipulatie","t":"De loyaliteitstest","b":"Iemand dwingen om loyaliteit te bewijzen door iets onredelijks te doen. De test zelf is de rode vlag.","s":["dagelijks","vergadering"]},{"id":361,"c":"manipulatie","t":"De benevolente dictator","b":"Alles controleren maar het verpakken als zorgzaamheid. Ik doe het omdat ik van je hou. Controle met een strik eromheen.","s":["dagelijks","date"]},{"id":362,"c":"manipulatie","t":"Retrospectieve herschrijving","b":"Het verleden hervertellen zodat het past bij het huidige narratief. Was het echt zo of is het herschreven?","s":["conflict","dagelijks"]},{"id":363,"c":"manipulatie","t":"De schuld-shift bij confrontatie","b":"Geconfronteerd worden met hun gedrag en het direct omdraaien. Jij doet het ook. Jij begon. De focus verschuift van hen naar jou.","s":["conflict"]},{"id":364,"c":"manipulatie","t":"Emotional reasoning forceren","b":"Ik voel dat je liegt, dus je liegt. Gevoel als bewijs. Onweerlegbaar want je kunt een gevoel niet ontkennen.","s":["conflict","dagelijks"]},{"id":365,"c":"manipulatie","t":"Het zwijggeld-principe","b":"Na fout: niet sorry maar een cadeau of gunst. De gift is geen berouw maar aflaat.","s":["dagelijks","date"]},{"id":366,"c":"manipulatie","t":"De permanente proefperiode","b":"Je moet je constant bewijzen. Acceptatie is altijd voorwaardelijk. Zekerheid wordt nooit gegeven.","s":["dagelijks","date","vergadering"]},{"id":367,"c":"manipulatie","t":"Performatieve kwetsbaarheid","b":"Huilen of emotie tonen op strategisch moment om gesprek te veranderen. Niet alle tranen zijn authentiek.","s":["conflict","dagelijks"]},{"id":368,"c":"manipulatie","t":"De kruissubsidie-manipulatie","b":"Goed zijn op één vlak om wangedrag op ander vlak te rechtvaardigen. Ik werk zo hard dus mag ik wel... Één deugd compenseert geen ondeugd.","s":["dagelijks"]},{"id":369,"c":"manipulatie","t":"Identity attack","b":"Niet je gedrag maar je identiteit aanvallen. Niet jij maakte een fout maar jij bent een fout. Het verschil is fundamenteel.","s":["conflict","dagelijks"]},{"id":370,"c":"overtuiging","t":"Het Socratisch effect","b":"Mensen overtuig je niet door te vertellen maar door te vragen. De juiste vragen leiden hen naar jouw conclusie, die ze dan als hun eigen idee ervaren.","s":["vergadering","onderhandeling"]},{"id":371,"c":"overtuiging","t":"De inoculatie-techniek","b":"Mensen voorbereiden op tegenargumenten voordat ze die horen. Nu zullen sommigen zeggen... Voorkennis = weerstand.","s":["verkoop","vergadering"]},{"id":372,"c":"overtuiging","t":"Rhyme-as-reason effect","b":"Rijmende uitspraken worden als waardevoller ervaren. An apple a day keeps the doctor away klinkt echter dan niet-rijmende versie.","s":["verkoop"]},{"id":373,"c":"overtuiging","t":"Het bizarreness-effect","b":"Bizarre informatie wordt beter onthouden. Onverwachte voorbeelden of metaforen blijven plakken.","s":["verkoop","vergadering"]},{"id":374,"c":"overtuiging","t":"Processing fluency","b":"Hoe makkelijker iets te verwerken is (eenvoudige taal, goed ontwerp), hoe meer het als waar wordt ervaren.","s":["verkoop","vergadering"]},{"id":375,"c":"overtuiging","t":"De voet-in-de-deur omkering","b":"Door-in-the-face: eerst een absurd groot verzoek, dan je werkelijke (kleinere) verzoek. Het tweede lijkt redelijk.","s":["onderhandeling","verkoop"]},{"id":376,"c":"overtuiging","t":"Het sleeper effect","b":"Een boodschap van een onbetrouwbare bron wordt na verloop van tijd toch geloofwaardig omdat de bron wordt vergeten maar de boodschap blijft.","s":["dagelijks"]},{"id":377,"c":"overtuiging","t":"Temporal discounting gebruiken","b":"Mensen waarderen directe beloningen meer dan toekomstige. Bied iets nu aan in plaats van later iets beters.","s":["verkoop","onderhandeling"]},{"id":378,"c":"overtuiging","t":"De identiteit-appeal","b":"Niet wat je moet doen maar wie je wilt zijn. Stem niet voor milieu maar wees iemand die om de planeet geeft. Identiteit > gedrag.","s":["verkoop","vergadering"]},{"id":379,"c":"overtuiging","t":"Het eenheid-principe","b":"Cialdini's zevende principe: gedeelde identiteit (wij zijn allebei...) is de sterkste overtuiger.","s":["verkoop","onderhandeling"]},{"id":380,"c":"overtuiging","t":"Effort heuristic","b":"Hoe meer moeite iets lijkt te kosten, hoe waardevoller het wordt gevonden. Laat je inspanning zien.","s":["verkoop"]},{"id":381,"c":"overtuiging","t":"De but-you-are-free techniek","b":"Elke request eindigen met maar je bent vrij verhoogt compliance drastisch. Autonomie respecteren = meer medewerking.","s":["verkoop","dagelijks"]},{"id":382,"c":"overtuiging","t":"Chunking voor overtuiging","b":"Grote informatiehoeveelheden opdelen in hapklare brokken. Drie punten van drie argumenten = negen argumenten die voelen als drie.","s":["verkoop","vergadering"]},{"id":383,"c":"overtuiging","t":"Negativity bias in marketing","b":"Wat je kunt verliezen motiveert meer dan wat je kunt winnen. Frame aanbod als bescherming tegen verlies.","s":["verkoop"]},{"id":384,"c":"overtuiging","t":"De piek-techniek","b":"Sla emotioneel toe op het hoogtepunt van aandacht. Timing van je kernboodschap is alles.","s":["verkoop","vergadering"]},{"id":385,"c":"onderhandeling","t":"De late reveal","b":"Strategische informatie pas delen op het moment dat het maximaal impact heeft. Niet als je het hebt maar wanneer het telt.","s":["onderhandeling"]},{"id":386,"c":"onderhandeling","t":"Het ontkoppelen van persoon en probleem","b":"Fisher & Ury: zacht voor de mens, hard voor het probleem. Scheidt de relatie van de inhoud.","s":["onderhandeling","conflict"]},{"id":387,"c":"onderhandeling","t":"ZOPA vinden","b":"Zone of Possible Agreement: het overlappende gebied tussen jullie reserves. Bestaat er geen ZOPA? Dan is er geen deal.","s":["onderhandeling"]},{"id":388,"c":"onderhandeling","t":"De hypothetische concessie","b":"Stel dat ik X zou kunnen doen, zou jij dan bereid zijn om Y? Test mogelijkheden zonder commitment.","s":["onderhandeling"]},{"id":389,"c":"onderhandeling","t":"Referentiekader verschuiven","b":"In plaats van ze van A naar B brengen: verander het frame zodat B de logische conclusie wordt.","s":["onderhandeling","vergadering"]},{"id":390,"c":"onderhandeling","t":"Het reciprociteits-dilemma","b":"Na een concessie wachten ze op jouw concessie. Bevestig ontvangst maar geef niet automatisch terug.","s":["onderhandeling"]},{"id":391,"c":"onderhandeling","t":"Escalation of commitment voorkomen","b":"Wanneer de kosten van doorgaan hoger worden dan stoppen, stoppen de meeste mensen niet. Herken dit bij jezelf en de ander.","s":["onderhandeling"]},{"id":392,"c":"onderhandeling","t":"Het pakket-principe","b":"Onderhandel niet over individuele punten maar over pakketten. Geeft meer ruimte voor creatieve oplossingen.","s":["onderhandeling"]},{"id":393,"c":"onderhandeling","t":"De time-out als strategie","b":"Ik moet hier even over nadenken. Geeft je tijd, toont zelfcontrole en maakt de ander nerveus.","s":["onderhandeling","conflict"]},{"id":394,"c":"onderhandeling","t":"Anchoring door vraagstelling","b":"In plaats van een getal noemen: Wat is het budget hiervoor? Hun antwoord wordt het nieuwe anker.","s":["onderhandeling","verkoop"]},{"id":395,"c":"onderhandeling","t":"Het fairness-argument ontmantelen","b":"Dat is niet fair = emotionele druk. Vraag: fair volgens welke standaard? Fair is subjectief.","s":["onderhandeling","conflict"]},{"id":396,"c":"onderhandeling","t":"De salami-tactiek herkennen","b":"Kleine stukjes vragen tot het totaal onredelijk is. Elke plak lijkt redelijk, de hele salami niet.","s":["onderhandeling"]},{"id":397,"c":"onderhandeling","t":"Emotionele intelligentie in deals","b":"De beste deal is de deal waar de ander tevreden over is. Een slechte deal voor hen = een deal die ze niet nakomen.","s":["onderhandeling"]},{"id":398,"c":"onderhandeling","t":"Het multiple equivalent simultaneous offer","b":"Meerdere gelijkwaardige opties tegelijk bieden. Als ze alles afwijzen weet je dat er iets anders speelt dan de inhoud.","s":["onderhandeling"]},{"id":399,"c":"onderhandeling","t":"Post-settlement settlements","b":"Na het akkoord dooronderhandelen voor wederzijdse verbetering. Alleen mogelijk bij vertrouwen.","s":["onderhandeling"]},{"id":400,"c":"emotie","t":"Mentaliseren","b":"Het vermogen om je eigen en andermans mentale toestanden te begrijpen. Het fundament van alle emotionele intelligentie.","s":["dagelijks"]},{"id":401,"c":"emotie","t":"Emotionele agility","b":"Susan David: niet emoties onderdrukken maar beweeglijk mee omgaan. Ik merk dat ik boos ben in plaats van ik ben boos.","s":["dagelijks","conflict"]},{"id":402,"c":"emotie","t":"De broaden-and-build theorie","b":"Positieve emoties verbreden je denkvermogen en bouwen psychologische reserves op. Barbara Fredrickson.","s":["dagelijks"]},{"id":403,"c":"emotie","t":"Alexithymie herkennen","b":"Onvermogen om eigen emoties te benoemen. Praten over feiten in plaats van gevoelens. Niet onwil maar onvermogen.","s":["dagelijks","date"]},{"id":404,"c":"emotie","t":"Differentiële emoties theorie","b":"Izard: emoties zijn niet alleen reacties maar ook motivatiesystemen. Woede motiveert tot actie. Verdriet tot verbinding.","s":["dagelijks"]},{"id":405,"c":"emotie","t":"De vagus-toon","b":"Hogere vagusactiviteit = beter in emotieregulatie, empathie en sociale verbinding. Trainbaar door ademhaling.","s":["dagelijks"]},{"id":406,"c":"emotie","t":"Emotionele erfenis","b":"Elke familie geeft een emotioneel erfgoed door. Welke emoties mochten getoond worden en welke niet?","s":["dagelijks"]},{"id":407,"c":"emotie","t":"Het proces-model van emotieregulatie","b":"Gross: vijf punten om emoties te reguleren — situatieselectie, situatiemodificatie, aandachtsturing, herbeoordeling, responsmodulatie.","s":["dagelijks"]},{"id":408,"c":"emotie","t":"Emotionele congruentie-effect","b":"In een positieve stemming herinner je positieve dingen. In negatieve stemming negatieve. Stemming kleurt geheugen.","s":["dagelijks"]},{"id":409,"c":"emotie","t":"De affect-as-information theorie","b":"Mensen gebruiken hun huidige gevoel als informatie voor oordelen. Slecht weer = slechte bui = negatief oordeel over ongerelateerde zaken.","s":["dagelijks","vergadering"]},{"id":410,"c":"emotie","t":"Upward vs downward social comparison","b":"Vergelijken met betere = motivatie of jaloezie. Met slechtere = opluchting of minachting. Welke richting kiest iemand?","s":["dagelijks"]},{"id":411,"c":"emotie","t":"De polyvagale theorie in relaties","b":"Porges: veiligheid voelen via sociaal engagement-systeem. Gezichtsuitdrukkingen, stem en luisteren creëren veiligheid of dreiging.","s":["date","dagelijks"]},{"id":412,"c":"emotie","t":"Emotionele validatie niveaus","b":"Zes niveaus (Linehan): aanwezig zijn, accurate reflectie, gedachtelezen, gedrag begrijpen vanuit verleden, normaliseren, radicale echtheid.","s":["dagelijks","conflict"]},{"id":413,"c":"leugen","t":"De vriend-test","b":"Zou een goede vriend gelov
