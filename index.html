<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0f0e">
<meta name="description" content="70+ technieken om iedereen te doorgronden">
<title>Mensen Lezen</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-512.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f0e;
  --surface: #161917;
  --card: #1a1d1c;
  --border: #2a2520;
  --accent: #c8a45a;
  --accent-dim: #a88a3e;
  --teal: #4a8c7a;
  --red: #c45c4a;
  --purple: #7a5c8a;
  --blue: #5a7a8a;
  --text: #f0ece4;
  --text-mid: #b0aaa0;
  --text-dim: #6a6560;
  --text-muted: #4a4540;
  --safe-b: env(safe-area-inset-bottom, 0px);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
html { height:100%; overflow:hidden; }
body {
  font-family: 'Source Sans 3', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100%;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
.header {
  background: linear-gradient(135deg, #1e2120, #0d0f0e);
  padding: 14px 16px 10px;
  text-align: center;
  border-bottom: 2px solid var(--accent);
  flex-shrink: 0;
  position: relative;
}
.header h1 {
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  font-size: 20px;
  color: var(--text);
  letter-spacing: -0.01em;
}
.header h1 span { color: var(--accent); }
.header .sub {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 2px;
}

/* ── TABS ── */
.tabs {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.tab {
  flex: 1;
  padding: 8px 2px 6px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text-dim);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.03em;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
  transition: all 0.2s;
  font-family: inherit;
  text-transform: uppercase;
}
.tab .ico { font-size: 16px; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── CONTENT ── */
.content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(20px + var(--safe-b));
}

/* ── SEARCH BAR ── */
.search-bar {
  padding: 10px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 10;
}
.search-bar input {
  width: 100%;
  padding: 10px 14px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 15px;
  outline: none;
  font-family: inherit;
  transition: border-color 0.2s;
}
.search-bar input:focus { border-color: var(--accent); }
.search-bar input::placeholder { color: var(--text-muted); }

/* ── GOLDEN RULE ── */
.golden-rule {
  margin: 12px 16px;
  background: linear-gradient(135deg, #2a2318, #1a1410);
  border: 1px solid rgba(200,164,90,0.2);
  border-radius: 12px;
  padding: 14px 16px;
}
.golden-rule p { font-size: 13px; color: var(--text-mid); line-height: 1.55; }
.golden-rule strong { color: var(--accent); }

/* ── CATEGORY BUTTON ── */
.cat-btn {
  display: flex;
  align-items: center;
  width: calc(100% - 32px);
  margin: 0 16px 8px;
  padding: 14px 16px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  color: var(--text);
  text-align: left;
  transition: all 0.15s;
  font-family: inherit;
}
.cat-btn:first-of-type { margin-top: 12px; }
.cat-btn:active { transform: scale(0.98); }
.cat-btn .cat-icon { font-size: 24px; margin-right: 14px; }
.cat-btn .cat-label { font-weight: 700; font-size: 14px; }
.cat-btn .cat-count { font-size: 11px; color: var(--text-dim); margin-top: 1px; }
.cat-btn .cat-arrow { color: var(--text-muted); font-size: 20px; margin-left: auto; }
.new-badge {
  display: inline-block;
  background: var(--teal);
  color: #fff;
  font-size: 8px;
  padding: 1px 6px;
  border-radius: 8px;
  margin-left: 6px;
  font-weight: 700;
  letter-spacing: 0.04em;
  vertical-align: middle;
}

/* ── BACK BUTTON ── */
.back-row {
  padding: 10px 16px 4px;
  display: flex;
  align-items: center;
  gap: 8px;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 10;
}
.back-btn {
  background: none;
  border: none;
  color: var(--accent);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
}
.back-cat-name { font-weight: 700; font-size: 13px; }

/* ── TECHNIQUE CARD ── */
.tech-card {
  margin: 0 16px 6px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  border-left-width: 4px;
  border-left-style: solid;
}
.tech-card:first-of-type { margin-top: 8px; }
.tech-card:active { transform: scale(0.985); }
.tech-top { display: flex; align-items: flex-start; gap: 10px; }
.tech-num {
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  font-size: 13px;
  opacity: 0.3;
  min-width: 22px;
  padding-top: 1px;
}
.tech-title {
  flex: 1;
  font-weight: 700;
  font-size: 14px;
  line-height: 1.35;
  padding-right: 30px;
}
.tech-body {
  font-size: 13px;
  color: var(--text-mid);
  line-height: 1.6;
  margin-top: 10px;
  padding-left: 32px;
  padding-bottom: 2px;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity:0; transform: translateY(-4px); } to { opacity:1; transform: none; } }

.fav-btn {
  position: absolute;
  top: 12px;
  right: 12px;
  background: none;
  border: none;
  font-size: 20px;
  cursor: pointer;
  padding: 4px;
  transition: transform 0.15s;
  line-height: 1;
}
.fav-btn:active { transform: scale(1.3); }

/* ── BOOK CARD ── */
.book-card {
  margin: 0 16px 6px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  border-left: 3px solid var(--accent-dim);
}
.book-card:first-of-type { margin-top: 12px; }
.book-author { font-weight: 700; font-size: 13px; color: var(--text); }
.book-title { font-size: 13px; color: var(--accent); font-style: italic; margin: 2px 0 4px; }
.book-desc { font-size: 12px; color: var(--text-dim); line-height: 1.4; }

/* ── SECTION LABEL ── */
.section-label {
  padding: 12px 16px 6px;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-weight: 700;
  color: var(--text-dim);
}

/* ── EMPTY STATE ── */
.empty {
  text-align: center;
  padding: 48px 24px;
  color: var(--text-dim);
}
.empty .big { font-size: 36px; margin-bottom: 8px; }
.empty .msg { font-size: 14px; }
.empty .hint { font-size: 12px; margin-top: 6px; color: var(--text-muted); }

/* ── RANDOM BUTTON ── */
.random-btn {
  display: block;
  margin: 16px auto;
  padding: 10px 24px;
  background: linear-gradient(135deg, #2a2318, #1a1410);
  border: 1px solid rgba(200,164,90,0.25);
  border-radius: 10px;
  color: var(--accent);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}
.random-btn:active { transform: scale(0.96); }

/* Scrollbar */
.content::-webkit-scrollbar { width: 4px; }
.content::-webkit-scrollbar-track { background: transparent; }
.content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<div class="header">
  <h1>Mensen <span>Lezen</span></h1>
  <div class="sub" id="subtitle">72 technieken · 0 favorieten</div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="home" onclick="switchTab('home')"><span class="ico">◉</span>Alles</button>
  <button class="tab" data-tab="categories" onclick="switchTab('categories')"><span class="ico">▦</span>Categorieën</button>
  <button class="tab" data-tab="favorites" onclick="switchTab('favorites')"><span class="ico">★</span>Favorieten</button>
  <button class="tab" data-tab="search" onclick="switchTab('search')"><span class="ico">⌕</span>Zoeken</button>
  <button class="tab" data-tab="books" onclick="switchTab('books')"><span class="ico">📚</span>Boeken</button>
</div>

<div class="content" id="content"></div>

<script>
// ══════════════════════════════════════════
// DATA
// ══════════════════════════════════════════
const CATS = [
  { id:"lichaamstaal", label:"Lichaamstaal & Fysieke Signalen", icon:"👁", color:"#c8a45a" },
  { id:"spraak", label:"Spraak & Stemanalyse", icon:"🗣", color:"#b07d3a" },
  { id:"sociaal", label:"Sociale Dynamiek & Macht", icon:"👥", color:"#8a6d3e" },
  { id:"psycho", label:"Psychologische Patronen", icon:"🧠", color:"#7a5c8a" },
  { id:"manipulatie", label:"Manipulatie Herkennen", icon:"🎭", color:"#c45c4a" },
  { id:"geavanceerd", label:"Geavanceerde Observatie", icon:"🔬", color:"#5a7a8a" },
  { id:"invloed", label:"Invloed & Gesprekstactieken", icon:"⚡", color:"#4a8c7a", isNew:true },
];

const T = [
  {id:1,c:"lichaamstaal",t:"De voeten liegen nooit",b:"Voeten wijzen altijd naar waar iemand naartoe wil. Als iemands bovenlichaam naar jou gericht is maar de voeten naar de deur wijzen, wil diegene weg. Joe Navarro noemt de voeten het eerlijkste lichaamsdeel — omdat we vergeten ze te controleren."},
  {id:2,c:"lichaamstaal",t:"Handen op de borst vs. weg van het lichaam",b:"Wanneer iemand over zichzelf praat en de handen naar de borst brengt, geloven ze wat ze zeggen. Bewegen de handen weg? Dan voeren ze het op."},
  {id:3,c:"lichaamstaal",t:"Het pupileffect",b:"Pupillen verwijden zich bij opwinding, interesse of verlangen — en vernauwen bij afkeer of stress. Een van de weinige signalen die je niet kunt faken. Let er op in onderhandelingen."},
  {id:4,c:"lichaamstaal",t:"De suprasternale inkeping",b:"De holte onderaan de keel. Wanneer iemand dit gebied aanraakt of bedekt, voelen ze zich bedreigd, onzeker of ongemakkelijk. Een van de betrouwbaarste stressindicatoren."},
  {id:5,c:"lichaamstaal",t:"Steepling: vingertoppen tegen elkaar",b:"Het enige universele gebaar van zelfvertrouwen. Zakken de handen of worden ze ineengevouwen? Dan zakt het vertrouwen."},
  {id:6,c:"lichaamstaal",t:"Vier-signalen-combinatie van wantrouwen",b:"Handen aanraken, gezicht aanraken, achterover leunen, armen kruisen. Eén signaal zegt niets — alle vier samen is een rode vlag."},
  {id:7,c:"lichaamstaal",t:"Micro-expressies: 1/25e seconde",b:"Echte emoties schieten in flitsen over het gezicht voordat iemand ze kan maskeren. Let op minachting (één mondhoek omhoog) en walging (opgetrokken bovenlip). Universeel."},
  {id:8,c:"lichaamstaal",t:"Echte glimlach vs. neppe",b:"Een Duchenne-glimlach activeert de oogspieren — kraaienpootjes, ogen lachen mee. Een sociale glimlach gebruikt alleen de mond. Zodra je dit ziet, kun je het nooit meer ontzien."},
  {id:9,c:"lichaamstaal",t:"Lip-compressie",b:"Lippen stevig op elkaar = informatie achterhouden of sterk oneens. Hoe dunner de lippen, hoe groter het ongenoegen."},
  {id:10,c:"lichaamstaal",t:"Het ventileren",b:"Aan kraag trekken, haar naar achteren, over nek wrijven — letterlijk stoom afblazen. Moeilijk te onderdrukken stressreactie."},
  {id:11,c:"lichaamstaal",t:"Beenvrijving (leg cleansing)",b:"Herhaaldelijk met handpalmen over bovenbenen wrijven = zelfgeruststellend gebaar bij hoge stress. Vaak bij mensen die iets verbergen."},
  {id:12,c:"lichaamstaal",t:"De buikblokkade",b:"Tas, kussen, laptop voor de buik = onbewust schild. Hoe meer objecten tussen jullie, hoe onveiliger diegene zich voelt."},
  {id:13,c:"lichaamstaal",t:"Het wenkbrauwflits-effect",b:"Snelle wenkbrauwbeweging omhoog bij begroeting = oprecht blij. Geen flash? Meer plicht dan plezier."},
  {id:14,c:"lichaamstaal",t:"Tongpersen",b:"Tong tegen binnenkant wang bij stress. Extreem subtiel maar zeer betrouwbaar. Navarro zag dit bij mensen die betrapt werden."},
  {id:15,c:"lichaamstaal",t:"De ademhaling vertelt alles",b:"Snel en oppervlakkig = angst. Diepe zucht = opluchting of onderdrukte frustratie. Let op veranderingen in ritme."},
  {id:16,c:"spraak",t:"Waar ze vertragen in een verhaal",b:"Mensen racen door gerepeteerde stukken. Bij stukken met emotioneel gewicht vertragen ze. In die pauze leeft het echte verhaal."},
  {id:17,c:"spraak",t:"Stemhoogte bij een leugen",b:"Stemhoogte stijgt licht bij liegen. Stembanden spannen door stress. Je oren zijn vaak betrouwbaarder dan je ogen."},
  {id:18,c:"spraak",t:"Overmatig detail als rookgordijn",b:"Leugenaars voegen onnodige details toe. Spontaan uitleggen wat ze aten, welke kleur de auto had — terwijl je niet vroeg — is een waarschuwing."},
  {id:19,c:"spraak",t:"Verdwijnen van samentrekkingen",b:"Plots formeler praten bij een specifiek onderwerp = proberen afstand te creëren."},
  {id:20,c:"spraak",t:"Vraag herhalen voor antwoord",b:"Je vraag herhalen voordat ze antwoorden = tijd kopen om een antwoord te construeren. Eerlijke antwoorden komen direct."},
  {id:21,c:"spraak",t:"Kwalificerende taal",b:"'Eerlijk gezegd...', 'Om heel eerlijk te zijn...' — hoe meer nadruk op waarheid, hoe groter de kans op onwaarheid."},
  {id:22,c:"spraak",t:"Chronologische vs. emotionele vertelling",b:"Vraag een gebeurtenis in omgekeerde volgorde. Waarheid = geen probleem. Leugen = in de war raken."},
  {id:23,c:"sociaal",t:"Naar wie kijken ze na een grap?",b:"Na iets grappigs kijken mensen naar degene wiens goedkeuring telt. Eén seconde, onbewust. De complete machtskaart."},
  {id:24,c:"sociaal",t:"Wie draait het lichaam naar wie?",b:"Iedereen draait onbewust het lichaam naar de persoon die ze het belangrijkst vinden. Meeste torso's = meeste macht."},
  {id:25,c:"sociaal",t:"Hoe ze onbelangrijke mensen behandelen",b:"De willekeurige vreemdeling. Dát is de onbewaakte versie. Elke andere versie is geregisseerd."},
  {id:26,c:"sociaal",t:"Spiegeleffect (mirroring)",b:"Mensen die je mogen spiegelen je houding en spreektempo. Let op wanneer het stopt — dan breekt de verbinding."},
  {id:27,c:"sociaal",t:"Wie onderbreekt wie?",b:"Het interruptiepatroon = de werkelijke hiërarchie. Ongestoord uitpraten = macht. Onderbroken zonder protest = lagere positie."},
  {id:28,c:"sociaal",t:"Reactie op andermans goed nieuws",b:"Oprechte warmte, afleiding, of redirect naar zichzelf — drie compleet verschillende mensen. Meer veelzeggend dan woorden."},
  {id:29,c:"sociaal",t:"'Wij' vs. 'ik' patroon",b:"'Wij' bij succes + 'zij' bij falen = karakter onthuld. 'Ik' bij prestaties + 'wij' bij fouten = credit stelen."},
  {id:30,c:"sociaal",t:"De telefoontest",b:"Negeren = je bent belangrijk. Scherm checken = je bent een optie. Opnemen zonder excuus = je bent achtergrondlawaai."},
  {id:31,c:"psycho",t:"Vraag hoe ze als kind waren",b:"Ze beschrijven zichzelf nu en noemen het het verleden. Ze onthullen wie ze nog steeds zijn."},
  {id:32,c:"psycho",t:"Vraag over iemand die ze haten",b:"Mensen beschrijven vijanden met eigenschappen die ze zelf willen. De kritiek is altijd autobiografisch."},
  {id:33,c:"psycho",t:"Het eerste en laatste wat ze zeggen",b:"Eerste zin = wat op hun hart ligt. Laatste zin (druk eraf) = de echte reden waarom ze kwamen."},
  {id:34,c:"psycho",t:"Wat vinden ze grappig?",b:"Humor = venster naar waarden. Wat iemand grappig vindt, vertelt je wat ze normaal vinden."},
  {id:35,c:"psycho",t:"Hoe ze over hun ex praten",b:"Elke ex 'gek'? Het patroon is niet de ex. Nuance + eigen aandeel = emotionele volwassenheid."},
  {id:36,c:"psycho",t:"De 'ja, maar...' persoon",b:"Wil geen hulp — wil bevestiging van machteloosheid. Onthult of iemand klaar is voor verandering."},
  {id:37,c:"psycho",t:"Hoe ze reageren op een grens",b:"Zeg 'nee' en kijk. Respecteren = vertrouwen. Doorduwen, omzeilen, schuldgevoel geven = de relatie is iets om te winnen."},
  {id:38,c:"psycho",t:"Het complimentenpatroon",b:"Vergelijkende complimenten isoleren je en creëren loyaliteit via exclusiviteit. Klassieke manipulatietechniek."},
  {id:39,c:"psycho",t:"Driehoekscommunicatie",b:"Altijd over afwezigen praten in plaats van direct. Ga ervan uit dat ze hetzelfde doen als jij er niet bent."},
  {id:40,c:"psycho",t:"Hoe ze omgaan met een fout",b:"Toegeven + excuus + gedrag veranderen = integriteit. Bagatelliseren + 'het spijt me DAT je...' = manipulatie als empathie."},
  {id:41,c:"manipulatie",t:"Love bombing",b:"Overweldigende aandacht = investeringsstrategie. Emotionele schuld creëren die later wordt opgeëist."},
  {id:42,c:"manipulatie",t:"Gaslighting",b:"'Dat heb ik nooit gezegd', 'Je overdrijft' — systematisch je waarneming in twijfel trekken. Je afhankelijk maken van hún werkelijkheid."},
  {id:43,c:"manipulatie",t:"Negging",b:"Compliment dat je zelfvertrouwen ondermijnt. Ontworpen om goedkeuring te zoeken bij de kwetser."},
  {id:44,c:"manipulatie",t:"Foot-in-the-door",b:"Klein verzoek, dan steeds groter. Beoordeel elk verzoek afzonderlijk — niet door eerdere afspraken."},
  {id:45,c:"manipulatie",t:"Kunstmatige schaarste en urgentie",b:"'Nu of nooit' = bijna altijd manipulatie. Echte kansen overleven een nachtje slapen."},
  {id:46,c:"manipulatie",t:"Schuldvraag als wapen",b:"'Na alles wat ik voor je deed...' Gezonde relaties houden geen scorebord. Herinneren aan gunsten = rekenen op rente."},
  {id:47,c:"manipulatie",t:"Strategische kwetsbaarheid",b:"Snel kwetsbaar = controleren. Echte kwetsbaarheid voelt ongemakkelijk voor de deler. Strategische voelt gepolijst."},
  {id:48,c:"manipulatie",t:"Het bewegende doelpunt",b:"Je voldoet maar de eis verschuift. Nooit goed genoeg = je zit in een controlespel."},
  {id:49,c:"geavanceerd",t:"De baseline: leer normaal kennen",b:"Alleen afwijkingen detecteren als je weet wat normaal is. Eerst standaardgedrag observeren."},
  {id:50,c:"geavanceerd",t:"Clusters, geen losse signalen",b:"Eén gebaar = niets. Drie+ signalen over meerdere kanalen = betrouwbaar."},
  {id:51,c:"geavanceerd",t:"De incongruentie-check",b:"Woorden ≠ lichaamstaal? Vertrouw het lichaam. 'Ja' zeggen + hoofd schudden = geloof het hoofd."},
  {id:52,c:"geavanceerd",t:"Context boven alles",b:"'Onvriendelijk' na een 14-uursvlucht ≠ onvriendelijk persoon. Context maakt je lezing accurater."},
  {id:53,c:"geavanceerd",t:"Observeer zonder te staren",b:"Zodra iemand merkt dat je leest, verandert het gedrag. Perifere blik. Handen kijken bij oogcontact."},
  {id:54,c:"geavanceerd",t:"De 3-seconderegel",b:"Tel tot drie na elke observatie voordat je concludeert. Geeft je brein tijd voor extra data."},
  {id:55,c:"invloed",t:"Knik voordat je spreekt",b:"Mensen stemmen makkelijker in vlak nadat ze knikken. Eén langzame knik voor je praat = instemmings-modus."},
  {id:56,c:"invloed",t:"Wie het eerst uitlegt, bepaalt het verhaal",b:"Beschrijf direct na een gespannen moment rustig de situatie. Mensen onthouden jouw versie."},
  {id:57,c:"invloed",t:"Specifieke vragen dwingen waarheid af",b:"Niet 'waarom' maar 'wanneer besloot je dat dit het juiste was?' Breekt voorbereide antwoorden af."},
  {id:58,c:"invloed",t:"Langzaam ademen = rustige autoriteit",b:"Mensen kopiëren de meest ontspannen persoon. Langzaam ademen = veiliger voelen = meer respect."},
  {id:59,c:"invloed",t:"Beëindig het gesprek als eerste",b:"'Ik spreek je later' op het juiste moment = stille kracht. Respecteren degene die niet vasthoudt."},

];

const BOOKS = [
  {a:"Joe Navarro",t:"What Every Body Is Saying",d:"De bijbel van non-verbale communicatie. 400+ gedragssignalen."},
  {a:"Joe Navarro",t:"The Dictionary of Body Language",d:"Naslagwerk met 400+ specifieke lichaamstaal-cues."},
  {a:"Paul Ekman",t:"Telling Lies",d:"Micro-expressie-onderzoek over het detecteren van leugens."},
  {a:"Paul Ekman",t:"Emotions Revealed",d:"Emoties herkennen in gezichtsuitdrukkingen."},
  {a:"Vanessa Van Edwards",t:"Cues",d:"96 signalen die mensen uitzenden, met praktische oefeningen."},
  {a:"Robert Cialdini",t:"Influence",d:"De zes principes van overtuiging."},
  {a:"Robert Greene",t:"The Laws of Human Nature",d:"Menselijke gedragspatronen door de eeuwen heen."},
  {a:"Gavin de Becker",t:"The Gift of Fear",d:"Hoe je instincten je beschermen."},
  {a:"Chris Voss",t:"Never Split the Difference",d:"FBI-onderhandelingstechnieken onder druk."},
  {a:"Malcolm Gladwell",t:"Talking to Strangers",d:"Waarom we zo slecht zijn in het lezen van vreemden."},
];

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let state = {
  view: "home",
  cat: null,
  search: "",
  expanded: null,
  favs: JSON.parse(localStorage.getItem("ml-favs") || "[]"),
};

function saveFavs() {
  localStorage.setItem("ml-favs", JSON.stringify(state.favs));
  document.getElementById("subtitle").textContent = T.length + " technieken · " + state.favs.length + " favorieten";
}

function toggleFav(id) {
  const i = state.favs.indexOf(id);
  if (i >= 0) state.favs.splice(i, 1); else state.favs.push(id);
  saveFavs();
  render();
}

function getCat(id) { return CATS.find(c => c.id === id); }

// ══════════════════════════════════════════
// TABS
// ══════════════════════════════════════════
function switchTab(tab) {
  state.view = tab;
  state.cat = null;
  state.search = "";
  state.expanded = null;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  render();
  if (tab === "search") setTimeout(() => { const el = document.getElementById("searchInput"); if(el) el.focus(); }, 50);
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function render() {
  const el = document.getElementById("content");
  el.scrollTop = 0;

  if (state.view === "books") { el.innerHTML = renderBooks(); return; }
  if (state.view === "categories" && !state.cat) { el.innerHTML = renderCategories(); return; }
  if (state.view === "search") { el.innerHTML = renderSearch() + renderCards(getFiltered()); return; }
  if (state.view === "favorites") { el.innerHTML = renderCards(getFiltered(), true); return; }
  // home or category drill-in
  let html = "";
  if (state.cat) html += renderBackRow();
  else html += renderGoldenRule() + renderRandomBtn();
  html += renderCards(getFiltered());
  el.innerHTML = html;
}

function getFiltered() {
  if (state.search) {
    const q = state.search.toLowerCase();
    return T.filter(x => x.t.toLowerCase().includes(q) || x.b.toLowerCase().includes(q));
  }
  if (state.view === "favorites") return T.filter(x => state.favs.includes(x.id));
  if (state.cat) return T.filter(x => x.c === state.cat);
  return T;
}

function renderGoldenRule() {
  return '<div class="golden-rule"><p><strong>De gouden regel:</strong> Beoordeel nooit op basis van één signaal. Zoek naar clusters, vergelijk met de baseline, en houd rekening met context.</p></div>';
}

function renderRandomBtn() {
  return '<button class="random-btn" onclick="showRandom()">🎲 Willekeurige techniek</button>';
}

function renderSearch() {
  return `<div class="search-bar"><input id="searchInput" type="text" placeholder="Zoek in alle technieken..." value="${state.search}" oninput="handleSearch(this.value)"></div>`;
}

function renderCategories() {
  return CATS.map(c => {
    const count = T.filter(x => x.c === c.id).length;
    return `<button class="cat-btn" onclick="drillCat('${c.id}')" style="border-left:4px solid ${c.color}">
      <span class="cat-icon">${c.icon}</span>
      <div style="flex:1">
        <div class="cat-label">${c.label}${c.isNew ? '<span class="new-badge">NIEUW</span>' : ''}</div>
        <div class="cat-count">${count} technieken</div>
      </div>
      <span class="cat-arrow">›</span>
    </button>`;
  }).join('');
}

function renderBackRow() {
  const c = getCat(state.cat);
  return `<div class="back-row">
    <button class="back-btn" onclick="state.cat=null;render()">← Terug</button>
    <span class="back-cat-name" style="color:${c.color}">${c.icon} ${c.label}</span>
  </div>`;
}

function renderCards(items, isFavView) {
  if (!items.length) {
    if (isFavView) return '<div class="empty"><div class="big">★</div><div class="msg">Nog geen favorieten</div><div class="hint">Tik op het sterretje bij een techniek</div></div>';
    if (state.search) return `<div class="empty"><div class="big">⌕</div><div class="msg">Geen resultaten voor "${state.search}"</div></div>`;
    return '';
  }
  return items.map(x => {
    const c = getCat(x.c);
    const isExp = state.expanded === x.id;
    const isFav = state.favs.includes(x.id);
    const isNew = c && c.isNew;
    return `<div class="tech-card" style="border-left-color:${c?c.color:'#c8a45a'}" onclick="toggleExpand(${x.id})">
      <div class="tech-top">
        <span class="tech-num" style="color:${c?c.color:'#c8a45a'}">${String(x.id).padStart(2,'0')}</span>
        <span class="tech-title">${x.t}${isNew?'<span class="new-badge" style="font-size:7px;margin-left:6px">✦</span>':''}</span>
      </div>
      ${isExp ? `<div class="tech-body">${x.b}</div>` : ''}
      <button class="fav-btn" onclick="event.stopPropagation();toggleFav(${x.id})" style="color:${isFav?'#c8a45a':'#3a3530'}">${isFav?'★':'☆'}</button>
    </div>`;
  }).join('');
}

function renderBooks() {
  return '<div class="section-label">Aanbevolen Lectuur</div>' +
    BOOKS.map(b => `<div class="book-card">
      <div class="book-author">${b.a}</div>
      <div class="book-title">${b.t}</div>
      <div class="book-desc">${b.d}</div>
    </div>`).join('');
}

// ══════════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════════
function toggleExpand(id) { state.expanded = state.expanded === id ? null : id; render(); }
function drillCat(id) { state.cat = id; render(); }
function handleSearch(val) { state.search = val; render(); const el = document.getElementById("searchInput"); if(el){el.focus();el.setSelectionRange(val.length,val.length);} }
function showRandom() {
  const r = T[Math.floor(Math.random()*T.length)];
  state.expanded = r.id;
  state.cat = null;
  render();
  setTimeout(() => {
    const cards = document.querySelectorAll('.tech-card');
    cards.forEach(card => {
      if (card.querySelector('.tech-num')?.textContent.trim() === String(r.id).padStart(2,'0')) {
        card.scrollIntoView({behavior:'smooth', block:'center'});
        card.style.boxShadow = '0 0 20px rgba(200,164,90,0.3)';
        setTimeout(() => card.style.boxShadow = '', 1500);
      }
    });
  }, 50);
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
saveFavs();
render();

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
</html>
