iemand stelt onthult hun prioriteit. 'Wat doe je?' = statusgericht. 'Waar ken je de gastheer van?' = sociaal gericht.","s":["date","dagelijks"]},{"id":791,"c":"eerste","t":"Ambitieuze Desinteresse","b":"Het bewust tonen van desinteresse om interesse te wekken. Herkenbaar aan een te casual houding gecombineerd met strategische aanwezigheid.","s":["date","verkoop"]},{"id":792,"c":"overtuiging","t":"Sleeper Effect","b":"Een ongeloofwaardige bron kan toch overtuigen — maar pas na verloop van tijd, wanneer de bron vergeten is maar de boodschap blijft.","s":["verkoop","dagelijks"]},{"id":793,"c":"overtuiging","t":"Inoculation Theory","b":"Vaccineer mensen tegen overtuiging door ze eerst een zwakke versie van het tegenargument te geven. Ze bouwen mentale weerstand op.","s":["vergadering","onderhandeling"]},{"id":794,"c":"overtuiging","t":"Narrative Transportation","b":"Verhalen overtuigen doordat luisteraars 'getransporteerd' worden en hun kritische filters verlagen. Let op wanneer iemand je meeneemt in een verhaal.","s":["verkoop","dagelijks"]},{"id":795,"c":"overtuiging","t":"Self-Persuasion","b":"De krachtigste overtuiging is zelfovertuiging. Stel vragen die de ander naar jouw conclusie leiden zonder die conclusie zelf uit te spreken.","s":["verkoop","onderhandeling"]},{"id":796,"c":"overtuiging","t":"De Ben Franklin Methode","b":"Vraag iemand om een gunst en ze gaan je aardiger vinden. Cognitieve dissonantie: 'Ik hielp hem, dus ik moet hem aardig vinden.'","s":["dagelijks","verkoop"]},{"id":797,"c":"overtuiging","t":"Paradox van Keuze Inzetten","b":"Te veel opties verlamt. Bied drie opties aan waarvan je weet welke ze kiezen. De illusie van keuze is overtuigender dan geen keuze.","s":["verkoop","onderhandeling"]},{"id":798,"c":"overtuiging","t":"Peak-End Rule bij Overtuiging","b":"Mensen beoordelen ervaringen op het hoogtepunt en het einde. Zorg dat je sterkste argument en je afsluiting memorabel zijn.","s":["verkoop","onderhandeling"]},{"id":799,"c":"overtuiging","t":"Commitment Escalatie","b":"Eenmaal gecommitteerd aan een richting, verdubbelen mensen hun inzet — zelfs bij tegenslag. Herken wanneer iemand in de 'sunk cost' valkuil zit.","s":["onderhandeling","vergadering"]},{"id":800,"c":"overtuiging","t":"Identiteits-Appèl","b":"Spreek iemands identiteit aan: 'Als innovator weet jij...' Dit is krachtiger dan logische argumenten omdat het het zelfbeeld aanspreekt.","s":["verkoop","onderhandeling"]},{"id":801,"c":"overtuiging","t":"De Reden-Omdat Techniek","b":"Voeg 'omdat' toe aan elk verzoek, zelfs met een zwakke reden. 'Mag ik voor? Omdat ik haast heb.' De compliance stijgt met 50%.","s":["dagelijks","verkoop"]},{"id":802,"c":"onderhandeling","t":"ZOPA Analyse","b":"De Zone of Possible Agreement — het overlappende gebied waar beide partijen akkoord kunnen gaan. Zonder ZOPA is er geen deal mogelijk.","s":["onderhandeling","verkoop"]},{"id":803,"c":"onderhandeling","t":"Logrolling","b":"Ruil concessies op punten die voor jou weinig waarde hebben maar voor de ander veel. Creëer waarde door verschillen in prioriteit.","s":["onderhandeling","vergadering"]},{"id":804,"c":"onderhandeling","t":"Het Nibble","b":"Na akkoord op het grote punt, vraag een kleine extra concessie. 'En de levering is gratis, toch?' Werkt omdat mensen momentum willen behouden.","s":["onderhandeling","verkoop"]},{"id":805,"c":"onderhandeling","t":"Boulwarisme Herkennen","b":"Een openingsbod als 'take it or leave it' presenteren. Herkenbaar aan: geen ruimte voor discussie, druk op tempo, ultimatum-taal.","s":["onderhandeling","verkoop"]},{"id":806,"c":"onderhandeling","t":"De Columbo Techniek","b":"Na afloop van een gesprek, bij de deur: 'Oh, nog één dingetje...' De ander heeft zijn mentale verdediging al losgelaten.","s":["onderhandeling","dagelijks"]},{"id":807,"c":"onderhandeling","t":"Reactive Devaluation","b":"Elk voorstel van de tegenpartij wordt automatisch minder waard geacht. Laat voorstellen via een neutrale derde partij komen.","s":["onderhandeling","conflict"]},{"id":808,"c":"onderhandeling","t":"Het Flinch Effect","b":"Reageer zichtbaar geschokt op een eerste bod. De flinch (ineenkrimpen) signaleert dat het bod onacceptabel is, zonder iets te zeggen.","s":["onderhandeling","verkoop"]},{"id":809,"c":"onderhandeling","t":"Samenvatten als Wapen","b":"Wie het gesprek samenvat, bepaalt het frame. Vat samen met jouw framing en de ander knikt mee zonder te beseffen dat je de werkelijkheid hebt verschoven.","s":["onderhandeling","vergadering"]},{"id":810,"c":"onderhandeling","t":"Principled Negotiation Checklist","b":"Scheid mensen van het probleem, focus op belangen niet posities, genereer opties voor wederzijds voordeel, gebruik objectieve criteria.","s":["onderhandeling","vergadering"]},{"id":811,"c":"onderhandeling","t":"De Deadlock Doorbreken","b":"Bij een impasse: verander het onderwerp, voeg een nieuw element toe, neem een pauze, of breng een derde partij in. Nooit doordrukken in een deadlock.","s":["onderhandeling","conflict"]},{"id":812,"c":"digitaal","t":"Typing Indicator Psychologie","b":"De drie puntjes die verschijnen en verdwijnen. Iemand die herhaaldelijk begint en stopt met typen worstelt met wat ze willen zeggen.","s":["dagelijks","date"]},{"id":813,"c":"digitaal","t":"Screenshot Gedrag","b":"Wie screenshots neemt en deelt, controleert het narratief. Let op wanneer iemand gesprekken vastlegt — het kan bescherming of manipulatie zijn.","s":["dagelijks","conflict"]},{"id":814,"c":"digitaal","t":"Online-Offline Discrepantie","b":"Het verschil tussen iemands online persona en echte persoonlijkheid. Grote discrepanties wijzen op onzekerheid of bewuste misleiding.","s":["dagelijks","date"]},{"id":815,"c":"digitaal","t":"De Passief-Agressieve Like","b":"Een bericht lezen maar niet beantwoorden, wel een like geven. Het communiceert: 'Ik heb het gezien maar het is me geen antwoord waard.'","s":["dagelijks","conflict"]},{"id":816,"c":"digitaal","t":"Voice Note Analyse","b":"Voice notes onthullen meer dan tekst: emotie, aarzeling, achtergrondgeluiden. Let op wat je hoort naast de woorden.","s":["dagelijks","date"]},{"id":817,"c":"digitaal","t":"Follow/Unfollow als Sociale Valuta","b":"Het volgen en ontvolgen op sociale media is een subtiel machts- en interessespel. Patronen onthullen allianties en afwijzingen.","s":["dagelijks","date"]},{"id":818,"c":"digitaal","t":"De Leesbevestiging Strategie","b":"Bewust leesbevestigingen aan- of uitzetten is een machtsinstrument. Aan = transparant of controlerend. Uit = vrijheid of vermijdend.","s":["dagelijks","date"]},{"id":819,"c":"digitaal","t":"Emoji-Escalatie Patroon","b":"De verandering in emoji-gebruik over tijd. Meer emoji's = meer comfort of compensatie voor gebrek aan echte warmte.","s":["dagelijks","date"]},{"id":820,"c":"digitaal","t":"De Late-Night Message","b":"Berichten na middernacht onthullen wat iemand denkt als de remmingen lager zijn. Let op de timing, niet alleen de inhoud.","s":["date","dagelijks"]},{"id":821,"c":"digitaal","t":"Profielfoto Psychologie","b":"De keuze van profielfoto onthult zelfbeeld: alleen = onafhankelijk, met groep = sociaal georiënteerd, met kind = ouderidentiteit, geen foto = privacy of schaamte.","s":["dagelijks","date"]},{"id":822,"c":"leugen","t":"Baseline Shift Detectie","b":"Een leugenaar wijkt af van zijn baseline-gedrag. Eerst normaal observeren, dan afwijkingen noteren. Zonder baseline is leugendetectie onmogelijk.","s":["dagelijks","sollicitatie"]},{"id":823,"c":"leugen","t":"De Temporele Lacune","b":"Leugenaars laten gaten in hun tijdlijn. Vraag naar specifieke tijdstippen en volgorde. Echte herinneringen hebben een vloeiende tijdslijn.","s":["onderhandeling","dagelijks"]},{"id":824,"c":"leugen","t":"Duping Delight","b":"Het subtiele glimlachje van iemand die succesvol liegt. Een micro-expressie van trots of plezier die heel kort zichtbaar is bij de mondhoeken.","s":["dagelijks","onderhandeling"]},{"id":825,"c":"leugen","t":"Overcompensatie bij Leugens","b":"Te veel details, te veel oogcontact, te veel stelligheid. Leugenaars overschrijven de normale hoeveelheid bewijs voor hun eerlijkheid.","s":["dagelijks","onderhandeling"]},{"id":826,"c":"leugen","t":"De Pivot Techniek","b":"Wanneer een direct antwoord op een directe vraag ontwijkt wordt. 'Heb je dat gedaan?' → 'Waarom zou ik zoiets doen?' De pivot is een rode vlag.","s":["onderhandeling","conflict"]},{"id":827,"c":"leugen","t":"Emotionele Timing Mismatch","b":"Bij echte emotie komen gelaatsuitdrukking en woorden tegelijk. Bij neppe emotie komt het gezicht net iets te laat of te vroeg.","s":["dagelijks","sollicitatie"]},{"id":828,"c":"leugen","t":"Het Oedipus-Verhoor","b":"Stel dezelfde vraag op verschillende manieren verspreid over een gesprek. Inconsistenties in de antwoorden wijzen op constructie in plaats van herinnering.","s":["onderhandeling","dagelijks"]},{"id":829,"c":"leugen","t":"Distantiëring in Taal","b":"Leugenaars creëren linguïstische afstand: 'die vrouw' in plaats van 'mijn vrouw', 'het incident' in plaats van te beschrijven wat er gebeurde.","s":["dagelijks","conflict"]},{"id":830,"c":"leugen","t":"De Onverwachte Vraag","b":"Stel een vraag die niet past in het verwachte script. De reactie op het onverwachte — verwarring vs snelle recovery — onthult voorbereiding.","s":["onderhandeling","sollicitatie"]},{"id":831,"c":"gesprek","t":"De Columbo Follow-Up","b":"Na het formele gesprek, terloops een cruciale vraag stellen. De ander is mentaal al 'uit' het gesprek en antwoordt onbewaakt.","s":["onderhandeling","dagelijks"]},{"id":832,"c":"gesprek","t":"Strategische Zelfonthulling","b":"Deel iets persoonlijks om de ander hetzelfde te laten doen. Het moet oprecht zijn maar strategisch getimed. Kwetsbaarheid is een gesprekswapen.","s":["date","verkoop"]},{"id":833,"c":"gesprek","t":"De Stilte Vullen","b":"Wie de stilte vult, geeft informatie weg. Laat bewust stiltes vallen na een antwoord. Mensen vullen die met de echte informatie.","s":["onderhandeling","sollicitatie"]},{"id":834,"c":"gesprek","t":"Hypothetische Vraagstelling","b":"Vraag: 'Stel dat... hoe zou je dan...?' Het haalt de ander uit defensieve modus omdat het 'niet echt' is, maar het antwoord is wél echt.","s":["onderhandeling","conflict"]},{"id":835,"c":"gesprek","t":"Labeling (Chris Voss)","b":"Benoem de emotie van de ander: 'Het klinkt alsof je gefrustreerd bent.' Dit valideert en kalmert tegelijk, en toont dat je luistert.","s":["conflict","onderhandeling"]},{"id":836,"c":"gesprek","t":"De Ja-Ladder Verfijnd","b":"Begin niet met grote ja's maar met micro-ja's: 'Klopt het dat...?' Drie kleine ja's creëren een patroon dat het moeilijker maakt om nee te zeggen.","s":["verkoop","onderhandeling"]},{"id":837,"c":"gesprek","t":"Gespreksanker Plaatsen","b":"Plant vroeg in het gesprek een idee dat je later wilt terughalen. 'Overigens...' gevolgd door je werkelijke boodschap, verpakt als bijzaak.","s":["vergadering","verkoop"]},{"id":838,"c":"gesprek","t":"De Socratische Methode","b":"Stel alleen vragen. Leid de ander naar je conclusie door hen zelf te laten denken. Ze overtuigen zichzelf, wat sterker beklijft.","s":["vergadering","onderhandeling"]},{"id":839,"c":"emotie","t":"Emotionele Granulariteit","b":"Hoe specifieker je emoties kunt benoemen, hoe beter je ze herkent bij anderen. 'Ik voel me angstig' vs 'Ik voel me kwetsbaar en onzeker' — precisie is kracht.","s":["dagelijks","date"]},{"id":840,"c":"emotie","t":"Affect Labeling Effect","b":"Het benoemen van een emotie vermindert de intensiteit ervan. Zeg hardop wat je voelt en het wordt minder overweldigend. Werkt ook bij anderen.","s":["conflict","dagelijks"]},{"id":841,"c":"emotie","t":"Emotionele Besmetting Bewustzijn","b":"Emoties zijn letterlijk besmettelijk via spiegelneuronen. Na een gesprek met een angstig persoon voel jij ook angst. Herken wat van jou is en wat overgenomen.","s":["dagelijks","vergadering"]},{"id":842,"c":"emotie","t":"Window of Tolerance","b":"Iedereen heeft een venster waarbinnen ze stress kunnen verdragen. Daarbuiten gaan ze in hyper-arousal (paniek) of hypo-arousal (shutdown). Herken de grenzen.","s":["conflict","dagelijks"]},{"id":843,"c":"emotie","t":"Emotionele Bidding Herkennen","b":"Elke uiting van emotie is een 'bid' — een verzoek om aandacht, begrip of verbinding. Reageer je op het bid of mis je het? Relaties staan of vallen hiermee.","s":["date","dagelijks"]},{"id":844,"c":"emotie","t":"Alexithymie Herkennen","b":"Sommige mensen kunnen hun emoties niet benoemen of herkennen. Ze beschrijven fysieke symptomen in plaats van gevoelens: 'Mijn maag doet pijn' = angst.","s":["dagelijks","date"]},{"id":845,"c":"emotie","t":"Emotionele Schuld Detectie","b":"Wanneer iemand schuld gebruikt als manipulatie-instrument: 'Na alles wat ik voor je gedaan heb...' Onderscheid echte schuld van instrumentele schuld.","s":["conflict","dagelijks"]},{"id":846,"c":"emotie","t":"Co-Regulatie","b":"Het vermogen om andermans emotionele staat te reguleren via je eigen kalmte. Een kalme stem kalmeert. Een gejaagd ritme verjaagt. Je bent een emotionele thermostaat.","s":["conflict","dagelijks"]},{"id":847,"c":"lichaamstaal","t":"Benen als Stressmeter","b":"De benen zijn het eerlijkste lichaamsdeel. Constant wippen = opgeslagen energie of ongeduld. Stil als een standbeeld = bewuste controle of bevriezing.","s":["dagelijks","vergadering"]},{"id":848,"c":"lichaamstaal","t":"Handpalm-Display","b":"Open handpalmen tonen eerlijkheid en overgave. Verborgen handpalmen (in zakken, achter rug) suggereren het verbergen van informatie of intentie.","s":["verkoop","onderhandeling"]},{"id":849,"c":"lichaamstaal","t":"Torso Shield","b":"Het plaatsen van objecten (laptop, tas, kussen, koffiekop) tussen jou en de ander. Onbewuste behoefte aan bescherming of afstand.","s":["vergadering","dagelijks"]},{"id":850,"c":"lichaamstaal","t":"Ankle Lock","b":"Enkels om elkaar heen gedraaid onder de stoel. Signaleert het 'inslikken' van emoties of informatie. De persoon houdt iets achter.","s":["sollicitatie","dagelijks"]},{"id":851,"c":"lichaamstaal","t":"Gravity-Defying Gestures","b":"Bewegingen die de zwaartekracht tarten: op de bal van de voeten staan, opgewonden springen, handen omhoog. Positieve emotie trekt omhoog.","s":["dagelijks","date"]},{"id":852,"c":"lichaamstaal","t":"De Adamsappel-Reactie","b":"Zichtbaar slikken, de adamsappel die op en neer beweegt. Signaleert stress, angst of het verwerken van emotioneel geladen informatie.","s":["onderhandeling","dagelijks"]},{"id":853,"c":"lichaamstaal","t":"Pacifying Touch Cluster","b":"Een reeks zelfaanrakingen kort na elkaar: nek, gezicht, arm, haar. Hoe meer pacifiers, hoe hoger de stress. Tel ze.","s":["vergadering","sollicitatie"]},{"id":854,"c":"lichaamstaal","t":"De Kaakspanning","b":"Een samengeknepen kaak of zichtbare kaakspier onthult onderdrukte woede of frustratie. Het lichaam schreeuwt wat de mond niet zegt.","s":["conflict","vergadering"]},{"id":855,"c":"lichaamstaal","t":"Shoulder Shrug Partieel","b":"Een volle schouderophaling = onzekerheid. Een halve schouderophaling (één schouder) = gebrek aan overtuiging in wat ze net zeiden.","s":["dagelijks","onderhandeling"]},{"id":856,"c":"lichaamstaal","t":"Ventilating Gedrag","b":"Kraag losmaken, haar van de nek tillen, manchetten oprollen. Het lichaam probeert letterlijk af te koelen bij stress of discomfort.","s":["sollicitatie","vergadering"]},{"id":857,"c":"lichaamstaal","t":"Proximity Shift","b":"Let op veranderingen in fysieke afstand tijdens een gesprek. Naar voren leunen = interest groeit. Achterover = interest daalt of ongemak.","s":["date","verkoop"]},{"id":858,"c":"lichaamstaal","t":"Object Manipulation als Stress-Outlet","b":"Pen klikken, met ring draaien, etiketten peuteren. De handen zoeken een uitlaatklep voor innerlijke spanning.","s":["vergadering","dagelijks"]},{"id":859,"c":"lichaamstaal","t":"De Machtsdriehoek","b":"Sta met voeten op schouderbreedte, handen langs het lichaam of in de zij. Deze driehoek straalt stabiliteit en autoriteit uit.","s":["sollicitatie","vergadering"]},{"id":860,"c":"lichaamstaal","t":"Lip Compression","b":"Samengeperste lippen — de lippen worden dunner of verdwijnen. Signaleert het 'inslikken' van woorden, onenigheid of terughoudendheid.","s":["vergadering","onderhandeling"]},{"id":861,"c":"lichaamstaal","t":"Spiegeling Doorbreken","b":"Als twee mensen synchron bewegen en één stopt met spiegelen, is er een breuk in rapport. De desynchronisatie markeert het exacte moment van onenigheid.","s":["date","onderhandeling"]},{"id":862,"c":"psycho","t":"Psychological Reactance","b":"Vertel iemand dat ze iets niet mogen en ze willen het meer. Het verbod verhoogt de aantrekkingskracht. Gebruik omgekeerde psychologie bewust.","s":["dagelijks","conflict"]},{"id":863,"c":"psycho","t":"Zeigarnik Effect Tactisch","b":"Onafgemaakte taken blijven in het hoofd hangen. Laat bewust iets open en de ander blijft eraan denken. Krachtig in verkoop en dating.","s":["verkoop","date"]},{"id":864,"c":"psycho","t":"Mere Exposure Effect","b":"Hoe vaker je iemand ziet, hoe sympathieker je diegene vindt. Toon je regelmatig aan wie je wilt beïnvloeden, zonder te forceren.","s":["verkoop","dagelijks"]},{"id":865,"c":"psycho","t":"Spotlight Effect","b":"Mensen overschatten hoeveel aandacht anderen aan hen besteden. Herken dit bij sociale angst: de ander let minder op je dan je denkt.","s":["dagelijks","sollicitatie"]},{"id":866,"c":"psycho","t":"Peak-End Regel Herkennen","b":"Mensen beoordelen ervaringen op basis van het hoogtepunt en het einde, niet het gemiddelde. Controleer hoe gesprekken eindigen.","s":["onderhandeling","verkoop"]},{"id":867,"c":"psycho","t":"Barnum Effect Doorprikken","b":"Vage uitspraken die op iedereen van toepassing lijken maar persoonlijk aanvoelen. 'Je bent soms onzeker maar meestal zelfverzekerd' — klinkt specifiek, is het niet.","s":["dagelijks","verkoop"]},{"id":868,"c":"psycho","t":"Fundamental Attribution Error","b":"We schrijven andermans gedrag toe aan karakter, ons eigen gedrag aan omstandigheden. 'Hij is lui' vs 'Ik had een zware dag.' Corrigeer deze bias.","s":["dagelijks","vergadering"]},{"id":869,"c":"psycho","t":"Just World Fallacy","b":"Het geloof dat de wereld eerlijk is en mensen krijgen wat ze verdienen. Dit leidt tot victim-blaming. Herken het bij jezelf en anderen.","s":["dagelijks","conflict"]},{"id":870,"c":"psycho","t":"Ego Depletion Herkennen","b":"Zelfcontrole is een eindige bron. Na een dag vol beslissingen of zelfbeheersing zijn de reserves op. Let op degradatie van gedrag later op de dag.","s":["vergadering","dagelijks"]},{"id":871,"c":"psycho","t":"Betray Aversion","b":"De angst voor verraad is sterker dan de angst voor gelijkwaardig verlies van een machine of toeval. Mensen nemen irrationele beslissingen om verraad te vermijden.","s":["onderhandeling","dagelijks"]},{"id":872,"c":"psycho","t":"Need for Cognitive Closure","b":"Sommige mensen hebben een sterke behoefte aan duidelijkheid en zekerheid. Ze nemen sneller beslissingen en houden vast aan eerste indrukken.","s":["vergadering","dagelijks"]},{"id":873,"c":"psycho","t":"Nostalgie als Invloedstool","b":"Nostalgie maakt mensen warmer, genereuzer en meer verbonden. Verwijs naar 'de goede oude tijd' en je opent deuren.","s":["verkoop","dagelijks"]},{"id":874,"c":"manipulatie","t":"DARVO Herkennen","b":"Deny, Attack, Reverse Victim and Offender. De dader ontkent, valt aan en draait de rollen om. Een van de meest destructieve manipulatiepatronen.","s":["conflict","dagelijks"]},{"id":875,"c":"manipulatie","t":"Weaponized Incompetence","b":"Bewust slecht presteren zodat de ander het overneemt. 'Ik kan dat niet zo goed als jij...' tot je alles zelf doet.","s":["dagelijks","vergadering"]},{"id":876,"c":"manipulatie","t":"Future Faking","b":"Grote beloften over de toekomst die nooit waargemaakt worden. Let op het patroon: enthousiaste plannen, geen uitvoering, nieuwe beloften.","s":["date","verkoop"]},{"id":877,"c":"manipulatie","t":"De Informatie-Gijzeling","b":"Cruciale informatie achterhouden om controle te behouden. 'Dat vertel ik je later wel' of selectief delen om jouw beeld te sturen.","s":["vergadering","conflict"]},{"id":878,"c":"manipulatie","t":"Triangulatie","b":"Een derde persoon inbrengen om jaloezie, competitie of onzekerheid te creëren. 'Mijn ex deed dat altijd zo goed...' is klassieke triangulatie.","s":["date","conflict"]},{"id":879,"c":"manipulatie","t":"Love Bombing Herkennen","b":"Overweldigende aandacht, complimenten en geschenken in het begin. Het voelt fantastisch maar dient om emotionele afhankelijkheid te creëren.","s":["date","dagelijks"]},{"id":880,"c":"manipulatie","t":"De Gecontroleerde Woede-Uitbarsting","b":"Een woede-uitbarsting die strategisch getimed is om de ander te intimideren. Herkenbaar aan: snelle recovery, gerichte doelen, geen spijt.","s":["conflict","vergadering"]},{"id":881,"c":"manipulatie","t":"Emotional Bookkeeping","b":"Het bijhouden van een onzichtbare boekhouding van gunsten en schulden. 'Ik heb vorige maand X voor je gedaan, dus nu moet jij...'","s":["dagelijks","conflict"]},{"id":882,"c":"manipulatie","t":"De Dubbelzinnige Boodschap","b":"Een boodschap die twee tegengestelde dingen communiceert. 'Je mag zelf kiezen, maar ik zou het heel erg vinden als...' Creëert schuld en verwarring.","s":["dagelijks","conflict"]},{"id":883,"c":"manipulatie","t":"Coercive Control Patronen","b":"Subtiele, cumulatieve controle: isolatie van vrienden, financiële controle, monitoren van locatie, constante kritiek. Elk element lijkt klein, het patroon is groot.","s":["dagelijks","conflict"]},{"id":884,"c":"spraak","t":"Uptalk Analyse","b":"Zinnen die eindigen met een stijgende intonatie alsof het vragen zijn. Onzekerheid? Of juist een inclusieve communicatiestijl? Context bepaalt de betekenis.","s":["dagelijks","sollicitatie"]},{"id":885,"c":"spraak","t":"Vocal Fry Decoderen","b":"Een krakende, lage stemkwaliteit aan het einde van zinnen. Kan nonchalance uitstralen maar ook vermoeidheid of poging tot autoriteit.","s":["dagelijks","sollicitatie"]},{"id":886,"c":"spraak","t":"Adempatroon als Informatie","b":"Korte, oppervlakkige ademhaling = stress. Diepe, rustige adem = comfort. Een zucht = het loslaten van spanning of frustratie.","s":["dagelijks","vergadering"]},{"id":887,"c":"spraak","t":"Code-Switching","b":"Het wisselen van taalgebruik, accent of dialect afhankelijk van de sociale context. Onthult wie iemand probeert te zijn in welke setting.","s":["dagelijks","vergadering"]},{"id":888,"c":"spraak","t":"Paralingüstische Pauzes","b":"Waar iemand pauzeert in een zin onthult wat ze benadrukken of waar ze worstelen met de waarheid. De pauze is informatiedichter dan de woorden.","s":["onderhandeling","dagelijks"]},{"id":889,"c":"spraak","t":"Woordherhaling als Stress-Signaal","b":"Het herhalen van woorden of zinsdelen: 'Ik was, ik was echt, ik was echt verbaasd.' De herhaling verraadt cognitieve belasting.","s":["dagelijks","sollicitatie"]},{"id":890,"c":"spraak","t":"Stemvolume Dynamiek","b":"Plotselinge volumeveranderingen midden in een gesprek. Zachter worden = intimiteit of geheim. Luider worden = dominantie of verlies van controle.","s":["vergadering","conflict"]},{"id":891,"c":"spraak","t":"Het Weg-Lachen","b":"Iets serieus zeggen gevolgd door een lach om de ernst te reduceren. Het onthult wat iemand echt denkt maar niet durft te claimen.","s":["dagelijks","vergadering"]},{"id":892,"c":"sociaal","t":"Sociale Osmose","b":"Je neemt onbewust de gewoonten, meningen en zelfs het taalgebruik over van mensen in je directe omgeving. Na 6 maanden ben je het gemiddelde van je 5 naaste contacten.","s":["dagelijks","vergadering"]},{"id":893,"c":"sociaal","t":"De Bystander Calculatie","b":"In noodsituaties: hoe meer mensen aanwezig, hoe minder waarschijnlijk dat iemand helpt. Spreek één persoon direct aan om het effect te doorbreken.","s":["dagelijks","conflict"]},{"id":894,"c":"sociaal","t":"Sociale Vergelijkingsrichting","b":"Opwaarts vergelijken (met betere) = motivatie of jaloezie. Neerwaarts vergelijken (met mindere) = troost of superioriteit. Let op de vergelijkingsrichting.","s":["dagelijks","vergadering"]},{"id":895,"c":"sociaal","t":"Network Broker Positie","b":"De persoon die twee onverbonden groepen met elkaar verbindt heeft onevenredige invloed. Zij controleren informatie en introductie.","s":["vergadering","dagelijks"]},{"id":896,"c":"sociaal","t":"Dunbar Lagen Lezen","b":"150 contacten max, maar in lagen: 5 intieme, 15 goede vrienden, 50 vrienden, 150 bekenden. Waar plaatst iemand jou? Het gedrag verraadt de laag.","s":["dagelijks","date"]},{"id":897,"c":"sociaal","t":"Sociale Valuta Economie","b":"Elk sociaal contact heeft een wisselkoers: informatie, status, emotie, hulp. Sommige mensen investeren, anderen onttrekken. Monitor de balans.","s":["dagelijks","vergadering"]},{"id":898,"c":"sociaal","t":"Reputatie-Management in Real-Time","b":"Mensen managen constant hun reputatie. Let op wanneer iemand een verhaal vertelt dat ze in een specifiek licht plaatst — het is bewuste positionering.","s":["vergadering","dagelijks"]},{"id":899,"c":"sociaal","t":"De Gunst-Asymmetrie","b":"Het verschil tussen hoe zwaar jij een gunst ervaart en hoe zwaar de ontvanger het ervaart. Gevers overschatten, ontvangers onderschatten. Dit creëert sociale schuld.","s":["dagelijks","vergadering"]},{"id":900,"c":"gezicht","t":"Duchenne Glimlach Verfijnd","b":"De echte glimlach activeert de oogspieren (kraaiennestjes) én de mondspieren. Een sociale glimlach activeert alleen de mond. Let op de ogen.","s":["dagelijks","date"]},{"id":901,"c":"gezicht","t":"Contempt Micro-Expressie","b":"Eén mondhoek omhoog — het enige asymmetrische basisexpressie. Minachting is de gevaarlijkste emotie in relaties. Gottman's sterkste scheidsvoorspeller.","s":["dagelijks","date"]},{"id":902,"c":"gezicht","t":"Brow Flash","b":"De snelle wenkbrauwverhoging (1/5 seconde) bij herkenning. Universeel teken van positieve herkenning. Afwezigheid bij iemand die je kent = probleem.","s":["dagelijks","date"]},{"id":903,"c":"gezicht","t":"De Bevroren Uitdrukking","b":"Een gezichtsuitdrukking die te lang wordt vastgehouden is nep. Echte emoties duren 0,5-4 seconden. Langer = bewust geposeerd.","s":["dagelijks","sollicitatie"]},{"id":904,"c":"gezicht","t":"Nose Wrinkle (Walging)","b":"De neus optrekken is universeel walging-signaal. Soms subtiel, soms vol. Let op wanneer het verschijnt bij woorden of onderwerpen.","s":["dagelijks","vergadering"]},{"id":905,"c":"gezicht","t":"Lip Purse (Onuitgesproken Mening)","b":"Lippen die naar voren worden geduwd alsof je een kus vormt. De persoon heeft een alternatieve mening maar houdt deze (nog) voor zich.","s":["vergadering","onderhandeling"]},{"id":906,"c":"gezicht","t":"Eye Blocking","b":"Langdurig knipperen, ogen sluiten of met de hand over de ogen wrijven. Het brein blokkeert letterlijk wat het niet wil zien. Onbewuste afwijzing.","s":["dagelijks","vergadering"]},{"id":907,"c":"gezicht","t":"Asymmetrische Expressies","b":"Echte emoties zijn symmetrisch in het gezicht. Asymmetrie (behalve bij minachting) suggereert een geforceerde of gespeelde emotie.","s":["dagelijks","sollicitatie"]},{"id":908,"c":"geavanceerd","t":"Proprioceptive Empathy","b":"Voel in je eigen lichaam wat de ander fysiek ervaart. Ga bewust in dezelfde houding staan en registreer wat je voelt. Het lichaam als empathie-instrument.","s":["dagelijks","date"]},{"id":909,"c":"geavanceerd","t":"Chronemics (Tijdgedrag)","b":"Hoe mensen met tijd omgaan onthult status en houding. Systematisch te laat = machtsspel of desinteresse. Vroeg = angst of overdreven respect.","s":["dagelijks","vergadering"]},{"id":910,"c":"geavanceerd","t":"Micro-Momentary Expressions","b":"Expressies die korter duren dan een standaard micro-expressie (<40ms). Alleen met geoefend oog op te vangen. Vaak bij hoog getrainde leugenaars.","s":["dagelijks","onderhandeling"]},{"id":911,"c":"geavanceerd","t":"Environmental Reading","b":"Iemands bureau, auto of kamer vertelt hun verhaal. Chaos = creatief of overweldigd. Minimalistisch = controlebehoefte. Foto's = wie belangrijk is.","s":["dagelijks","sollicitatie"]},{"id":912,"c":"geavanceerd","t":"Transition Moments","b":"De momenten van overgang (binnenkomen, vertrekken, onderwerp wisselen) zijn het meest onthullend. Maskers glippen in de transitie.","s":["dagelijks","vergadering"]},{"id":913,"c":"geavanceerd","t":"Dual-Task Paradigm","b":"Geef iemand een cognitieve taak terwijl je ze iets vraagt. Liegen kost extra cognitieve capaciteit — onder dual-task druk worden leugens zichtbaarder.","s":["dagelijks","sollicitatie"]},{"id":914,"c":"geavanceerd","t":"Pupillometrie Zonder Apparatuur","b":"Verwijde pupillen = interesse, opwinding of cognitieve belasting. Vernauwde pupillen = afkeer. Kijk bij constante belichting naar veranderingen.","s":["dagelijks","date"]},{"id":915,"c":"geavanceerd","t":"De Vijf-Seconden Scan","b":"In vijf seconden: voeten (richting), handen (stress), schouders (spanning), mond (emotie), ogen (focus). Een complete persoonsscan in een oogopslag.","s":["dagelijks","sollicitatie"]},{"id":916,"c":"geavanceerd","t":"Interactie Synchronie Meten","b":"Meet de mate van synchronie in timing, beweging en spraak tussen twee mensen. Hoge synchronie = goede relatie. Lage synchronie = spanning of desinteresse.","s":["dagelijks","date"]},{"id":917,"c":"geavanceerd","t":"Predictive Body Language","b":"Gebruik lichamelijke patronen om de volgende actie te voorspellen. Gewichtsverschuiving → vertrek. Diep inademen → lang verhaal. Lippen openen → wil spreken.","s":["dagelijks","vergadering"]},{"id":918,"c":"lichaamstaal","t":"De Handdruk Decoderen","b":"Dominante handdruk: palm naar beneden. Onderdanige: palm omhoog. Gelijkwaardig: verticaal. De eerste fysieke interactie zet de toon.","s":["sollicitatie","verkoop"]},{"id":919,"c":"lichaamstaal","t":"Haptic Communication","b":"Aanraking als communicatie: een hand op de schouder = autoriteit. Aanraking op de onderarm = warmte. De locatie en duur bepalen de boodschap.","s":["dagelijks","date"]},{"id":920,"c":"lichaamstaal","t":"De Verborgen Duim","b":"Duimen verborgen in vuisten of zakken signaleren lage status of onzekerheid. Zichtbare duimen (in broekzakken met duimen uit) = zelfvertrouwen.","s":["dagelijks","sollicitatie"]},{"id":921,"c":"lichaamstaal","t":"Freeze-Flight-Fight Sequentie","b":"Bij bedreiging: eerst bevriezen (stilstaan), dan vluchten (afwenden), dan vechten (confronteren). De sequentie is evolutionair en onbewust.","s":["conflict","dagelijks"]},{"id":922,"c":"lichaamstaal","t":"Iso-Praxisme","b":"Het onbewust synchroniseren van lichaamshoudingen in een groep. Hoe sterker de iso-praxie, hoe groter de groepscohesie. Wie niet meesynchroniseert is de buitenstaander.","s":["vergadering","dagelijks"]},{"id":923,"c":"psycho","t":"Projection als Detectietool","b":"Wat iemand jou verwijt, doet diegene vaak zelf. Projectie is het onbewust toeschrijven van eigen ongewenste eigenschappen aan anderen.","s":["dagelijks","conflict"]},{"id":924,"c":"psycho","t":"Anchoring in Dagelijks Leven","b":"De eerste informatie die je ontvangt kleurt alles wat volgt. Een hoog eerste bod, een dramatisch openingsverhaal — het anker bepaalt het vervolg.","s":["onderhandeling","verkoop"]},{"id":925,"c":"psycho","t":"Splitting (Zwart-Wit Denken)","b":"Mensen of situaties als volledig goed of volledig slecht zien. Let op wanneer iemand geen nuance toestaat — het signaleert emotionele verwonding.","s":["dagelijks","conflict"]},{"id":926,"c":"psycho","t":"Displacement Herkennen","b":"Emotie verschuiven naar een veiliger doelwit. Boos op de baas? Snauwen naar de partner. Herken wanneer de emotie niet past bij de situatie.","s":["dagelijks","conflict"]},{"id":927,"c":"psycho","t":"De Beschikbaarheidsheuristiek","b":"Mensen overschatten de kans op gebeurtenissen die makkelijk herinnerd worden (vliegtuigongelukken). Gebruik dit bewust door levendige voorbeelden te geven.","s":["verkoop","dagelijks"]},{"id":928,"c":"manipulatie","t":"De Schuldverschuiving","b":"Het eigen falen toeschrijven aan de ander: 'Als jij niet had...' Herkenbaar aan: geen verantwoordelijkheid, altijd een externe oorzaak.","s":["conflict","dagelijks"]},{"id":929,"c":"manipulatie","t":"Intermittent Reinforcement","b":"Afwisselend belonen en straffen — het meest verslavende patroon. De onvoorspelbaarheid houdt je gefixeerd. Herken het in relaties en werk.","s":["date","dagelijks"]},{"id":930,"c":"manipulatie","t":"The Double Bind","b":"Twee tegenstrijdige eisen waardoor je niet kunt winnen. 'Wees spontaan!' is een klassiek voorbeeld. De enige uitweg is de dubbele bind benoemen.","s":["conflict","dagelijks"]},{"id":931,"c":"manipulatie","t":"Silent Treatment als Wapen","b":"Stilzwijgen als straf. Verschilt van gezonde afkoeling doordat het doel is de ander te straffen en te controleren, niet om te kalmeren.","s":["conflict","date"]},{"id":932,"c":"manipulatie","t":"De Valse Dilemma Manipulatie","b":"Slechts twee opties presenteren terwijl er meer zijn. 'Je bent óf voor mij óf tegen mij.' Breek het valse dilemma door een derde optie te benoemen.","s":["conflict","onderhandeling"]},{"id":933,"c":"geavanceerd","t":"Baseline Mapping Methode","b":"Observeer iemand 10 minuten in een comfortsituatie. Noteer hun normale gedrag. Elke afwijking van deze baseline is informatie.","s":["dagelijks","sollicitatie"]},{"id":934,"c":"geavanceerd","t":"Contextuele Incongruentie","b":"Wanneer gedrag niet past bij de context: lachen bij slecht nieuws, formeel bij een casual bijeenkomst. Incongruentie is altijd informatief.","s":["dagelijks","vergadering"]},{"id":935,"c":"geavanceerd","t":"De Eerste Vijf Minuten","b":"De meeste informatie over iemand verzamel je in de eerste vijf minuten. Daarna passen mensen zich aan. Wees hyperalert aan het begin.","s":["sollicitatie","dagelijks"]},{"id":936,"c":"geavanceerd","t":"Cluster Reading","b":"Lees nooit één signaal geïsoleerd. Zoek clusters van drie of meer congruente signalen voordat je een conclusie trekt.","s":["dagelijks","vergadering"]},{"id":937,"c":"geavanceerd","t":"Temporal Pattern Recognition","b":"Herhalen patronen zich op specifieke tijdstippen? Maandagochtend humeurig, vrijdagmiddag ongeconcentreerd — tijd-patronen voorspellen gedrag.","s":["vergadering","dagelijks"]},{"id":938,"c":"spraak","t":"Nominalisatie Detectie","b":"Het omzetten van werkwoorden in zelfstandige naamwoorden: 'communicatie' in plaats van 'communiceren'. Maakt dingen abstract en onpersoonlijk.","s":["vergadering","dagelijks"]},{"id":939,"c":"spraak","t":"Deletie in Taalgebruik","b":"Wat iemand weglaat is informatiever dan wat ze zeggen. 'Het ging goed' — maar wie zijn 'het' en wat is 'goed'? Vraag door op deleties.","s":["dagelijks","onderhandeling"]},{"id":940,"c":"spraak","t":"Rapport via Taalspiegeling","b":"Kopieer het exacte woordgebruik van de ander. Zij zeggen 'uitdaging', jij zegt 'uitdaging' — niet 'probleem'. Taalspiegeling bouwt onbewust vertrouwen.","s":["verkoop","onderhandeling"]},{"id":941,"c":"spraak","t":"De Onafgemaakte Zin","b":"Zinnen die niet worden afgemaakt onthullen zelfcensuur. De spreker besloot halverwege dat de informatie te gevoelig was om te delen.","s":["dagelijks","onderhandeling"]},{"id":942,"c":"spraak","t":"Modal Operators Analyseren","b":"Let op 'moeten', 'kunnen', 'willen'. 'Ik moet' = extern opgelegd. 'Ik kan niet' = zelfbeperking. 'Ik wil niet' = eerlijk. De modal onthult de bron.","s":["dagelijks","vergadering"]},{"id":943,"c":"sociaal","t":"Social Proof Dynamiek","b":"Mensen kijken naar anderen om te bepalen wat normaal is. In onzekerheid volgt de groep de groep. Wie de eerste stap zet, leidt.","s":["verkoop","dagelijks"]},{"id":944,"c":"sociaal","t":"In-Group Bias Lezen","b":"Mensen bevoordelen onbewust hun eigen groep. Let op subtiele signalen van in-group/out-group behandeling: warmte, taalgebruik, inclusie.","s":["vergadering","dagelijks"]},{"id":945,"c":"sociaal","t":"Reciprocity Timing","b":"De kracht van wederkerigheid hangt af van timing. Onmiddellijke reciprociteit voelt transactioneel, vertraagde reciprociteit voelt als vriendschap.","s":["verkoop","dagelijks"]},{"id":946,"c":"sociaal","t":"Social Penetration Theory","b":"Relaties verdiepen in lagen: van oppervlakkig naar intiem. De snelheid waarmee iemand lagen onthult, vertelt over hun sociale patronen.","s":["date","dagelijks"]},{"id":947,"c":"sociaal","t":"Status Incongruence in Groepen","b":"Wanneer iemands formele rol niet overeenkomt met hun sociale status in de groep. De manager die niemand respecteert vs de stagiair die iedereen volgt.","s":["vergadering","dagelijks"]},{"id":948,"c":"overtuiging","t":"Pre-Suasion (Cialdini)","b":"Wat je direct vóór je boodschap presenteert, beïnvloedt hoe de boodschap ontvangen wordt. Toon een foto van samenwerking vóór je om hulp vraagt.","s":["verkoop","onderhandeling"]},{"id":949,"c":"overtuiging","t":"Asymmetrisch Dominantie Effect","b":"Voeg een duidelijk inferieure optie toe om de gewenste optie aantrekkelijker te maken. Restaurant: S €8, M €12, L €13 — iedereen kiest L.","s":["verkoop","onderhandeling"]},{"id":950,"c":"overtuiging","t":"Endowed Progress Effect","b":"Mensen zijn gemotiveerder als ze het gevoel hebben al begonnen te zijn. Een stempelkaart met 2 van 10 stempels werkt beter dan 0 van 8.","s":["verkoop","dagelijks"]},{"id":951,"c":"overtuiging","t":"Implementation Intention","b":"Vraag niet 'Ga je stemmen?' maar 'Wanneer ga je stemmen en hoe kom je er?' Concrete plannen verhogen de kans op actie dramatisch.","s":["verkoop","dagelijks"]},{"id":952,"c":"overtuiging","t":"De Contrast Principle Geavanceerd","b":"Laat eerst het duurste of slechtste zien, dan het werkelijke aanbod. Na een €500 fles wijn lijkt €50 een koopje. Contrast stuurt perceptie.","s":["verkoop","onderhandeling"]},{"id":953,"c":"onderhandeling","t":"Anchoring met Extreme Opens","b":"Een extreem eerste bod zetten verschuift het anker. Zelfs als het onrealistisch is, beïnvloedt het de hele onderhandeling.","s":["onderhandeling","verkoop"]},{"id":954,"c":"onderhandeling","t":"De Ackerman Methode","b":"Bied 65%, dan 85%, dan 95%, dan het exacte doelbedrag. De afnemende stappen signaleren dat je je limiet nadert.","s":["onderhandeling","verkoop"]},{"id":955,"c":"onderhandeling","t":"Mirroring in Onderhandeling (Voss)","b":"Herhaal de laatste drie woorden van de ander. Het dwingt elaboratie af en toont dat je luistert, zonder zelf iets prijs te geven.","s":["onderhandeling","dagelijks"]},{"id":956,"c":"onderhandeling","t":"Strategic Empathy","b":"Empathie is geen zwakte maar een informatie-instrument. Door te begrijpen wat de ander voelt, voorspel je hun acties.","s":["onderhandeling","conflict"]},{"id":957,"c":"onderhandeling","t":"No-Oriented Questions","b":"Vragen die uitnodigen tot 'nee': 'Is het een slecht idee om...?' Nee zeggen geeft mensen een gevoel van controle en opent het gesprek.","s":["onderhandeling","verkoop"]},{"id":958,"c":"emotie","t":"Empathie vs Sympathie","b":"Sympathie = 'Wat erg voor je.' Empathie = 'Ik voel wat je voelt.' Sympathie creëert afstand, empathie verbinding. Ken het verschil.","s":["dagelijks","conflict"]},{"id":959,"c":"emotie","t":"Emotionele Agility (Susan David)","b":"Het vermogen om emoties te voelen zonder erdoor bestuurd te worden. Niet 'ik ben boos' maar 'ik merk dat ik boosheid voel'. Het verschil is vrijheid.","s":["dagelijks","conflict"]},{"id":960,"c":"emotie","t":"Positivity Ratio Meten","b":"Florerende relaties hebben een ratio van 3:1 positief/negatief. Meet de verhouding in je interacties — het voorspelt de gezondheid van de relatie.","s":["date","vergadering"]},{"id":961,"c":"emotie","t":"Emotional Flooding Herkennen","b":"Wanneer emoties het systeem overspoelen en rationeel denken onmogelijk wordt. Hartslag >100 bpm = flooding. De persoon kan niet meer luisteren.","s":["conflict","dagelijks"]},{"id":962,"c":"emotie","t":"Repair Attempts (Gottman)","b":"Pogingen om een conflict te de-escaleren: humor, aanraking, sorry zeggen. Het succes van repair attempts voorspelt relatie-overleving beter dan het conflict zelf.","s":["date","conflict"]},{"id":963,"c":"gesprek","t":"Active Listening Signalen","b":"Knikken, 'hmm', parafraseren, open houding. Maar let op: sommigen faken dit meesterlijk. Check of de follow-up vragen bewijzen dat ze echt luisterden.","s":["dagelijks","vergadering"]},{"id":964,"c":"gesprek","t":"De Power Question","b":"Eén vraag die alles verandert: 'Wat zou er moeten gebeuren om dit een succes te maken?' Dwingt de ander om positief en concreet te denken.","s":["onderhandeling","vergadering"]},{"id":965,"c":"gesprek","t":"Gespreksarchitectuur","b":"Plan je gesprekken als een architect: opening (rapport), middenstuk (informatie), closing (actie). De structuur bepaalt het resultaat.","s":["verkoop","onderhandeling"]},{"id":966,"c":"gesprek","t":"De Onzichtbare Deadline","b":"Creëer urgentie zonder expliciet te dreigen: 'Ik beslis deze week.' De impliciete deadline motiveert zonder te pushen.","s":["verkoop","onderhandeling"]},{"id":967,"c":"gesprek","t":"De Brug-Techniek","b":"Verbind twee schijnbaar losstaande onderwerpen: 'Dat doet me denken aan...' Bruggen laten je het gesprek sturen zonder het te kapen.","s":["dagelijks","vergadering"]},{"id":968,"c":"gezicht","t":"Orbicularis Oculi Check","b":"De oogspier die bij echte glimlachen contracteert. Niet willekeurig aan te sturen door de meeste mensen. De ultieme echtheidstest.","s":["dagelijks","date"]},{"id":969,"c":"gezicht","t":"Fear Micro-Expression","b":"Opgetrokken en samengetrokken wenkbrauwen, wijd open ogen, horizontaal uitgerekte lippen. Verschijnt voor minder dan een halve seconde.","s":["dagelijks","conflict"]},{"id":970,"c":"gezicht","t":"Blushing als Eerlijkheidssignaal","b":"Blozen is onmogelijk te faken en signaleert sociale gevoeligheid en eerlijkheid. Mensen die blozen worden als betrouwbaarder gezien.","s":["dagelijks","date"]},{"id":971,"c":"gezicht","t":"Jaw Drop (Verrassing vs Angst)","b":"Een opengevallen mond bij verrassing is ontspannen. Bij angst is de kaak gespannen. Het verschil zit in de spanning, niet de opening.","s":["dagelijks","vergadering"]},{"id":972,"c":"gezicht","t":"De Sociale Glimlach Ontmaskeren","b":"De puur sociale glimlach: mond beweegt, ogen niet. Na een conversatie, let op het moment dat de glimlach verdwijnt — de snelheid onthult de echtheid.","s":["dagelijks","sollicitatie"]},{"id":973,"c":"leugen","t":"Statement Analysis (SCAN)","b":"Analyseer geschreven verklaringen op taalpatronen: tempuswisselingen, voornaamwoord-veranderingen, missende tijdperiodes.","s":["dagelijks","onderhandeling"]},{"id":974,"c":"leugen","t":"Cognitive Load Verhogen","b":"Stel onverwachte vragen, vraag het verhaal in omgekeerde volgorde, of laat iemand tekenen terwijl ze vertellen. Hogere cognitieve load ontmaskert leugens.","s":["onderhandeling","sollicitatie"]},{"id":975,"c":"leugen","t":"De Pinokkio-Cluster","b":"Niet de neus die groeit, maar het aanraken van de neus. In combinatie met oogcontact-vermijding en handpalm-verberging: een betrouwbare leugen-cluster.","s":["dagelijks","onderhandeling"]},{"id":976,"c":"leugen","t":"Illustrator-Daling","b":"Handgebaren die spraak begeleiden (illustrators) nemen af bij liegen. De cognitieve belasting van de leugen laat geen ruimte voor natuurlijke gebaren.","s":["dagelijks","onderhandeling"]},{"id":977,"c":"leugen","t":"Post-Interview Analyse","b":"De meeste informatie komt na het formele gesprek. In de lift, bij het wegbrengen, in de auto. Het onbewaakte moment is het eerlijkste.","s":["sollicitatie","dagelijks"]},{"id":978,"c":"macht","t":"De Invisible Hand Methode","b":"De meest effectieve macht is onzichtbaar. Wie de agenda zet, bepaalt welke opties er zijn — nog voordat er gestemd wordt.","s":["vergadering","dagelijks"]},{"id":979,"c":"macht","t":"Soft Power in Actie","b":"Invloed door aantrekking in plaats van dwang: cultuur, waarden, voorbeeld. De persoon die iedereen wil imiteren heeft de meeste soft power.","s":["dagelijks","vergadering"]},{"id":980,"c":"macht","t":"De Informatie-Asymmetrie","b":"Wie meer weet heeft meer macht. Let op wie informatie deelt en wie achterhoud. De informatierijke is de machtige, niet per se de luidste.","s":["vergadering","onderhandeling"]},{"id":981,"c":"macht","t":"Legitimacy Through Process","b":"Macht die gelegitimeerd wordt door het proces: 'Zo doen we het altijd', 'Het protocol zegt...' Het proces wordt het onzichtbare machtsmiddel.","s":["vergadering","dagelijks"]},{"id":982,"c":"macht","t":"De Proxy Spreker","b":"Wanneer iemand een ander laat spreken namens hen. De echte machthebber zit stil terwijl de proxy het vuile werk doet.","s":["vergadering","onderhandeling"]},{"id":983,"c":"digitaal","t":"Reply Time Mapping","b":"Map hoe snel iemand antwoordt op verschillende mensen. Snelheid = prioriteit. De antwoordhiërarchie onthult de sociale hiërarchie.","s":["dagelijks","date"]},{"id":984,"c":"digitaal","t":"De Ghost als Communicatie","b":"Niet reageren ís een reactie. Ghosting communiceert: vermijding, oninteresse of conflict-ontwijking. Het is de luidste stilte.","s":["dagelijks","date"]},{"id":985,"c":"digitaal","t":"Link Sharing als Identiteitssignaal","b":"Wat iemand deelt onthult wie ze willen zijn. Wetenschappelijke artikelen = intellectueel. Memes = toegankelijk. Niche content = uniek.","s":["dagelijks","vergadering"]},{"id":986,"c":"digitaal","t":"Videocall Body Language","b":"Op video worden signalen anders gelezen. Meer oogcontact voelt als staren, minder als desinteresse. Let op hand-naar-camera gebaren.","s":["vergadering","dagelijks"]},{"id":987,"c":"digitaal","t":"De Status-Update Psychologie","b":"Frequentie en inhoud van sociale media posts onthullen emotionele behoeften: validatie, verbinding, dominantie of chronische onzekerheid.","s":["dagelijks","date"]},{"id":988,"c":"eerste","t":"Warmte voor Competentie","b":"Mensen beoordelen eerst warmte (veilig?), dan competentie (capabel?). Leid met warmte — competentie zonder warmte voelt bedreigend.","s":["sollicitatie","verkoop"]},{"id":989,"c":"eerste","t":"De Handshake Window","b":"De eerste 3 seconden van een handdruk bepalen 40% van de eerste indruk. Droog, stevig, 2-3 pompjes, oogcontact. Eenvoudig maar cruciaal.","s":["sollicitatie","verkoop"]},{"id":990,"c":"eerste","t":"Thin Slicing (Gladwell)","b":"Op basis van minimale informatie (seconden) maken mensen verrassend accurate beoordelingen. Vertrouw je eerste indruk meer dan je denkt.","s":["dagelijks","sollicitatie"]},{"id":991,"c":"eerste","t":"De Geur-Associatie","b":"Geur is het zintuig met de sterkste koppeling aan emotie en herinnering. Een specifieke geur kan een volledige eerste indruk kleuren.","s":["date","dagelijks"]},{"id":992,"c":"eerste","t":"Expectation Setting","b":"Wie verwachtingen zet vóór de ontmoeting ('Ze is heel slim' of 'Hij is lastig') bepaalt de bril waardoor je de ander bekijkt.","s":["vergadering","dagelijks"]},{"id":993,"c":"acteur","t":"Keith Johnstone Status Games","b":"Status is een spel dat elk moment gespeeld wordt. Oefen bewust hoog en laag status spelen om het bij anderen te herkennen.","s":["vergadering","dagelijks"]},{"id":994,"c":"acteur","t":"Ivana Chubbuck Power Analysis","b":"Elke scène draait om een machtsverschuiving. In elk gesprek: wie heeft de macht, hoe verschuift die, en wat zijn de tactieken?","s":["onderhandeling","vergadering"]},{"id":995,"c":"acteur","t":"De Vierde Muur in het Dagelijks Leven","b":"Wie is het publiek? In elk sociaal moment is er een 'vierde muur' — de onzichtbare toeschouwers voor wie de scene wordt gespeeld.","s":["dagelijks","vergadering"]},{"id":996,"c":"acteur","t":"Emotionele Recall vs Sense Memory","b":"Emotionele recall roept gevoelens op, sense memory roept zintuiglijke ervaringen op. Beiden activeren het limbisch systeem en zijn leesbaar.","s":["dagelijks","date"]},{"id":997,"c":"acteur","t":"De Scene Partner Analyse","b":"In elke interactie: wat wil de ander van mij? Wat wil ik van hen? Het snijvlak van deze twee wensen is waar het échte gesprek plaatsvindt.","s":["onderhandeling","dagelijks"]},{"id":998,"c":"groep","t":"De Abilene Paradox","b":"Een groep neemt een beslissing die niemand wil omdat iedereen denkt dat de rest het wil. Vraag: 'Wil iemand dit eigenlijk echt?' en je doorbreekt het patroon.","s":["vergadering","dagelijks"]},{"id":999,"c":"groep","t":"Janis Groupthink Symptomen","b":"Acht symptomen: onkwetsbaarheidsillusie, collectieve rationalisatie, moraliteitsgeloof, stereotypering outgroup, druk op dissidenten, zelfcensuur, unanimiteitssillusie, mindguards.","s":["vergadering","dagelijks"]},{"id":1000,"c":"digitaal","t":"De Algoritme-Bubbel Bewustzijn","b":"Iemands online werkelijkheid is gefilterd door algoritmes. Hun stellige overtuigingen zijn mogelijk versterkt door een informatiebubbel. Vraag naar hun bronnen.","s":["dagelijks","vergadering"]},{"id":1001,"c":"eerste","t":"Cognitive Fluency bij Eerste Contact","b":"Dingen die makkelijk te verwerken zijn (simpele namen, heldere uitspraak, bekende gezichten) worden positiever beoordeeld. Maak je eerste contact 'easy to process'.","s":["sollicitatie","verkoop"]}];
